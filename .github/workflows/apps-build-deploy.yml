name: Apps - Build and Deploy (Docs + Playgrounds)

on:
  workflow_dispatch:
    inputs:
      targets:
        description: "Comma-separated targets: docs,vanilla,tailwind"
        required: true
        default: "docs,vanilla,tailwind"

permissions:
  contents: read

concurrency:
  group: development-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  resolve-targets:
    name: Resolve selected targets
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
      targets: ${{ steps.resolve.outputs.targets }}
    steps:
      - name: Parse targets input
        id: resolve
        shell: bash
        env:
          TARGETS_INPUT: ${{ github.event.inputs.targets }}
        run: |
          node - <<'NODE'
          const fs = require('node:fs');

          const rawInput = process.env.TARGETS_INPUT ?? '';
          const selected = [...new Set(
            rawInput
              .split(',')
              .map((entry) => entry.trim().toLowerCase())
              .filter(Boolean)
          )];

          const targetMap = {
            docs: {
              name: 'docs',
              build_script: 'seo:docs',
              dist: 'dist/apps/tailng-ui/docs/browser',
              project_var: 'CF_DOCS_PROJECT_NAME',
            },
            tailwind: {
              name: 'tailwind',
              build_script: 'seo:tailwind',
              dist: 'dist/apps/tailng-ui/playground-tailwind/browser',
              project_var: 'CF_TAILWIND_PROJECT_NAME',
            },
            vanilla: {
              name: 'vanilla',
              build_script: 'seo:vanilla',
              dist: 'dist/apps/tailng-ui/playground-plain-css/browser',
              project_var: 'CF_VANILLA_PROJECT_NAME',
            },
          };

          if (selected.length === 0) {
            console.error('No targets selected. Use at least one of: docs,vanilla,tailwind');
            process.exit(1);
          }

          const invalid = selected.filter((target) => !(target in targetMap));
          if (invalid.length > 0) {
            console.error(`Invalid targets: ${invalid.join(', ')}. Allowed: docs,vanilla,tailwind`);
            process.exit(1);
          }

          const matrix = { target: selected.map((target) => targetMap[target]) };
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `matrix=${JSON.stringify(matrix)}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `targets=${selected.join(',')}\n`);
          NODE

  deploy:
    name: Deploy ${{ matrix.target.name }}
    runs-on: ubuntu-latest
    environment: production
    needs:
      - resolve-targets
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.resolve-targets.outputs.matrix) }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --force --prefer-offline=false
        env:
          NPM_CONFIG_OPTIONAL: "true"

      - name: Verify Rollup native package
        run: |
          if ls node_modules/.pnpm/@rollup+rollup-linux-x64-gnu@* >/dev/null 2>&1; then
            echo "rollup native package present in pnpm store"
          else
            echo "missing @rollup/rollup-linux-x64-gnu in node_modules/.pnpm"
            exit 1
          fi

      - name: Validate Cloudflare project variable
        run: |
          if [ -z "${{ vars[matrix.target.project_var] }}" ]; then
            echo "Missing variable: ${{ matrix.target.project_var }}"
            exit 1
          fi

      - name: Install browser for prerender
        run: pnpm exec puppeteer browsers install chrome

      - name: Build and prerender
        run: pnpm run ${{ matrix.target.build_script }}

      - name: Write deployment info
        run: |
          mkdir -p ${{ matrix.target.dist }}
          echo "branch=${GITHUB_REF_NAME}" > ${{ matrix.target.dist }}/info.txt
          echo "commit=$(git rev-parse --short HEAD)" >> ${{ matrix.target.dist }}/info.txt
          echo "time=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> ${{ matrix.target.dist }}/info.txt

      - name: Deploy to Cloudflare Pages
        run: |
          pnpm dlx wrangler pages deploy "${{ matrix.target.dist }}" \
            --project-name "${{ vars[matrix.target.project_var] }}" \
            --branch "${{ github.ref_name }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
