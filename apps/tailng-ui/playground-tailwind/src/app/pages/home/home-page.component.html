<div class="mx-auto grid max-w-[72rem] gap-4 md:grid-cols-2 xl:grid-cols-3">
  @for (item of items; track item.path) {
    <a
      [routerLink]="item.path"
      class="grid gap-3 rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 no-underline transition-colors hover:border-tng-accent-brand"
    >
      <h2 class="text-lg font-semibold m-0 text-tng-fg-primary">{{ item.title }}</h2>
      <p class="text-sm m-0 text-tng-fg-secondary">{{ item.description }}</p>
      <span class="text-sm font-semibold text-tng-accent-brand">Open Demo</span>
    </a>
  }
</div>
