<main class="min-h-screen bg-slate-950 px-4 py-8 text-slate-100 md:px-8">
  <section class="mx-auto max-w-6xl space-y-6">
    <header class="space-y-3">
      <div class="flex flex-wrap items-center gap-3">
        <a routerLink="/" class="rounded-lg border border-slate-700 px-3 py-1.5 text-sm text-slate-300">
          Home
        </a>
        <a
          routerLink="/theme"
          class="rounded-lg border border-slate-700 px-3 py-1.5 text-sm text-slate-300"
        >
          Theme Demo
        </a>
        <a
          routerLink="/icons"
          class="rounded-lg border border-slate-700 px-3 py-1.5 text-sm text-slate-300"
        >
          Icon Demo
        </a>
      </div>
      <h1 class="text-3xl font-semibold md:text-4xl">Button Demo (Tailwind)</h1>
      <p class="max-w-2xl text-slate-300">
        First row uses primitive behavior with your own styles. Second row uses owned `tng-button`.
      </p>
    </header>

    <section class="space-y-3 rounded-2xl border border-slate-700 bg-slate-900 p-5">
      <h2 class="text-lg font-semibold">Primitives (`tngButton`)</h2>
      <div class="flex flex-wrap gap-3">
        <button
          tngButton
          class="rounded-lg bg-cyan-500 px-4 py-2 text-sm font-semibold text-slate-950"
          type="button"
        >
          Primary Action
        </button>
        <button
          tngButton
          class="rounded-lg border border-cyan-400 px-4 py-2 text-sm font-semibold text-cyan-300"
          type="button"
        >
          Outline Action
        </button>
        <a tngButton class="rounded-lg bg-emerald-500 px-4 py-2 text-sm font-semibold text-slate-950">
          Anchor Button
        </a>
        <a
          tngButton
          [disabled]="true"
          class="rounded-lg bg-slate-700 px-4 py-2 text-sm font-semibold text-slate-400"
        >
          Disabled Anchor
        </a>
      </div>
    </section>

    <section class="space-y-3 rounded-2xl border border-slate-700 bg-slate-900 p-5">
      <h2 class="text-lg font-semibold">Components (`tng-button`)</h2>
      <div class="flex flex-wrap gap-3">
        <tng-button>Default</tng-button>
        <tng-button tone="success">Success</tng-button>
        <tng-button tone="danger">Danger</tng-button>
        <tng-button tone="neutral">Neutral</tng-button>
        <tng-button appearance="outline">Outline</tng-button>
        <tng-button appearance="ghost">Ghost</tng-button>
        <tng-button size="sm">Small</tng-button>
        <tng-button size="lg">Large</tng-button>
        <tng-button [disabled]="true">Disabled</tng-button>
      </div>
    </section>
  </section>
</main>
