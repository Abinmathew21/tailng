<div class="mx-auto grid max-w-[72rem] gap-5">
  <!-- Controls -->
  <section
    class="grid gap-4 rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-4 md:grid-cols-2 md:p-5"
  >
    <label class="grid gap-2">
      <span class="text-sm font-medium text-tng-fg-secondary">Preset</span>
      <select
        class="w-full rounded-lg border border-tng-border-subtle bg-tng-bg-canvas px-3 py-2.5 text-tng-fg-primary"
        [value]="selectedPreset()"
        (change)="onPresetChange($event)"
      >
        @for (option of presetOptions; track option.id) {
          <option [value]="option.id">{{ option.label }}</option>
        }
      </select>
    </label>

    <label class="grid gap-2">
      <span class="text-sm font-medium text-tng-fg-secondary">Mode</span>
      <select
        class="w-full rounded-lg border border-tng-border-subtle bg-tng-bg-canvas px-3 py-2.5 text-tng-fg-primary"
        [value]="selectedMode()"
        (change)="onModeChange($event)"
      >
        @for (option of modeOptions; track option.id) {
          <option [value]="option.id">{{ option.label }}</option>
        }
      </select>
    </label>
  </section>

  <!-- Highlights -->
  <section class="grid gap-4 lg:grid-cols-3">
    <article
      class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5"
    >
      <h2 class="text-sm font-semibold text-tng-fg-secondary">Meta</h2>
      <dl class="mt-3 grid gap-2">
        <div class="flex items-center justify-between gap-4">
          <dt class="text-tng-fg-secondary">Name</dt>
          <dd class="font-mono text-sm">{{ themeMeta().name }}</dd>
        </div>
        <div class="flex items-center justify-between gap-4">
          <dt class="text-tng-fg-secondary">Mode</dt>
          <dd class="font-mono text-sm">{{ themeMeta().mode }}</dd>
        </div>
      </dl>
    </article>

    <article
      class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5"
    >
      <h2 class="text-sm font-semibold text-tng-fg-secondary">Accent Preview</h2>
      <div class="mt-3 flex flex-wrap gap-3">
        <button
          tngPress
          type="button"
          class="rounded-lg bg-tng-accent-brand px-4 py-2.5 text-sm text-tng-fg-inverse transition-[filter] duration-150 hover:brightness-95 focus:outline-none focus-visible:ring-2 focus-visible:ring-tng-focus-ring"
        >
          Brand
        </button>
        <button
          tngPress
          type="button"
          class="rounded-lg bg-tng-accent-danger px-4 py-2.5 text-sm text-tng-fg-inverse transition-[filter] duration-150 hover:brightness-95 focus:outline-none focus-visible:ring-2 focus-visible:ring-tng-focus-ring"
        >
          Danger
        </button>
        <button
          tngPress
          type="button"
          class="rounded-lg bg-tng-accent-success px-4 py-2.5 text-sm text-tng-fg-inverse transition-[filter] duration-150 hover:brightness-95 focus:outline-none focus-visible:ring-2 focus-visible:ring-tng-focus-ring"
        >
          Success
        </button>
      </div>
    </article>

    <article
      class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5"
    >
      <h2 class="text-sm font-semibold text-tng-fg-secondary">Focus Ring Preview</h2>
      <div class="mt-3">
        <button
          tngPress
          type="button"
          class="rounded-lg border border-tng-border-strong bg-transparent px-4 py-2.5 text-sm text-tng-fg-primary outline-none ring-2 ring-transparent focus-visible:ring-tng-focus-ring"
        >
          Tab to focus
        </button>
      </div>
    </article>
  </section>

  <!-- Token table -->
  <section
    class="overflow-hidden rounded-2xl border border-tng-border-subtle bg-tng-bg-surface"
  >
    <header class="border-b border-tng-border-subtle px-5 py-4">
      <h2 class="text-sm font-semibold text-tng-fg-secondary">
        Semantic Tokens (Raw vs Resolved)
      </h2>
    </header>
    <div class="overflow-x-auto">
      <table class="w-full min-w-[40rem] text-left text-sm">
        <thead class="bg-tng-bg-canvas text-tng-fg-secondary">
          <tr>
            <th class="px-5 py-3 font-semibold">Token</th>
            <th class="px-5 py-3 font-semibold">Expression</th>
            <th class="px-5 py-3 font-semibold">Resolved</th>
          </tr>
        </thead>
        <tbody>
          @for (row of semanticTokenRows(); track row.name) {
            <tr class="border-t border-tng-border-subtle">
              <td class="px-5 py-3 font-mono">{{ row.name }}</td>
              <td class="px-5 py-3 font-mono text-tng-fg-secondary">
                {{ row.expression }}
              </td>
              <td class="px-5 py-3 font-mono">{{ row.resolvedValue }}</td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </section>
</div>
