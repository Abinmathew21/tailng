<div class="mx-auto max-w-[72rem] grid gap-5">
  <section class="overflow-hidden rounded-2xl border border-tng-border-subtle bg-tng-bg-surface">
    <div class="overflow-x-auto">
      <table class="w-full min-w-[860px] text-left text-sm">
        <thead class="border-b border-tng-border-subtle bg-tng-bg-muted">
          <tr>
            <th class="px-5 py-3 font-semibold text-tng-fg-primary">Rank</th>
            <th class="px-5 py-3 font-semibold text-tng-fg-primary">Country</th>
            <th class="px-5 py-3 font-semibold text-tng-fg-primary">Population</th>
            <th class="px-5 py-3 font-semibold text-tng-fg-primary">Land Area</th>
            <th class="px-5 py-3 font-semibold text-tng-fg-primary">Nominal GDP</th>
            <th class="px-5 py-3 font-semibold text-tng-fg-primary">People Signal</th>
          </tr>
        </thead>
        <tbody>
          @for (country of countries; track country.rank) {
            <tr class="border-t border-tng-border-subtle">
              <td class="px-5 py-3 font-mono text-tng-accent-brand">#{{ country.rank }}</td>
              <td class="px-5 py-3">
                <div class="flex items-center gap-3">
                  <tng-icon
                    [icon]="'flags:' + country.iso2"
                    [label]="country.name + ' flag'"
                    class="text-xl leading-none"
                  />
                  <span class="text-tng-fg-primary">{{ country.name }}</span>
                </div>
              </td>
              <td class="px-5 py-3 font-mono text-tng-fg-primary">{{ country.populationLabel }}</td>
              <td class="px-5 py-3 font-mono text-tng-fg-primary">{{ country.landAreaLabel }}</td>
              <td class="px-5 py-3 font-mono text-tng-fg-primary">{{ country.gdpLabel }}</td>
              <td class="px-5 py-3">
                <span
                  class="inline-flex items-center gap-1"
                  [attr.aria-label]="'Relative rank signal for position ' + country.rank"
                >
                  @for (marker of country.peopleMarkers; track marker) {
                    <tng-icon icon="users-round" class="text-base leading-none text-tng-accent-brand" />
                  }
                </span>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </section>
</div>
