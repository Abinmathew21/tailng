<div class="mx-auto max-w-[72rem] grid gap-5">
  <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
    <h2 class="text-lg font-semibold">Primitives (`tngSlider`)</h2>
    <input tngSlider class="block w-full max-w-xs accent-tng-accent-brand" [min]="0" [max]="100" [value]="45" />
  </section>

  <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
    <h2 class="text-lg font-semibold">Components (`tng-slider`)</h2>
    <p class="text-sm text-tng-fg-secondary m-0">Volume: {{ volume() }}</p>
    <tng-slider [value]="volume()" [min]="0" [max]="100" (valueChange)="onVolumeChange($event)" />
  </section>
</div>
