<main class="min-h-screen bg-slate-950 px-4 py-8 text-slate-100 md:px-8">
  <section class="mx-auto max-w-6xl space-y-6">
    <header class="space-y-3">
      <div class="flex flex-wrap items-center gap-3">
        <a
          routerLink="/"
          class="rounded-lg border border-slate-700 px-3 py-1.5 text-sm text-slate-300"
        >
          Home
        </a>
      </div>
      <h1 class="text-3xl font-semibold md:text-4xl">Breadcrumb Demo (Tailwind)</h1>
      <p class="max-w-2xl text-slate-300">Hierarchical navigation trail for current page location.</p>
    </header>

    <section class="space-y-3 rounded-2xl border border-slate-700 bg-slate-900 p-5">
      <h2 class="text-lg font-semibold">Primitives</h2>
      <nav tngBreadcrumb aria-label="Breadcrumb">
        <ol tngBreadcrumbList>
          <li tngBreadcrumbItem><a tngBreadcrumbLink href="#">Home</a></li>
          <span tngBreadcrumbSeparator>/</span>
          <li tngBreadcrumbItem><a tngBreadcrumbLink href="#">Docs</a></li>
          <span tngBreadcrumbSeparator>/</span>
          <li tngBreadcrumbItem>Breadcrumb</li>
        </ol>
      </nav>
    </section>

    <section class="space-y-3 rounded-2xl border border-slate-700 bg-slate-900 p-5">
      <h2 class="text-lg font-semibold">Component</h2>
      <tng-breadcrumb>
        <ol tngBreadcrumbList>
          <li tngBreadcrumbItem><a tngBreadcrumbLink href="#">Home</a></li>
          <span tngBreadcrumbSeparator>/</span>
          <li tngBreadcrumbItem><a tngBreadcrumbLink href="#">Playground</a></li>
          <span tngBreadcrumbSeparator>/</span>
          <li tngBreadcrumbItem>Breadcrumb Demo</li>
        </ol>
      </tng-breadcrumb>
    </section>
  </section>
</main>
