<main class="min-h-screen bg-slate-950 px-4 py-8 text-slate-100 md:px-8">
  <section class="mx-auto max-w-6xl space-y-6">
    <header class="space-y-3">
      <div class="flex flex-wrap items-center gap-3">
        <a
          routerLink="/"
          class="rounded-lg border border-slate-700 px-3 py-1.5 text-sm text-slate-300"
        >
          Home
        </a>
      </div>
      <h1 class="text-3xl font-semibold md:text-4xl">Multiselect Demo (Tailwind)</h1>
      <p class="max-w-2xl text-slate-300">
        Multiple-choice listbox selection surface with keyboard support.
      </p>
    </header>

    <section class="space-y-3 rounded-2xl border border-slate-700 bg-slate-900 p-5">
      <h2 class="text-lg font-semibold">Primitives (`tngMultiselect`)</h2>
      <div tngMultiselect class="rounded-xl border border-slate-700 bg-slate-950 p-4">
        <ul role="listbox" aria-multiselectable="true" class="space-y-1 text-sm">
          <li
            role="option"
            aria-selected="true"
            class="rounded-md border border-cyan-700 bg-cyan-950/30 px-3 py-2"
          >
            Button
          </li>
          <li
            role="option"
            aria-selected="false"
            class="rounded-md border border-slate-700 px-3 py-2"
          >
            Input
          </li>
          <li
            role="option"
            aria-selected="true"
            class="rounded-md border border-cyan-700 bg-cyan-950/30 px-3 py-2"
          >
            Dialog
          </li>
        </ul>
      </div>
    </section>

    <section class="space-y-3 rounded-2xl border border-slate-700 bg-slate-900 p-5">
      <h2 class="text-lg font-semibold">Components (`tng-multiselect`)</h2>
      <tng-multiselect>
        <div class="flex flex-wrap gap-2 text-sm">
          <span class="rounded-full border border-cyan-600 px-3 py-1">Button</span>
          <span class="rounded-full border border-cyan-600 px-3 py-1">Dialog</span>
          <span class="rounded-full border border-cyan-600 px-3 py-1">Popover</span>
        </div>
      </tng-multiselect>
    </section>
  </section>
</main>
