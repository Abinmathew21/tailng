<div class="mx-auto max-w-[72rem] grid gap-5">
  <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
    <h2 class="text-lg font-semibold">Primitives (`tngMultiselect`)</h2>
    <div tngMultiselect class="rounded-xl border border-tng-border-subtle px-4 py-3 text-tng-fg-primary">
      <ul role="listbox" aria-multiselectable="true" class="list-none p-0 m-0 space-y-1">
        <li role="option" aria-selected="true" class="rounded px-2 py-1 bg-tng-accent-brand/45">Button</li>
        <li role="option" aria-selected="false" class="rounded px-2 py-1 hover:bg-tng-bg-muted">Input</li>
        <li role="option" aria-selected="true" class="rounded px-2 py-1 bg-tng-accent-brand/45">Dialog</li>
      </ul>
    </div>
  </section>

  <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
    <h2 class="text-lg font-semibold">Components (`tng-multiselect`)</h2>
    <tng-multiselect>
      <div class="rounded-xl border border-tng-border-subtle px-4 py-3 text-tng-fg-primary flex flex-wrap gap-2">
        <span class="rounded-lg border border-tng-border-subtle px-3 py-1.5 text-sm">Button</span>
        <span class="rounded-lg border border-tng-border-subtle px-3 py-1.5 text-sm">Dialog</span>
        <span class="rounded-lg border border-tng-border-subtle px-3 py-1.5 text-sm">Popover</span>
      </div>
    </tng-multiselect>
  </section>
</div>
