<main class="min-h-screen bg-slate-950 px-4 py-8 text-slate-100 md:px-8">
  <section class="mx-auto max-w-6xl space-y-6">
    <header class="space-y-3">
      <div class="flex flex-wrap items-center gap-3">
        <a
          routerLink="/"
          class="rounded-lg border border-slate-700 px-3 py-1.5 text-sm text-slate-300"
        >
          Home
        </a>
      </div>
      <h1 class="text-3xl font-semibold md:text-4xl">Toggle Demo (Tailwind)</h1>
      <p class="max-w-2xl text-slate-300">
        Icon-oriented toggle button using <code>aria-pressed</code> for on/off state.
      </p>
    </header>

    <section class="space-y-3 rounded-2xl border border-slate-700 bg-slate-900 p-5">
      <h2 class="text-lg font-semibold">Primitives (`tngToggle`)</h2>
      <button
        tngToggle
        [pressed]="primitivePressed()"
        class="inline-flex h-10 w-10 items-center justify-center rounded-xl border border-slate-700 bg-slate-950 text-sm font-semibold"
        [class.border-cyan-500]="primitivePressed()"
        [class.bg-cyan-600]="primitivePressed()"
        (click)="onPrimitiveToggle()"
      >
        {{ primitivePressed() ? 'ON' : 'OFF' }}
      </button>
    </section>

    <section class="space-y-3 rounded-2xl border border-slate-700 bg-slate-900 p-5">
      <h2 class="text-lg font-semibold">Components (`tng-toggle`)</h2>

      <div class="flex items-center gap-3">
        <tng-toggle
          [pressed]="themeModeEnabled()"
          pressedLabel="Disable dark mode"
          unpressedLabel="Enable dark mode"
          (pressedChange)="onThemeModeChange($event)"
        >
          <span offIcon>moon</span>
          <span onIcon>sun</span>
        </tng-toggle>
        <span class="text-sm text-slate-300">
          Dark mode {{ themeModeEnabled() ? 'enabled' : 'disabled' }}
        </span>
      </div>
    </section>
  </section>
</main>
