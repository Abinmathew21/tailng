<div class="mx-auto max-w-[72rem] grid gap-5">
  <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
    <h2 class="text-lg font-semibold">Primitives (`tngBottomSheet`)</h2>
    <div class="rounded-xl border border-tng-border-subtle px-4 py-3 text-tng-fg-primary overflow-hidden max-h-80 flex flex-col">
      <div class="rounded-lg border border-tng-border-subtle bg-tng-bg-canvas p-3 mb-3">Mobile content behind sheet</div>
      <div tngBottomSheet class="rounded-lg border border-tng-border-subtle bg-tng-bg-canvas p-3">
        <div class="w-12 h-1 rounded-full bg-tng-fg-secondary mx-auto mb-2" aria-hidden="true"></div>
        <p class="text-sm text-tng-fg-secondary mb-2">Quick Actions</p>
        <ul class="list-none p-0 m-0 space-y-1">
          <li class="text-tng-fg-primary">Share</li>
          <li class="text-tng-fg-primary">Duplicate</li>
          <li class="text-tng-fg-primary">Archive</li>
        </ul>
      </div>
    </div>
  </section>

  <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
    <h2 class="text-lg font-semibold">Components (`tng-bottom-sheet`)</h2>
    <tng-bottom-sheet>
      <div class="rounded-lg border border-tng-border-subtle bg-tng-bg-canvas p-3">
        <div class="w-12 h-1 rounded-full bg-tng-fg-secondary mx-auto mb-2" aria-hidden="true"></div>
        <p class="text-sm text-tng-fg-secondary mb-2">Component wrapper with owned surface styling.</p>
        <div class="flex gap-2">
          <button type="button" class="rounded-lg border border-tng-border-subtle bg-transparent px-4 py-2 text-sm font-medium text-tng-fg-primary">Install</button>
          <button type="button" class="rounded-lg border border-tng-border-subtle bg-transparent px-4 py-2 text-sm font-medium text-tng-fg-primary">Later</button>
        </div>
      </div>
    </tng-bottom-sheet>
  </section>
</div>
