<main class="min-h-screen bg-slate-950 px-4 py-8 text-slate-100 md:px-8">
  <section class="mx-auto max-w-6xl space-y-6">
    <header class="space-y-3">
      <div class="flex flex-wrap items-center gap-3">
        <a
          routerLink="/"
          class="rounded-lg border border-slate-700 px-3 py-1.5 text-sm text-slate-300"
        >
          Home
        </a>
      </div>
      <h1 class="text-3xl font-semibold md:text-4xl">Bottom Sheet Demo (Tailwind)</h1>
      <p class="max-w-2xl text-slate-300">
        Partial-height overlay sheet anchored from the bottom edge.
      </p>
    </header>

    <section class="space-y-3 rounded-2xl border border-slate-700 bg-slate-900 p-5">
      <h2 class="text-lg font-semibold">Primitives (`tngBottomSheet`)</h2>
      <div class="mx-auto max-w-sm rounded-2xl border border-slate-700 bg-slate-950 p-3">
        <div class="rounded-xl border border-slate-800 p-3 text-sm text-slate-300">
          Mobile content behind sheet
        </div>
        <div tngBottomSheet class="mt-3 rounded-xl border border-slate-700 bg-slate-900 p-3">
          <div class="mx-auto h-1.5 w-12 rounded-full bg-slate-600"></div>
          <h3 class="mt-3 font-medium">Quick Actions</h3>
          <ul class="mt-2 space-y-1 text-sm text-slate-300">
            <li>Share</li>
            <li>Duplicate</li>
            <li>Archive</li>
          </ul>
        </div>
      </div>
    </section>

    <section class="space-y-3 rounded-2xl border border-slate-700 bg-slate-900 p-5">
      <h2 class="text-lg font-semibold">Components (`tng-bottom-sheet`)</h2>
      <tng-bottom-sheet>
        <div class="mx-auto max-w-sm rounded-xl border border-slate-700 bg-slate-900 p-3">
          <div class="mx-auto h-1.5 w-12 rounded-full bg-slate-600"></div>
          <p class="mt-3 text-sm text-slate-300">Component wrapper with owned surface styling.</p>
          <div class="mt-2 flex flex-wrap gap-2">
            <button type="button" class="rounded-md border border-slate-700 px-3 py-1 text-sm">
              Install
            </button>
            <button type="button" class="rounded-md border border-slate-700 px-3 py-1 text-sm">
              Later
            </button>
          </div>
        </div>
      </tng-bottom-sheet>
    </section>
  </section>
</main>
