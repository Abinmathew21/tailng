<main class="min-h-screen bg-slate-950 px-4 py-8 text-slate-100 md:px-8">
  <section class="mx-auto max-w-6xl space-y-6">
    <header class="space-y-3">
      <div class="flex flex-wrap items-center gap-3">
        <a
          routerLink="/"
          class="rounded-lg border border-slate-700 px-3 py-1.5 text-sm text-slate-300"
        >
          Home
        </a>
      </div>
      <h1 class="text-3xl font-semibold md:text-4xl">Context Menu Demo (Tailwind)</h1>
      <p class="max-w-2xl text-slate-300">
        Context-triggered action surface for pointer and keyboard workflows.
      </p>
    </header>

    <section class="space-y-3 rounded-2xl border border-slate-700 bg-slate-900 p-5">
      <h2 class="text-lg font-semibold">Primitives (`tngContextMenu`)</h2>
      <div tngContextMenu class="rounded-xl border border-slate-700 bg-slate-950 p-4">
        <div class="rounded-md border border-dashed border-slate-700 p-5 text-sm text-slate-300">
          Right-click target area
        </div>
        <ul
          role="menu"
          class="mt-3 w-56 rounded-md border border-slate-700 bg-slate-900 p-1 text-sm"
        >
          <li role="menuitem" class="rounded px-2 py-1 hover:bg-slate-800">Open</li>
          <li role="menuitem" class="rounded px-2 py-1 hover:bg-slate-800">Rename</li>
          <li role="menuitem" class="rounded px-2 py-1 hover:bg-slate-800">Delete</li>
        </ul>
      </div>
    </section>

    <section class="space-y-3 rounded-2xl border border-slate-700 bg-slate-900 p-5">
      <h2 class="text-lg font-semibold">Components (`tng-context-menu`)</h2>
      <tng-context-menu>
        <ul role="menu" class="w-56 rounded-md border border-slate-700 bg-slate-900 p-1 text-sm">
          <li role="menuitem" class="rounded px-2 py-1 hover:bg-slate-800">Duplicate</li>
          <li role="menuitem" class="rounded px-2 py-1 hover:bg-slate-800">Move to Folder</li>
          <li role="menuitem" class="rounded px-2 py-1 hover:bg-slate-800">Archive</li>
        </ul>
      </tng-context-menu>
    </section>
  </section>
</main>
