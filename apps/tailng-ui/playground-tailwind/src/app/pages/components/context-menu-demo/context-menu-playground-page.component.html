<div class="mx-auto max-w-[72rem] grid gap-5">
  <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
    <h2 class="text-lg font-semibold">Primitives (`tngContextMenu`)</h2>
    <div tngContextMenu class="rounded-xl border border-tng-border-subtle px-4 py-3 text-tng-fg-primary">
      <div class="rounded-lg border border-tng-border-subtle bg-tng-bg-canvas p-3 mb-2">Right-click target area</div>
      <ul role="menu" class="list-none p-0 m-0 space-y-1">
        <li role="menuitem" class="rounded px-2 py-1 cursor-pointer hover:bg-tng-bg-muted">Open</li>
        <li role="menuitem" class="rounded px-2 py-1 cursor-pointer hover:bg-tng-bg-muted">Rename</li>
        <li role="menuitem" class="rounded px-2 py-1 cursor-pointer hover:bg-tng-bg-muted">Delete</li>
      </ul>
    </div>
  </section>

  <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
    <h2 class="text-lg font-semibold">Components (`tng-context-menu`)</h2>
    <tng-context-menu>
      <ul role="menu" class="rounded-xl border border-tng-border-subtle px-4 py-3 text-tng-fg-primary space-y-1 list-none m-0 p-0">
        <li role="menuitem" tabindex="0" class="rounded px-2 py-1 cursor-pointer hover:bg-tng-bg-muted">Duplicate</li>
        <li role="menuitem" tabindex="-1" class="rounded px-2 py-1 cursor-pointer hover:bg-tng-bg-muted">Move to Folder</li>
        <li role="menuitem" tabindex="-1" class="rounded px-2 py-1 cursor-pointer hover:bg-tng-bg-muted">Archive</li>
      </ul>
    </tng-context-menu>
  </section>
</div>
