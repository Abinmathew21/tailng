<main class="min-h-screen bg-slate-950 px-4 py-8 text-slate-100 md:px-8">
  <section class="mx-auto max-w-6xl space-y-6">
    <header class="space-y-3">
      <div class="flex flex-wrap items-center gap-3">
        <a
          routerLink="/"
          class="rounded-lg border border-slate-700 px-3 py-1.5 text-sm text-slate-300"
        >
          Home
        </a>
      </div>
      <h1 class="text-3xl font-semibold md:text-4xl">Switch Demo (Tailwind)</h1>
      <p class="max-w-2xl text-slate-300">On/off control with accessible role and state attributes.</p>
    </header>

    <section class="space-y-3 rounded-2xl border border-slate-700 bg-slate-900 p-5">
      <h2 class="text-lg font-semibold">Primitives (`tngSwitch`)</h2>
      <button tngSwitch class="inline-flex rounded-xl border border-slate-700 bg-slate-950 px-3 py-2 text-sm">
        Primitive switch shell
      </button>
    </section>

    <section class="space-y-3 rounded-2xl border border-slate-700 bg-slate-900 p-5">
      <h2 class="text-lg font-semibold">Components (`tng-switch`)</h2>
      <tng-switch
        [checked]="notificationsEnabled()"
        (checkedChange)="onNotificationsEnabledChange($event)"
      >
        Notifications {{ notificationsEnabled() ? 'enabled' : 'disabled' }}
      </tng-switch>
    </section>
  </section>
</main>
