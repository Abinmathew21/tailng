<div class="mx-auto max-w-[72rem] grid gap-5">
  <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
    <h2 class="text-lg font-semibold">Primitives (`tngSwitch`)</h2>
    <button
      tngSwitch
      [checked]="primitiveChecked()"
      ariaLabel="Toggle primitive wifi switch"
      class="rounded-xl border border-tng-border-subtle px-4 py-3 text-tng-fg-primary"
      (click)="onPrimitiveSwitchToggle()"
    >
      Wi-Fi {{ primitiveChecked() ? 'on' : 'off' }}
    </button>
  </section>

  <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
    <h2 class="text-lg font-semibold">Components (`tng-switch`)</h2>
    <div class="grid gap-3">
      <tng-switch
        [checked]="notificationsEnabled()"
        ariaLabel="Toggle notifications"
        name="notifications"
        (checkedChange)="onNotificationsEnabledChange($event)"
      >
        Notifications {{ notificationsEnabled() ? 'enabled' : 'disabled' }}
      </tng-switch>

      <tng-switch
        [checked]="airplaneModeEnabled()"
        ariaLabel="Toggle airplane mode"
        name="airplane-mode"
        (checkedChange)="onAirplaneModeChange($event)"
      >
        Airplane mode {{ airplaneModeEnabled() ? 'enabled' : 'disabled' }}
      </tng-switch>

      <tng-switch [checked]="true" [disabled]="true" ariaLabel="Bluetooth always on" name="bluetooth">
        Bluetooth forced on (disabled)
      </tng-switch>
    </div>

    <p class="text-sm text-tng-fg-secondary m-0">
      Need icon-style pressed button instead?
      <a routerLink="/toggle" class="text-tng-accent-brand hover:underline">Toggle Demo</a>.
    </p>
  </section>
</div>
