<div class="mx-auto max-w-[72rem] grid gap-5">
  <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
    <h2 class="text-lg font-semibold">Primitives (`tngChips`)</h2>
    <div tngChips class="rounded-xl border border-tng-border-subtle px-4 py-3 text-tng-fg-primary flex flex-wrap gap-2">
      <button type="button" class="rounded-lg border border-tng-border-subtle px-3 py-1.5 text-sm font-medium text-tng-fg-primary">Angular</button>
      <button type="button" class="rounded-lg border border-tng-border-subtle px-3 py-1.5 text-sm font-medium text-tng-fg-primary">CDK</button>
      <button type="button" class="rounded-lg border border-tng-border-subtle px-3 py-1.5 text-sm font-medium text-tng-fg-primary">A11y</button>
    </div>
  </section>

  <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
    <h2 class="text-lg font-semibold">Components (`tng-chips`)</h2>
    <tng-chips>
      <div class="rounded-xl border border-tng-border-subtle px-4 py-3 text-tng-fg-primary flex flex-wrap gap-2">
        <span class="inline-flex items-center gap-1 rounded-lg border border-tng-border-subtle px-3 py-1.5 text-sm">
          Button
          <button type="button" class="text-tng-fg-secondary hover:text-tng-fg-primary">x</button>
        </span>
        <span class="inline-flex items-center gap-1 rounded-lg border border-tng-border-subtle px-3 py-1.5 text-sm">
          Dialog
          <button type="button" class="text-tng-fg-secondary hover:text-tng-fg-primary">x</button>
        </span>
      </div>
    </tng-chips>
  </section>
</div>
