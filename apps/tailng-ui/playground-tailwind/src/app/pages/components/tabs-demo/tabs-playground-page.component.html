<div class="mx-auto max-w-[72rem] grid gap-5">
  <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
    <h2 class="text-lg font-semibold">Primitives (`tngTabs`)</h2>
    <div tngTabs class="rounded-xl border border-tng-border-subtle px-4 py-3 text-tng-fg-primary">
      <div role="tablist" class="flex flex-wrap gap-2 mb-3">
        <button role="tab" type="button" aria-selected="true" class="rounded-lg border border-tng-accent-brand bg-tng-accent-brand px-4 py-2 text-sm font-medium text-tng-fg-inverse">
          Overview
        </button>
        <button role="tab" type="button" aria-selected="false" class="rounded-lg border border-tng-border-subtle bg-transparent px-4 py-2 text-sm font-medium text-tng-fg-primary">
          API
        </button>
        <button role="tab" type="button" aria-selected="false" class="rounded-lg border border-tng-border-subtle bg-transparent px-4 py-2 text-sm font-medium text-tng-fg-primary">
          Examples
        </button>
      </div>
      <div role="tabpanel" class="rounded-lg border border-tng-border-subtle bg-tng-bg-canvas p-3 text-tng-fg-primary">
        Overview panel content preview.
      </div>
    </div>
  </section>

  <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
    <h2 class="text-lg font-semibold">Components (`tng-tabs`)</h2>
    <tng-tabs>
      <div role="tablist" class="flex flex-wrap gap-2 mb-3">
        <button role="tab" type="button" aria-selected="true" class="rounded-lg border border-tng-accent-brand bg-tng-accent-brand px-4 py-2 text-sm font-medium text-tng-fg-inverse">
          Usage
        </button>
        <button role="tab" type="button" aria-selected="false" class="rounded-lg border border-tng-border-subtle bg-transparent px-4 py-2 text-sm font-medium text-tng-fg-primary">
          Accessibility
        </button>
      </div>
      <div role="tabpanel" class="rounded-lg border border-tng-border-subtle bg-tng-bg-canvas p-3 text-tng-fg-primary">
        Usage tab panel with install and import notes.
      </div>
    </tng-tabs>
  </section>
</div>
