<main class="min-h-screen bg-slate-950 px-4 py-8 text-slate-100 md:px-8">
  <section class="mx-auto max-w-6xl space-y-6">
    <header class="space-y-3">
      <div class="flex flex-wrap items-center gap-3">
        <a
          routerLink="/"
          class="rounded-lg border border-slate-700 px-3 py-1.5 text-sm text-slate-300"
        >
          Home
        </a>
      </div>
      <h1 class="text-3xl font-semibold md:text-4xl">Tabs Demo (Tailwind)</h1>
      <p class="max-w-2xl text-slate-300">
        Tabbed container surface for switching between related content panels.
      </p>
    </header>

    <section class="space-y-3 rounded-2xl border border-slate-700 bg-slate-900 p-5">
      <h2 class="text-lg font-semibold">Primitives (`tngTabs`)</h2>
      <div tngTabs class="rounded-xl border border-slate-700 bg-slate-950 p-4">
        <div role="tablist" class="flex flex-wrap gap-2">
          <button
            role="tab"
            aria-selected="true"
            type="button"
            class="rounded-md border border-cyan-500 px-3 py-1 text-sm"
          >
            Overview
          </button>
          <button
            role="tab"
            aria-selected="false"
            type="button"
            class="rounded-md border border-slate-700 px-3 py-1 text-sm"
          >
            API
          </button>
          <button
            role="tab"
            aria-selected="false"
            type="button"
            class="rounded-md border border-slate-700 px-3 py-1 text-sm"
          >
            Examples
          </button>
        </div>
        <div
          role="tabpanel"
          class="mt-3 rounded-md border border-slate-800 p-3 text-sm text-slate-300"
        >
          Overview panel content preview.
        </div>
      </div>
    </section>

    <section class="space-y-3 rounded-2xl border border-slate-700 bg-slate-900 p-5">
      <h2 class="text-lg font-semibold">Components (`tng-tabs`)</h2>
      <tng-tabs>
        <div role="tablist" class="flex flex-wrap gap-2">
          <button
            role="tab"
            aria-selected="true"
            type="button"
            class="rounded-md border border-cyan-500 px-3 py-1 text-sm"
          >
            Usage
          </button>
          <button
            role="tab"
            aria-selected="false"
            type="button"
            class="rounded-md border border-slate-700 px-3 py-1 text-sm"
          >
            Accessibility
          </button>
        </div>
        <div
          role="tabpanel"
          class="mt-3 rounded-md border border-slate-800 p-3 text-sm text-slate-300"
        >
          Usage tab panel with install and import notes.
        </div>
      </tng-tabs>
    </section>
  </section>
</main>
