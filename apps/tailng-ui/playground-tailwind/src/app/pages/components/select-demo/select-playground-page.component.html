<div class="mx-auto max-w-[72rem] grid gap-5">
  <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
    <h2 class="text-lg font-semibold">Primitives (`tngSelect`)</h2>
    <div tngSelect class="rounded-xl border border-tng-border-subtle px-4 py-3 text-tng-fg-primary">
      <button
        type="button"
        aria-haspopup="listbox"
        aria-expanded="true"
        class="block w-full rounded-lg border border-tng-border-subtle bg-transparent px-4 py-2 text-left text-sm font-medium text-tng-fg-primary"
      >
        Selected: Compact
      </button>
      <ul role="listbox" class="mt-2 list-none p-0 m-0 space-y-1">
        <li role="option" aria-selected="false" class="rounded px-2 py-1 hover:bg-tng-bg-muted cursor-pointer">Comfortable</li>
        <li role="option" aria-selected="true" class="rounded px-2 py-1 bg-tng-accent-brand/45">Compact</li>
        <li role="option" aria-selected="false" class="rounded px-2 py-1 hover:bg-tng-bg-muted cursor-pointer">Dense</li>
      </ul>
    </div>
  </section>

  <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
    <h2 class="text-lg font-semibold">Components (`tng-select`)</h2>
    <tng-select>
      <ul role="listbox" class="rounded-xl border border-tng-border-subtle px-4 py-3 text-tng-fg-primary list-none m-0 p-0 space-y-1">
        <li role="option" aria-selected="false" class="rounded px-2 py-1 hover:bg-tng-bg-muted cursor-pointer">Primary</li>
        <li role="option" aria-selected="false" class="rounded px-2 py-1 hover:bg-tng-bg-muted cursor-pointer">Secondary</li>
        <li role="option" aria-selected="false" class="rounded px-2 py-1 hover:bg-tng-bg-muted cursor-pointer">Tertiary</li>
      </ul>
    </tng-select>
  </section>
</div>
