<div class="mx-auto max-w-[72rem] grid gap-5">
  <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
    <h2 class="text-lg font-semibold">Primitives (`tngInputOtp`)</h2>
    <div tngInputOtp class="rounded-xl border border-tng-border-subtle px-4 py-3 text-tng-fg-primary">
      Primitive OTP group shell.
    </div>
  </section>

  <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
    <h2 class="text-lg font-semibold">Components (`tng-input-otp`)</h2>
    <tng-input-otp
      [value]="otpValue()"
      [length]="6"
      (valueChange)="onOtpValueChange($event)"
      (complete)="onComplete($event)"
    />
    <p class="text-sm text-tng-fg-secondary m-0">Value: {{ otpValue() || '—' }}</p>
    <p class="text-sm text-tng-fg-secondary m-0">Completed: {{ completionValue() || '—' }}</p>
  </section>
</div>
