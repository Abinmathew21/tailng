<main class="min-h-screen bg-slate-950 px-4 py-8 text-slate-100 md:px-8">
  <section class="mx-auto max-w-6xl space-y-6">
    <header class="space-y-3">
      <div class="flex flex-wrap items-center gap-3">
        <a
          routerLink="/"
          class="rounded-lg border border-slate-700 px-3 py-1.5 text-sm text-slate-300"
        >
          Home
        </a>
      </div>
      <h1 class="text-3xl font-semibold md:text-4xl">Input OTP Demo (Tailwind)</h1>
      <p class="max-w-2xl text-slate-300">Segmented one-time-password input with keyboard and paste support.</p>
    </header>

    <section class="space-y-3 rounded-2xl border border-slate-700 bg-slate-900 p-5">
      <h2 class="text-lg font-semibold">Primitives (`tngInputOtp`)</h2>
      <div tngInputOtp class="rounded-xl border border-slate-700 bg-slate-950 p-4">Primitive OTP group shell.</div>
    </section>

    <section class="space-y-3 rounded-2xl border border-slate-700 bg-slate-900 p-5">
      <h2 class="text-lg font-semibold">Components (`tng-input-otp`)</h2>
      <tng-input-otp
        [value]="otpValue()"
        [length]="6"
        (valueChange)="onOtpValueChange($event)"
        (complete)="onComplete($event)"
      />
      <p class="text-sm text-slate-300">Value: {{ otpValue() || '—' }}</p>
      <p class="text-sm text-slate-300">Completed: {{ completionValue() || '—' }}</p>
    </section>
  </section>
</main>
