<div class="mx-auto max-w-[72rem] grid gap-5">
  <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
    <h2 class="text-lg font-semibold">Primitives (`tngGrid`)</h2>
    <div tngGrid role="grid" class="rounded-xl border border-tng-border-subtle px-4 py-3 text-tng-fg-primary grid grid-cols-3 gap-2">
      <button role="gridcell" type="button" class="rounded-lg border border-tng-border-subtle bg-transparent px-4 py-2 text-sm font-medium text-tng-fg-primary">A1</button>
      <button role="gridcell" type="button" class="rounded-lg border border-tng-border-subtle bg-transparent px-4 py-2 text-sm font-medium text-tng-fg-primary">A2</button>
      <button role="gridcell" type="button" class="rounded-lg border border-tng-border-subtle bg-transparent px-4 py-2 text-sm font-medium text-tng-fg-primary">A3</button>
      <button role="gridcell" type="button" class="rounded-lg border border-tng-border-subtle bg-transparent px-4 py-2 text-sm font-medium text-tng-fg-primary">B1</button>
      <button role="gridcell" type="button" class="rounded-lg border border-tng-border-subtle bg-transparent px-4 py-2 text-sm font-medium text-tng-fg-primary">B2</button>
      <button role="gridcell" type="button" class="rounded-lg border border-tng-border-subtle bg-transparent px-4 py-2 text-sm font-medium text-tng-fg-primary">B3</button>
    </div>
  </section>

  <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
    <h2 class="text-lg font-semibold">Components (`tng-grid`)</h2>
    <tng-grid>
      <div role="grid" class="grid grid-cols-3 gap-2">
        <div class="rounded-lg border border-tng-border-subtle bg-tng-bg-canvas p-3 text-tng-fg-primary">Token</div>
        <div class="rounded-lg border border-tng-border-subtle bg-tng-bg-canvas p-3 text-tng-fg-primary">Value</div>
        <div class="rounded-lg border border-tng-border-subtle bg-tng-bg-canvas p-3 text-tng-fg-primary">Scope</div>
        <div class="rounded-lg border border-tng-border-subtle bg-tng-bg-canvas p-3 text-tng-fg-primary">surface.primary</div>
        <div class="rounded-lg border border-tng-border-subtle bg-tng-bg-canvas p-3 text-tng-fg-primary">--tng-semantic-background-surface</div>
        <div class="rounded-lg border border-tng-border-subtle bg-tng-bg-canvas p-3 text-tng-fg-primary">dark</div>
      </div>
    </tng-grid>
  </section>
</div>
