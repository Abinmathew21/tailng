<div class="mx-auto max-w-[72rem] grid gap-5">
  <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
    <h2 class="text-lg font-semibold">Primitives (`tngButtonToggle` / `tngButtonToggleGroup`)</h2>
    <div class="space-y-4">
      <div>
        <p class="text-sm text-tng-fg-secondary mb-2">Single-select alignment</p>
        <div tngButtonToggleGroup class="flex flex-wrap gap-2">
          <button
            tngButtonToggle
            [pressed]="primitiveAlign() === 'left'"
            class="rounded-lg border px-4 py-2 text-sm font-medium transition"
            [class.border-tng-accent-brand]="primitiveAlign() === 'left'"
            [class.bg-tng-accent-brand]="primitiveAlign() === 'left'"
            [class.text-tng-fg-inverse]="primitiveAlign() === 'left'"
            [class.border-tng-border-subtle]="primitiveAlign() !== 'left'"
            [class.bg-transparent]="primitiveAlign() !== 'left'"
            [class.text-tng-fg-primary]="primitiveAlign() !== 'left'"
            (click)="onPrimitiveAlignChange('left')"
          >
            Left
          </button>
          <button
            tngButtonToggle
            [pressed]="primitiveAlign() === 'center'"
            class="rounded-lg border px-4 py-2 text-sm font-medium transition"
            [class.border-tng-accent-brand]="primitiveAlign() === 'center'"
            [class.bg-tng-accent-brand]="primitiveAlign() === 'center'"
            [class.text-tng-fg-inverse]="primitiveAlign() === 'center'"
            [class.border-tng-border-subtle]="primitiveAlign() !== 'center'"
            [class.bg-transparent]="primitiveAlign() !== 'center'"
            [class.text-tng-fg-primary]="primitiveAlign() !== 'center'"
            (click)="onPrimitiveAlignChange('center')"
          >
            Center
          </button>
          <button
            tngButtonToggle
            [pressed]="primitiveAlign() === 'right'"
            class="rounded-lg border px-4 py-2 text-sm font-medium transition"
            [class.border-tng-accent-brand]="primitiveAlign() === 'right'"
            [class.bg-tng-accent-brand]="primitiveAlign() === 'right'"
            [class.text-tng-fg-inverse]="primitiveAlign() === 'right'"
            [class.border-tng-border-subtle]="primitiveAlign() !== 'right'"
            [class.bg-transparent]="primitiveAlign() !== 'right'"
            [class.text-tng-fg-primary]="primitiveAlign() !== 'right'"
            (click)="onPrimitiveAlignChange('right')"
          >
            Right
          </button>
        </div>
      </div>

      <div>
        <p class="text-sm text-tng-fg-secondary mb-2">Multi-select text styles</p>
        <div tngButtonToggleGroup class="flex flex-wrap gap-2">
          <button
            tngButtonToggle
            [pressed]="isSelected(primitiveStyles(), 'bold')"
            class="rounded-lg border px-4 py-2 text-sm font-medium transition"
            [class.border-tng-accent-brand]="isSelected(primitiveStyles(), 'bold')"
            [class.bg-tng-accent-brand]="isSelected(primitiveStyles(), 'bold')"
            [class.text-tng-fg-inverse]="isSelected(primitiveStyles(), 'bold')"
            [class.border-tng-border-subtle]="!isSelected(primitiveStyles(), 'bold')"
            [class.bg-transparent]="!isSelected(primitiveStyles(), 'bold')"
            [class.text-tng-fg-primary]="!isSelected(primitiveStyles(), 'bold')"
            (click)="onPrimitiveStyleToggle('bold')"
          >
            Bold
          </button>
          <button
            tngButtonToggle
            [pressed]="isSelected(primitiveStyles(), 'italic')"
            class="rounded-lg border px-4 py-2 text-sm font-medium transition"
            [class.border-tng-accent-brand]="isSelected(primitiveStyles(), 'italic')"
            [class.bg-tng-accent-brand]="isSelected(primitiveStyles(), 'italic')"
            [class.text-tng-fg-inverse]="isSelected(primitiveStyles(), 'italic')"
            [class.border-tng-border-subtle]="!isSelected(primitiveStyles(), 'italic')"
            [class.bg-transparent]="!isSelected(primitiveStyles(), 'italic')"
            [class.text-tng-fg-primary]="!isSelected(primitiveStyles(), 'italic')"
            (click)="onPrimitiveStyleToggle('italic')"
          >
            Italic
          </button>
          <button
            tngButtonToggle
            [pressed]="isSelected(primitiveStyles(), 'underline')"
            class="rounded-lg border px-4 py-2 text-sm font-medium transition"
            [class.border-tng-accent-brand]="isSelected(primitiveStyles(), 'underline')"
            [class.bg-tng-accent-brand]="isSelected(primitiveStyles(), 'underline')"
            [class.text-tng-fg-inverse]="isSelected(primitiveStyles(), 'underline')"
            [class.border-tng-border-subtle]="!isSelected(primitiveStyles(), 'underline')"
            [class.bg-transparent]="!isSelected(primitiveStyles(), 'underline')"
            [class.text-tng-fg-primary]="!isSelected(primitiveStyles(), 'underline')"
            (click)="onPrimitiveStyleToggle('underline')"
          >
            Underline
          </button>
        </div>
      </div>
    </div>
  </section>

  <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
    <h2 class="text-lg font-semibold">Components (`tng-button-toggle` / `tng-button-toggle-group`)</h2>
    <div class="space-y-4">
      <div>
        <p class="text-sm text-tng-fg-secondary mb-2">Single-select alignment</p>
        <tng-button-toggle-group ariaLabel="Text alignment">
          <tng-button-toggle
            [pressed]="componentAlign() === 'left'"
            (pressedChange)="onComponentAlignToggle('left', $event)"
          >
            Left
          </tng-button-toggle>
          <tng-button-toggle
            [pressed]="componentAlign() === 'center'"
            (pressedChange)="onComponentAlignToggle('center', $event)"
          >
            Center
          </tng-button-toggle>
          <tng-button-toggle
            [pressed]="componentAlign() === 'right'"
            (pressedChange)="onComponentAlignToggle('right', $event)"
          >
            Right
          </tng-button-toggle>
        </tng-button-toggle-group>
      </div>

      <div>
        <p class="text-sm text-tng-fg-secondary mb-2">Multi-select text styles</p>
        <tng-button-toggle-group ariaLabel="Text styles">
          <tng-button-toggle
            [pressed]="isSelected(componentStyles(), 'bold')"
            (pressedChange)="onComponentStyleToggle('bold', $event)"
          >
            Bold
          </tng-button-toggle>
          <tng-button-toggle
            [pressed]="isSelected(componentStyles(), 'italic')"
            (pressedChange)="onComponentStyleToggle('italic', $event)"
          >
            Italic
          </tng-button-toggle>
          <tng-button-toggle
            [pressed]="isSelected(componentStyles(), 'underline')"
            (pressedChange)="onComponentStyleToggle('underline', $event)"
          >
            Underline
          </tng-button-toggle>
        </tng-button-toggle-group>
      </div>
    </div>
  </section>
</div>
