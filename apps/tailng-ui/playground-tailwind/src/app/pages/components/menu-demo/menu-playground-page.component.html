<div class="mx-auto max-w-[72rem] grid gap-5">
  <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
    <h2 class="text-lg font-semibold">Primitives (`tngMenu`)</h2>
    <p class="text-sm text-tng-fg-secondary">Primitive gives keyboard behavior for menuitems. It is intentionally untriggered.</p>
    <ul tngMenu class="rounded-xl border border-tng-border-subtle bg-tng-bg-canvas p-1 list-none m-0 space-y-1">
      <li role="menuitem" tabindex="0" class="rounded px-2 py-1 cursor-pointer hover:bg-tng-bg-muted">Edit</li>
      <li role="menuitem" tabindex="-1" class="rounded px-2 py-1 cursor-pointer hover:bg-tng-bg-muted">Duplicate</li>
      <li role="menuitem" tabindex="-1" class="rounded px-2 py-1 cursor-pointer hover:bg-tng-bg-muted">Archive</li>
    </ul>
  </section>

  <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
    <h2 class="text-lg font-semibold">Components (`tng-menu` + `tngMenuTriggerFor`)</h2>
    <div>
      <button type="button" class="rounded-lg border border-tng-border-subtle bg-transparent px-4 py-2 text-sm font-medium text-tng-fg-primary" [tngMenuTriggerFor]="fileMenu">
        Open file actions
      </button>

      <tng-menu #fileMenu="tngMenu" ariaLabel="File actions">
        <li role="menuitem" tabindex="0" class="rounded px-2 py-1 cursor-pointer hover:bg-tng-bg-muted">Create file</li>
        <li role="menuitem" tabindex="-1" class="rounded px-2 py-1 cursor-pointer hover:bg-tng-bg-muted">Rename file</li>
        <li role="menuitem" tabindex="-1" class="rounded px-2 py-1 cursor-pointer hover:bg-tng-bg-muted">Delete file</li>
      </tng-menu>
    </div>
  </section>
</div>
