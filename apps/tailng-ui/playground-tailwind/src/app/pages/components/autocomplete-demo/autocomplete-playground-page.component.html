<div class="mx-auto max-w-[72rem] grid gap-5">
  <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
    <h2 class="text-lg font-semibold">Primitives (`tngAutocomplete`)</h2>
    <div tngAutocomplete class="rounded-xl border border-tng-border-subtle px-4 py-3 text-tng-fg-primary space-y-2">
      <label for="autocomplete-framework" class="block text-sm text-tng-fg-secondary">Search framework</label>
      <input
        id="autocomplete-framework"
        type="text"
        role="combobox"
        aria-expanded="true"
        aria-controls="autocomplete-list"
        value="ang"
        class="w-full rounded-lg border border-tng-border-subtle bg-tng-bg-canvas px-3 py-2 text-sm text-tng-fg-primary"
      />
      <ul id="autocomplete-list" role="listbox" class="mt-2 rounded-lg border border-tng-border-subtle bg-tng-bg-canvas p-1 text-sm">
        <li role="option" aria-selected="true" class="rounded px-2 py-1 hover:bg-tng-bg-muted">Angular</li>
        <li role="option" aria-selected="false" class="rounded px-2 py-1 hover:bg-tng-bg-muted">Angular CDK</li>
        <li role="option" aria-selected="false" class="rounded px-2 py-1 hover:bg-tng-bg-muted">Angular Material</li>
      </ul>
    </div>
  </section>

  <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
    <h2 class="text-lg font-semibold">Components (`tng-autocomplete`)</h2>
    <tng-autocomplete>
      <div class="rounded-xl border border-tng-border-subtle px-4 py-3 text-tng-fg-primary space-y-2">
        <p class="text-sm text-tng-fg-secondary">Owned wrapper around autocomplete structure.</p>
        <ul role="listbox" class="rounded-lg border border-tng-border-subtle bg-tng-bg-canvas p-1">
          <li role="option" aria-selected="false" class="rounded px-2 py-1 hover:bg-tng-bg-muted">Button</li>
          <li role="option" aria-selected="false" class="rounded px-2 py-1 hover:bg-tng-bg-muted">Checkbox</li>
          <li role="option" aria-selected="false" class="rounded px-2 py-1 hover:bg-tng-bg-muted">Dialog</li>
        </ul>
      </div>
    </tng-autocomplete>
  </section>
</div>
