<div class="mx-auto max-w-[72rem] grid gap-5">
  <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
    <h2 class="text-lg font-semibold">Primitives (`tngDropdownMenu`)</h2>
    <div tngDropdownMenu class="rounded-xl border border-tng-border-subtle px-4 py-3 text-tng-fg-primary">
      <button type="button" class="rounded-lg border border-tng-border-subtle bg-transparent px-4 py-2 text-sm font-medium text-tng-fg-primary">
        Open menu
      </button>
      <ul role="menu" class="mt-2 list-none p-0 m-0 space-y-1">
        <li role="menuitem" class="rounded px-2 py-1 cursor-pointer hover:bg-tng-bg-muted">Profile</li>
        <li role="menuitem" class="rounded px-2 py-1 cursor-pointer hover:bg-tng-bg-muted">Settings</li>
        <li role="menuitem" class="rounded px-2 py-1 cursor-pointer hover:bg-tng-bg-muted">Sign out</li>
      </ul>
    </div>
  </section>

  <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
    <h2 class="text-lg font-semibold">Components (`tng-dropdown-menu`)</h2>
    <tng-dropdown-menu label="Quick actions">
      <li role="menuitem" tabindex="0" class="rounded px-2 py-1 cursor-pointer hover:bg-tng-bg-muted">Open</li>
      <li role="menuitem" tabindex="-1" class="rounded px-2 py-1 cursor-pointer hover:bg-tng-bg-muted">Rename</li>
      <li role="menuitem" tabindex="-1" class="rounded px-2 py-1 cursor-pointer hover:bg-tng-bg-muted">Duplicate</li>
      <li role="menuitem" tabindex="-1" class="rounded px-2 py-1 cursor-pointer hover:bg-tng-bg-muted">Delete</li>
    </tng-dropdown-menu>
  </section>
</div>
