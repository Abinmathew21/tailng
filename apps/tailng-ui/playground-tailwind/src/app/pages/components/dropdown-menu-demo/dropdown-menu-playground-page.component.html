<main class="min-h-screen bg-slate-950 px-4 py-8 text-slate-100 md:px-8">
  <section class="mx-auto max-w-6xl space-y-6">
    <header class="space-y-3">
      <div class="flex flex-wrap items-center gap-3">
        <a
          routerLink="/"
          class="rounded-lg border border-slate-700 px-3 py-1.5 text-sm text-slate-300"
        >
          Home
        </a>
        <a
          routerLink="/menu"
          class="rounded-lg border border-slate-700 px-3 py-1.5 text-sm text-slate-300"
        >
          Menu Demo
        </a>
      </div>
      <h1 class="text-3xl font-semibold md:text-4xl">Dropdown Menu Demo (Tailwind)</h1>
      <p class="max-w-2xl text-slate-300">
        Triggered action list with escape and outside click dismissal.
      </p>
    </header>

    <section class="space-y-3 rounded-2xl border border-slate-700 bg-slate-900 p-5">
      <h2 class="text-lg font-semibold">Primitives (`tngDropdownMenu`)</h2>
      <div tngDropdownMenu class="rounded-xl border border-slate-700 bg-slate-950 p-4">
        Primitive shell for custom dropdown composition.
      </div>
    </section>

    <section class="space-y-3 rounded-2xl border border-slate-700 bg-slate-900 p-5">
      <h2 class="text-lg font-semibold">Components (`tng-dropdown-menu`)</h2>
      <tng-dropdown-menu label="Quick actions">
        <li role="menuitem" tabindex="0">Open</li>
        <li role="menuitem" tabindex="-1">Rename</li>
        <li role="menuitem" tabindex="-1">Delete</li>
      </tng-dropdown-menu>
    </section>
  </section>
</main>
