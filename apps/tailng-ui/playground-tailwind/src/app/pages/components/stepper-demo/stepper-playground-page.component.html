<main class="min-h-screen bg-slate-950 px-4 py-8 text-slate-100 md:px-8">
  <section class="mx-auto max-w-6xl space-y-6">
    <header class="space-y-3">
      <div class="flex flex-wrap items-center gap-3">
        <a
          routerLink="/"
          class="rounded-lg border border-slate-700 px-3 py-1.5 text-sm text-slate-300"
        >
          Home
        </a>
      </div>
      <h1 class="text-3xl font-semibold md:text-4xl">Stepper Demo (Tailwind)</h1>
      <p class="max-w-2xl text-slate-300">Ordered multi-step flow surface for guided tasks.</p>
    </header>

    <section class="space-y-3 rounded-2xl border border-slate-700 bg-slate-900 p-5">
      <h2 class="text-lg font-semibold">Primitives (`tngStepper`)</h2>
      <ol tngStepper class="space-y-2 text-sm">
        <li class="flex items-center gap-3 rounded-md border border-cyan-600 bg-cyan-950/30 p-2">
          <span
            class="inline-flex h-6 w-6 items-center justify-center rounded-full border border-cyan-500"
            >1</span
          >Project Details
        </li>
        <li class="flex items-center gap-3 rounded-md border border-slate-700 p-2">
          <span
            class="inline-flex h-6 w-6 items-center justify-center rounded-full border border-slate-600"
            >2</span
          >Theme Setup
        </li>
        <li class="flex items-center gap-3 rounded-md border border-slate-700 p-2">
          <span
            class="inline-flex h-6 w-6 items-center justify-center rounded-full border border-slate-600"
            >3</span
          >Publish
        </li>
      </ol>
    </section>

    <section class="space-y-3 rounded-2xl border border-slate-700 bg-slate-900 p-5">
      <h2 class="text-lg font-semibold">Components (`tng-stepper`)</h2>
      <tng-stepper>
        <ol class="space-y-2 text-sm text-slate-300">
          <li class="flex items-center gap-3 rounded-md border border-slate-800 p-2">
            <span
              class="inline-flex h-6 w-6 items-center justify-center rounded-full border border-emerald-500 text-emerald-300"
              >✓</span
            >Draft
          </li>
          <li class="flex items-center gap-3 rounded-md border border-cyan-600 bg-cyan-950/30 p-2">
            <span
              class="inline-flex h-6 w-6 items-center justify-center rounded-full border border-cyan-500"
              >2</span
            >Review
          </li>
          <li class="flex items-center gap-3 rounded-md border border-slate-800 p-2">
            <span
              class="inline-flex h-6 w-6 items-center justify-center rounded-full border border-slate-700"
              >3</span
            >Release
          </li>
        </ol>
      </tng-stepper>
    </section>
  </section>
</main>
