<div class="mx-auto max-w-[72rem] grid gap-5">
  <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
    <h2 class="text-lg font-semibold">Primitives (`tngToggleGroup`)</h2>
    <div tngToggleGroup role="group" aria-label="Text style" class="rounded-xl border border-tng-border-subtle px-4 py-3 text-tng-fg-primary flex flex-wrap gap-2">
      <button type="button" aria-pressed="true" class="rounded-lg border border-tng-accent-brand bg-tng-accent-brand px-4 py-2 text-sm font-medium text-tng-fg-inverse">
        Bold
      </button>
      <button type="button" aria-pressed="false" class="rounded-lg border border-tng-border-subtle bg-transparent px-4 py-2 text-sm font-medium text-tng-fg-primary">
        Italic
      </button>
      <button type="button" aria-pressed="false" class="rounded-lg border border-tng-border-subtle bg-transparent px-4 py-2 text-sm font-medium text-tng-fg-primary">
        Underline
      </button>
    </div>
  </section>

  <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
    <h2 class="text-lg font-semibold">Components (`tng-toggle-group`)</h2>
    <tng-toggle-group>
      <div role="group" aria-label="Alignment" class="rounded-xl border border-tng-border-subtle px-4 py-3 text-tng-fg-primary flex flex-wrap gap-2">
        <button type="button" aria-pressed="false" class="rounded-lg border border-tng-border-subtle bg-transparent px-4 py-2 text-sm font-medium text-tng-fg-primary">Left</button>
        <button type="button" aria-pressed="true" class="rounded-lg border border-tng-accent-brand bg-tng-accent-brand px-4 py-2 text-sm font-medium text-tng-fg-inverse">
          Center
        </button>
        <button type="button" aria-pressed="false" class="rounded-lg border border-tng-border-subtle bg-transparent px-4 py-2 text-sm font-medium text-tng-fg-primary">Right</button>
      </div>
    </tng-toggle-group>
  </section>
</div>
