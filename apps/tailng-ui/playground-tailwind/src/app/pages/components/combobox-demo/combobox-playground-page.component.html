<div class="mx-auto max-w-[72rem] grid gap-5">
  <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
    <h2 class="text-lg font-semibold">Primitives (`tngCombobox`)</h2>
    <div tngCombobox class="rounded-xl border border-tng-border-subtle px-4 py-3 text-tng-fg-primary space-y-2">
      <label for="combobox-framework" class="block text-sm text-tng-fg-secondary">Framework</label>
      <div class="flex gap-2">
        <input
          id="combobox-framework"
          type="text"
          role="combobox"
          aria-expanded="true"
          aria-controls="combo-options"
          value="Angular"
          class="flex-1 rounded-lg border border-tng-border-subtle bg-tng-bg-canvas px-3 py-2 text-sm text-tng-fg-primary"
        />
        <button type="button" class="rounded-lg border border-tng-border-subtle bg-transparent px-4 py-2 text-sm font-medium text-tng-fg-primary">Toggle</button>
      </div>
      <ul id="combo-options" role="listbox" class="rounded-lg border border-tng-border-subtle bg-tng-bg-canvas p-1">
        <li role="option" aria-selected="true" class="rounded px-2 py-1 bg-tng-accent-brand/45">Angular</li>
        <li role="option" aria-selected="false" class="rounded px-2 py-1 hover:bg-tng-bg-muted">React</li>
        <li role="option" aria-selected="false" class="rounded px-2 py-1 hover:bg-tng-bg-muted">Vue</li>
      </ul>
    </div>
  </section>

  <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
    <h2 class="text-lg font-semibold">Components (`tng-combobox`)</h2>
    <tng-combobox>
      <div class="rounded-xl border border-tng-border-subtle px-4 py-3 text-tng-fg-primary">
        <p class="text-sm text-tng-fg-secondary mb-2">Owned combobox shell with room for trigger and options.</p>
        <div class="rounded-lg border border-tng-border-subtle bg-tng-bg-canvas p-3">Selected: Tailwind</div>
      </div>
    </tng-combobox>
  </section>
</div>
