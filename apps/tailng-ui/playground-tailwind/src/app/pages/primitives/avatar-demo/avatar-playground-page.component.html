<main class="min-h-screen bg-slate-950 px-4 py-8 text-slate-100 md:px-8">
  <section class="mx-auto max-w-6xl space-y-6">
    <header class="space-y-3">
      <div class="flex flex-wrap items-center gap-3">
        <a
          routerLink="/"
          class="rounded-lg border border-slate-700 px-3 py-1.5 text-sm text-slate-300"
        >
          Home
        </a>
        <a
          routerLink="/theme"
          class="rounded-lg border border-slate-700 px-3 py-1.5 text-sm text-slate-300"
        >
          Theme Demo
        </a>
        <a
          routerLink="/button"
          class="rounded-lg border border-slate-700 px-3 py-1.5 text-sm text-slate-300"
        >
          Button Demo
        </a>
        <a
          routerLink="/card"
          class="rounded-lg border border-slate-700 px-3 py-1.5 text-sm text-slate-300"
        >
          Card Demo
        </a>
      </div>
      <h1 class="text-3xl font-semibold md:text-4xl">Avatar Demo (Tailwind)</h1>
      <p class="max-w-2xl text-slate-300">
        Avatar is not focusable by default and becomes interactive only when wrapped in button/link.
      </p>
    </header>

    <section class="space-y-3 rounded-2xl border border-slate-700 bg-slate-900 p-5">
      <h2 class="text-lg font-semibold">Primitives (`tngAvatar*`)</h2>
      <div class="flex flex-wrap items-center gap-4">
        <span
          tngAvatar
          class="relative inline-flex h-11 w-11 items-center justify-center overflow-hidden rounded-full border border-cyan-500 bg-slate-800 text-sm font-semibold text-cyan-200"
        >
          <img tngAvatarImage [src]="sampleImage" alt="User photo" class="h-full w-full object-cover" />
          <span tngAvatarFallback class="absolute inset-0 hidden items-center justify-center">TN</span>
        </span>

        <span
          tngAvatar
          class="relative inline-flex h-11 w-11 items-center justify-center overflow-hidden rounded-full border border-slate-600 bg-slate-800 text-sm font-semibold text-slate-200"
        >
          <img tngAvatarImage src="broken://avatar" alt="Broken avatar" class="h-full w-full object-cover" />
          <span tngAvatarFallback class="absolute inset-0 flex items-center justify-center">AV</span>
        </span>
      </div>
    </section>

    <section class="space-y-3 rounded-2xl border border-slate-700 bg-slate-900 p-5">
      <h2 class="text-lg font-semibold">Component (`tng-avatar`)</h2>
      <div class="flex flex-wrap items-center gap-4">
        <tng-avatar [src]="sampleImage" fallback="Tail Ng"></tng-avatar>
        <tng-avatar src="broken://avatar" fallback="Avatar User"></tng-avatar>
        <tng-avatar fallback="Square User" shape="square"></tng-avatar>
        <tng-avatar fallback="Small User" size="sm"></tng-avatar>
        <tng-avatar fallback="Large User" size="lg"></tng-avatar>
      </div>
    </section>
  </section>
</main>
