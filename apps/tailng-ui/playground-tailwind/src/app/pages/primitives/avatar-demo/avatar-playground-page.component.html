<div class="mx-auto max-w-[72rem] grid gap-5">
  <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
    <h2 class="text-lg font-semibold">Primitives (`tngAvatar*`)</h2>
    <div class="flex flex-wrap items-center gap-4">
      <span tngAvatar class="relative inline-flex h-11 w-11 items-center justify-center overflow-hidden rounded-full border border-tng-border-subtle bg-tng-bg-surface">
        <img tngAvatarImage [src]="sampleImage" alt="User photo" class="h-full w-full object-cover" />
        <span tngAvatarFallback class="absolute inset-0 hidden items-center justify-center text-sm font-bold text-tng-fg-primary">TN</span>
      </span>

      <span tngAvatar class="relative inline-flex h-11 w-11 items-center justify-center overflow-hidden rounded-full border border-tng-border-subtle bg-tng-bg-surface">
        <img tngAvatarImage src="broken://avatar" alt="Broken avatar" class="h-full w-full object-cover" />
        <span tngAvatarFallback class="absolute inset-0 flex items-center justify-center text-sm font-bold text-tng-fg-primary">AV</span>
      </span>
    </div>
  </section>

  <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
    <h2 class="text-lg font-semibold">Component (`tng-avatar`)</h2>
    <div class="flex flex-wrap items-center gap-4">
      <tng-avatar [src]="sampleImage" fallback="Tail Ng"></tng-avatar>
      <tng-avatar src="broken://avatar" fallback="Avatar User"></tng-avatar>
      <tng-avatar fallback="Square User" shape="square"></tng-avatar>
      <tng-avatar fallback="Small User" size="sm"></tng-avatar>
      <tng-avatar fallback="Large User" size="lg"></tng-avatar>
    </div>
  </section>
</div>
