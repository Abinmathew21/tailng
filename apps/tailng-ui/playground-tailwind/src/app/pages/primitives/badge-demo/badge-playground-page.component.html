<div class="mx-auto max-w-[72rem] grid gap-5">
  <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
    <h2 class="text-lg font-semibold">Default</h2>
    <div class="flex flex-wrap gap-3">
      <button type="button" [tngBadge]="7">Inbox</button>
      <button type="button" [tngBadge]="103" [tngBadgeMax]="99">
        Notifications
      </button>
      <button type="button" [tngBadge]="null" [tngBadgeDot]="true">Presence</button>
    </div>
  </section>

  <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
    <h2 class="text-lg font-semibold">Tone, Position, and Micro Styling</h2>
    <div class="flex flex-wrap gap-3">
      <button
        type="button"
        [tngBadge]="12"
        tngBadgeTone="success"
        tngBadgePosition="top-start"
      >
        Deployments
      </button>

      <button
        type="button"
        [tngBadge]="3"
        tngBadgeTone="warning"
        tngBadgePosition="bottom-end"
      >
        Warnings
      </button>

      <button
        type="button"
        [tngBadge]="9"
        [tngBadgeClass]="'shadow ring'"
        [tngBadgeStyle]="customBadgeStyle"
      >
        Custom
      </button>
    </div>
  </section>
</div>
