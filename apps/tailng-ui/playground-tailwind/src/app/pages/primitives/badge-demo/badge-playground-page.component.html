<main class="min-h-screen bg-slate-950 px-4 py-8 text-slate-100 md:px-8">
  <section class="mx-auto max-w-6xl space-y-6">
    <header class="space-y-3">
      <div class="flex flex-wrap items-center gap-3">
        <a
          routerLink="/"
          class="rounded-lg border border-slate-700 px-3 py-1.5 text-sm text-slate-300"
        >
          Home
        </a>
        <a
          routerLink="/tag"
          class="rounded-lg border border-slate-700 px-3 py-1.5 text-sm text-slate-300"
        >
          Tag Demo
        </a>
      </div>
      <h1 class="text-3xl font-semibold md:text-4xl">Badge Demo (Tailwind)</h1>
      <p class="max-w-2xl text-slate-300">
        Material-style notification badges anchored to host elements. You can customize per-instance
        with `tngBadgeClass` and `tngBadgeStyle`.
      </p>
    </header>

    <section class="space-y-3 rounded-2xl border border-slate-700 bg-slate-900 p-5">
      <h2 class="text-lg font-semibold">Default</h2>
      <div class="flex flex-wrap items-center gap-8">
        <button type="button" [tngBadge]="7" class="rounded-lg bg-slate-800 px-4 py-2">
          Inbox
        </button>
        <button
          type="button"
          [tngBadge]="103"
          [tngBadgeMax]="99"
          class="rounded-lg bg-slate-800 px-4 py-2"
        >
          Notifications
        </button>
        <button
          type="button"
          [tngBadge]="null"
          [tngBadgeDot]="true"
          class="rounded-lg bg-slate-800 px-4 py-2"
        >
          Presence
        </button>
      </div>
    </section>

    <section class="space-y-3 rounded-2xl border border-slate-700 bg-slate-900 p-5">
      <h2 class="text-lg font-semibold">Tone, Position, and Micro Styling</h2>
      <div class="flex flex-wrap items-center gap-8">
        <button
          type="button"
          [tngBadge]="12"
          tngBadgeTone="success"
          tngBadgePosition="top-start"
          class="rounded-lg bg-slate-800 px-4 py-2"
        >
          Deployments
        </button>

        <button
          type="button"
          [tngBadge]="3"
          tngBadgeTone="warning"
          tngBadgePosition="bottom-end"
          class="rounded-lg bg-slate-800 px-4 py-2"
        >
          Warnings
        </button>

        <button
          type="button"
          [tngBadge]="9"
          [tngBadgeClass]="'ring-2 ring-slate-900 shadow-lg'"
          [tngBadgeStyle]="customBadgeStyle"
          class="rounded-lg bg-slate-800 px-4 py-2"
        >
          Custom
        </button>
      </div>
    </section>
  </section>
</main>
