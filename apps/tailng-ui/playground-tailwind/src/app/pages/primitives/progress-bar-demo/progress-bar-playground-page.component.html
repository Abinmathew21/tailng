<div class="mx-auto max-w-[72rem] grid gap-5">
  <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
    <h2 class="text-lg font-semibold">Primitives (`tngProgressBar`)</h2>
    <div class="grid gap-3">
      <div tngProgressBar [value]="completion" class="h-2 overflow-hidden rounded-full bg-tng-bg-muted">
        <span
          tngProgressBarIndicator
          class="block h-full rounded-full bg-tng-accent-brand"
          [style.width.%]="completion"
        ></span>
      </div>
      <div tngProgressBar [indeterminate]="true" class="h-2 overflow-hidden rounded-full bg-tng-bg-muted">
        <span tngProgressBarIndicator class="block h-full w-1/3 animate-pulse rounded-full bg-tng-accent-brand"></span>
      </div>
    </div>
  </section>

  <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
    <h2 class="text-lg font-semibold">Components (`tng-progress-bar`)</h2>
    <div class="grid gap-3">
      <tng-progress-bar [value]="completion" ariaLabel="Upload progress"></tng-progress-bar>
      <tng-progress-bar [value]="34"></tng-progress-bar>
      <tng-progress-bar [indeterminate]="true" ariaLabel="Loading data"></tng-progress-bar>
    </div>
  </section>
</div>
