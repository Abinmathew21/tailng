<main class="min-h-screen bg-slate-950 px-4 py-8 text-slate-100 md:px-8">
  <section class="mx-auto max-w-6xl space-y-6">
    <header class="space-y-3">
      <div class="flex flex-wrap items-center gap-3">
        <a
          routerLink="/"
          class="rounded-lg border border-slate-700 px-3 py-1.5 text-sm text-slate-300"
        >
          Home
        </a>
        <a
          routerLink="/empty"
          class="rounded-lg border border-slate-700 px-3 py-1.5 text-sm text-slate-300"
        >
          Empty Demo
        </a>
        <a
          routerLink="/progress-spinner"
          class="rounded-lg border border-slate-700 px-3 py-1.5 text-sm text-slate-300"
        >
          Spinner Demo
        </a>
      </div>
      <h1 class="text-3xl font-semibold md:text-4xl">Progress Bar Demo (Tailwind)</h1>
      <p class="max-w-2xl text-slate-300">
        Linear progress indicator with determinate and indeterminate states.
      </p>
    </header>

    <section class="space-y-3 rounded-2xl border border-slate-700 bg-slate-900 p-5">
      <h2 class="text-lg font-semibold">Primitives (`tngProgressBar`)</h2>
      <div class="space-y-4">
        <div tngProgressBar [value]="completion" class="h-2 overflow-hidden rounded-full bg-slate-800">
          <span
            tngProgressBarIndicator
            class="block h-full rounded-full bg-cyan-400"
            [style.width.%]="completion"
          ></span>
        </div>
        <div tngProgressBar [indeterminate]="true" class="h-2 overflow-hidden rounded-full bg-slate-800">
          <span tngProgressBarIndicator class="indeterminate block h-full w-2/5 rounded-full bg-cyan-400"></span>
        </div>
      </div>
    </section>

    <section class="space-y-3 rounded-2xl border border-slate-700 bg-slate-900 p-5">
      <h2 class="text-lg font-semibold">Components (`tng-progress-bar`)</h2>
      <div class="space-y-4">
        <tng-progress-bar [value]="completion" ariaLabel="Upload progress" />
        <tng-progress-bar [value]="34" />
        <tng-progress-bar [indeterminate]="true" ariaLabel="Loading data" />
      </div>
    </section>
  </section>
</main>
