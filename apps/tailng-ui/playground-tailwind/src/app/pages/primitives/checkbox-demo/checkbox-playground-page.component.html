<div class="mx-auto max-w-[72rem] grid gap-5">
  <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
    <h2 class="text-lg font-semibold">Primitives (`tngCheckbox`)</h2>
    <div class="grid gap-3">
      <label class="flex items-center gap-2"><input tngCheckbox [checked]="true" /> Checked</label>
      <label class="flex items-center gap-2"
        ><input tngCheckbox [indeterminate]="true" /> Mixed (indeterminate)</label
      >
      <label class="flex items-center gap-2 opacity-55"><input tngCheckbox [disabled]="true" /> Disabled</label>
    </div>
  </section>

  <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
    <h2 class="text-lg font-semibold">Components (`tng-checkbox`)</h2>
    <div class="grid gap-3">
      <tng-checkbox
        [checked]="acceptedTerms()"
        [indeterminate]="acceptedTermsIndeterminate()"
        (checkedChange)="onCheckedChange($event)"
        (indeterminateChange)="onIndeterminateChange($event)"
      >
        Accept terms and conditions
      </tng-checkbox>
    </div>
    <button type="button" class="rounded-lg border border-tng-border-subtle bg-transparent px-4 py-2 text-sm font-medium text-tng-fg-primary" (click)="setMixedState()">
      Reset to Mixed State
    </button>
    <p class="text-sm text-tng-fg-secondary m-0">
      checked: {{ acceptedTerms() }} | indeterminate: {{ acceptedTermsIndeterminate() }}
    </p>
  </section>
</div>
