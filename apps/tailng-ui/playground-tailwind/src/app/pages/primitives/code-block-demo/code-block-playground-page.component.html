<div class="mx-auto max-w-[72rem] grid gap-5">
  <div class="grid gap-5 sm:grid-cols-2">
    <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
      <h2 class="text-lg font-semibold">Adapter: plain (default)</h2>
      <tng-code-block [code]="angularSnippet" language="ts" />
    </section>

    <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
      <h2 class="text-lg font-semibold">Adapter: keyword (custom)</h2>
      <tng-code-block [code]="angularSnippet" language="ts" adapter="keyword" />
    </section>
  </div>

  <div class="grid gap-5 sm:grid-cols-2">
    <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
      <h2 class="text-lg font-semibold">Highlight Off + No Line Numbers</h2>
      <tng-code-block
        [code]="htmlSnippet"
        language="html"
        highlightMode="off"
        [showLineNumbers]="false"
      />
    </section>

    <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
      <h2 class="text-lg font-semibold">Wrapped Shell Example</h2>
      <tng-code-block [code]="shellSnippet" language="bash" [wrap]="true" />
    </section>
  </div>
</div>
