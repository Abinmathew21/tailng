<div class="mx-auto max-w-[72rem] grid gap-5">
  <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
    <h2 class="text-lg font-semibold">Primitives (`tngEmpty*`)</h2>
    <section tngEmpty class="grid gap-2 justify-items-center rounded-xl border-2 border-dashed border-tng-accent-brand p-6 text-center">
      <div tngEmptyIcon class="text-sm font-bold tracking-wider text-tng-accent-brand">BOX</div>
      <h3 tngEmptyTitle class="text-base m-0">No Messages</h3>
      <p tngEmptyDescription class="max-w-[30rem] text-tng-fg-secondary m-0">
        You have no messages yet. Invite your team to start collaborating.
      </p>
      <div tngEmptyActions class="flex flex-wrap gap-2">
        <button type="button" class="rounded-lg border-0 bg-tng-accent-brand px-4 py-2 text-sm font-bold text-tng-fg-inverse cursor-pointer">
          Invite Team
        </button>
      </div>
    </section>
  </section>

  <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
    <h2 class="text-lg font-semibold">Components (`tng-empty*`)</h2>
    <tng-empty>
      <tng-empty-icon>FILE</tng-empty-icon>
      <tng-empty-title>No Files Uploaded</tng-empty-title>
      <tng-empty-description>
        Upload your first file to get started with document processing.
      </tng-empty-description>
      <tng-empty-actions>
        <button type="button" class="rounded-lg border border-tng-border-strong bg-transparent px-4 py-2 text-sm font-medium text-tng-fg-secondary cursor-pointer">
          Learn More
        </button>
        <button type="button" class="rounded-lg border-0 bg-tng-accent-brand px-4 py-2 text-sm font-bold text-tng-fg-inverse cursor-pointer">
          Upload
        </button>
      </tng-empty-actions>
    </tng-empty>
  </section>
</div>
