<div class="mx-auto max-w-[72rem] grid gap-5">
  <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
    <h2 class="text-lg font-semibold">Primitives (`tngProgressSpinner`)</h2>
    <div class="flex flex-wrap gap-4">
      <span
        tngProgressSpinner
        [value]="completion"
        class="relative inline-flex h-10 w-10 items-center justify-center"
        aria-label="Sync progress"
      >
        <svg class="size-10 -rotate-90" viewBox="0 0 40 40">
          <circle cx="20" cy="20" r="18" fill="none" stroke="var(--tng-semantic-border-subtle)" stroke-width="4"></circle>
          <circle
            cx="20"
            cy="20"
            r="18"
            fill="none"
            stroke="var(--tng-semantic-accent-brand)"
            stroke-width="4"
            stroke-linecap="round"
            stroke-dasharray="113"
            [attr.stroke-dashoffset]="113 - (113 * completion) / 100"
          ></circle>
        </svg>
      </span>
      <span tngProgressSpinner [indeterminate]="true" class="inline-block size-10 animate-spin rounded-full border-4 border-tng-border-subtle border-t-tng-accent-brand"></span>
    </div>
  </section>

  <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
    <h2 class="text-lg font-semibold">Components (`tng-progress-spinner`)</h2>
    <div class="flex flex-wrap gap-4">
      <tng-progress-spinner [value]="completion" ariaLabel="Sync progress"></tng-progress-spinner>
      <tng-progress-spinner [value]="85" [size]="52"></tng-progress-spinner>
      <tng-progress-spinner [indeterminate]="true" ariaLabel="Loading"></tng-progress-spinner>
    </div>
  </section>
</div>
