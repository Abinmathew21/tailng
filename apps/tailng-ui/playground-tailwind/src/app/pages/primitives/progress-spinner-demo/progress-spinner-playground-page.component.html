<main class="min-h-screen bg-slate-950 px-4 py-8 text-slate-100 md:px-8">
  <section class="mx-auto max-w-6xl space-y-6">
    <header class="space-y-3">
      <div class="flex flex-wrap items-center gap-3">
        <a
          routerLink="/"
          class="rounded-lg border border-slate-700 px-3 py-1.5 text-sm text-slate-300"
        >
          Home
        </a>
        <a
          routerLink="/progress-bar"
          class="rounded-lg border border-slate-700 px-3 py-1.5 text-sm text-slate-300"
        >
          Progress Bar Demo
        </a>
      </div>
      <h1 class="text-3xl font-semibold md:text-4xl">Progress Spinner Demo (Tailwind)</h1>
      <p class="max-w-2xl text-slate-300">
        Circular progress indicator with determinate and indeterminate states.
      </p>
    </header>

    <section class="space-y-3 rounded-2xl border border-slate-700 bg-slate-900 p-5">
      <h2 class="text-lg font-semibold">Primitives (`tngProgressSpinner`)</h2>
      <div class="flex flex-wrap items-center gap-4">
        <span
          tngProgressSpinner
          [value]="completion"
          class="relative inline-flex h-10 w-10 items-center justify-center"
        >
          <svg class="h-full w-full" viewBox="0 0 40 40">
            <circle cx="20" cy="20" r="18" fill="none" stroke="#334155" stroke-width="4"></circle>
            <circle
              cx="20"
              cy="20"
              r="18"
              fill="none"
              stroke="#22d3ee"
              stroke-width="4"
              stroke-linecap="round"
              stroke-dasharray="113"
              [attr.stroke-dashoffset]="113 - (113 * completion) / 100"
              transform="rotate(-90 20 20)"
            ></circle>
          </svg>
        </span>
        <span tngProgressSpinner [indeterminate]="true" class="primitive-spinner"></span>
      </div>
    </section>

    <section class="space-y-3 rounded-2xl border border-slate-700 bg-slate-900 p-5">
      <h2 class="text-lg font-semibold">Components (`tng-progress-spinner`)</h2>
      <div class="flex flex-wrap items-center gap-4">
        <tng-progress-spinner [value]="completion" ariaLabel="Sync progress" />
        <tng-progress-spinner [value]="85" [size]="52" />
        <tng-progress-spinner [indeterminate]="true" ariaLabel="Loading" />
      </div>
    </section>
  </section>
</main>
