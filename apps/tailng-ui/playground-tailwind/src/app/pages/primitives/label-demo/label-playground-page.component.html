<main class="min-h-screen bg-slate-950 px-4 py-8 text-slate-100 md:px-8">
  <section class="mx-auto max-w-6xl space-y-6">
    <header class="space-y-3">
      <div class="flex flex-wrap items-center gap-3">
        <a
          routerLink="/"
          class="rounded-lg border border-slate-700 px-3 py-1.5 text-sm text-slate-300"
        >
          Home
        </a>
      </div>
      <h1 class="text-3xl font-semibold md:text-4xl">Label Demo (Tailwind)</h1>
      <p class="max-w-3xl text-slate-300">
        Accessible form labels for plain inputs and wrapped field controls.
      </p>
    </header>

    <section class="space-y-3 rounded-2xl border border-slate-700 bg-slate-900 p-5">
      <h2 class="text-lg font-semibold">Primitive (`label[tngLabel]`)</h2>
      <div class="grid gap-2">
        <label tngLabel for="primitive-email" class="text-sm font-medium text-slate-200">
          Email Address
        </label>
        <input
          id="primitive-email"
          type="email"
          class="rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm"
          placeholder="hello@tailng.dev"
        />
      </div>
    </section>

    <section class="space-y-3 rounded-2xl border border-slate-700 bg-slate-900 p-5">
      <h2 class="text-lg font-semibold">Component (`tng-label`)</h2>
      <button
        class="rounded-lg border border-slate-600 px-3 py-1.5 text-sm"
        (click)="onToggleRequired()"
      >
        Toggle Required Marker
      </button>
      <div class="grid gap-2">
        <tng-label forId="component-display-name" [required]="componentRequired()">
          Display Name
        </tng-label>
        <input
          id="component-display-name"
          type="text"
          class="rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm"
          placeholder="TailNG Team"
        />
      </div>
    </section>
  </section>
</main>
