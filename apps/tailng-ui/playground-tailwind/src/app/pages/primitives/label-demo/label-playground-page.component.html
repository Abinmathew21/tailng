<div class="mx-auto max-w-[72rem] grid gap-5">
  <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
    <h2 class="text-lg font-semibold">Primitive (`label[tngLabel]`)</h2>
    <div class="grid gap-2">
      <label tngLabel for="primitive-email">Email Address</label>
      <input id="primitive-email" type="email" placeholder="hello@tailng.dev" class="rounded-lg border border-tng-border-subtle bg-tng-bg-canvas px-3 py-2 text-tng-fg-primary" />
    </div>
  </section>

  <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
    <h2 class="text-lg font-semibold">Component (`tng-label`)</h2>
    <button class="rounded-lg border border-tng-border-subtle bg-transparent px-4 py-2 text-sm font-medium text-tng-fg-primary cursor-pointer" (click)="onToggleRequired()">
      Toggle Required Marker
    </button>
    <div class="grid gap-2">
      <tng-label forId="component-display-name" [required]="componentRequired()">
        Display Name
      </tng-label>
      <input id="component-display-name" type="text" placeholder="TailNG Team" class="rounded-lg border border-tng-border-subtle bg-tng-bg-canvas px-3 py-2 text-tng-fg-primary" />
    </div>
  </section>
</div>
