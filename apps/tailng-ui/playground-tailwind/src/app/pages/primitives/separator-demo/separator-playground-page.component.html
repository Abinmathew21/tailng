<div class="mx-auto max-w-[72rem] grid gap-5">
  <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
    <h2 class="text-lg font-semibold">Primitives (`tngSeparator`)</h2>
    <div class="grid gap-3">
      <div class="text-sm text-tng-fg-secondary">Top section</div>
      <div tngSeparator class="h-px bg-tng-border-subtle"></div>
      <div class="text-sm text-tng-fg-secondary">Bottom section</div>
      <div class="flex items-center gap-3">
        <span class="text-sm text-tng-fg-secondary">Left</span>
        <div tngSeparator orientation="vertical" class="w-px self-stretch bg-tng-border-subtle min-h-6"></div>
        <span class="text-sm text-tng-fg-secondary">Right</span>
      </div>
    </div>
  </section>

  <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
    <h2 class="text-lg font-semibold">Components (`tng-separator`)</h2>
    <div class="grid gap-3">
      <p class="text-sm text-tng-fg-secondary m-0">Horizontal</p>
      <tng-separator></tng-separator>
      <div class="flex items-center gap-3">
        <span class="text-sm text-tng-fg-secondary">Profile</span>
        <tng-separator orientation="vertical" class="self-stretch min-h-6"></tng-separator>
        <span class="text-sm text-tng-fg-secondary">Settings</span>
      </div>
    </div>
  </section>
</div>
