<main class="min-h-screen bg-slate-950 px-4 py-8 text-slate-100 md:px-8">
  <section class="mx-auto max-w-6xl space-y-6">
    <header class="space-y-3">
      <div class="flex flex-wrap items-center gap-3">
        <a
          routerLink="/"
          class="rounded-lg border border-slate-700 px-3 py-1.5 text-sm text-slate-300"
        >
          Home
        </a>
        <a
          routerLink="/tag"
          class="rounded-lg border border-slate-700 px-3 py-1.5 text-sm text-slate-300"
        >
          Tag Demo
        </a>
        <a
          routerLink="/empty"
          class="rounded-lg border border-slate-700 px-3 py-1.5 text-sm text-slate-300"
        >
          Empty Demo
        </a>
      </div>
      <h1 class="text-3xl font-semibold md:text-4xl">Separator Demo (Tailwind)</h1>
      <p class="max-w-2xl text-slate-300">
        Visual divider examples using primitive `tngSeparator` and component `tng-separator`.
      </p>
    </header>

    <section class="space-y-3 rounded-2xl border border-slate-700 bg-slate-900 p-5">
      <h2 class="text-lg font-semibold">Primitives (`tngSeparator`)</h2>
      <div class="space-y-3">
        <div class="text-sm text-slate-300">Top section</div>
        <div tngSeparator class="h-px w-full bg-cyan-500/60"></div>
        <div class="text-sm text-slate-300">Bottom section</div>
        <div class="flex h-8 items-center gap-3">
          <span class="text-sm text-slate-300">Left</span>
          <div tngSeparator orientation="vertical" class="h-full w-px bg-cyan-500/60"></div>
          <span class="text-sm text-slate-300">Right</span>
        </div>
      </div>
    </section>

    <section class="space-y-3 rounded-2xl border border-slate-700 bg-slate-900 p-5">
      <h2 class="text-lg font-semibold">Components (`tng-separator`)</h2>
      <div class="space-y-3">
        <p class="text-sm text-slate-300">Horizontal</p>
        <tng-separator />
        <div class="flex h-8 items-center gap-3">
          <span class="text-sm text-slate-300">Profile</span>
          <tng-separator orientation="vertical" />
          <span class="text-sm text-slate-300">Settings</span>
        </div>
      </div>
    </section>
  </section>
</main>
