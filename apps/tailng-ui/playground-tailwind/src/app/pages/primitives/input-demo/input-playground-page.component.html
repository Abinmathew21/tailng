<div class="mx-auto max-w-[72rem] grid gap-5">
  <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
    <h2 class="text-lg font-semibold">Primitives (`tngInput`)</h2>
    <div class="grid gap-3 sm:max-w-md">
      <input tngInput type="text" placeholder="Email" class="rounded-lg border border-tng-border-subtle bg-tng-bg-canvas px-3 py-2 text-tng-fg-primary" />
      <input
        tngInput
        type="search"
        placeholder="Search docs"
        [ariaInvalid]="true"
        class="rounded-lg border border-tng-accent-danger bg-tng-bg-canvas px-3 py-2 text-tng-fg-primary"
      />
      <input
        tngInput
        type="password"
        placeholder="Readonly token"
        [readonly]="true"
        value="tailng-secret"
        class="rounded-lg border border-tng-border-subtle bg-tng-bg-canvas px-3 py-2 text-tng-fg-primary"
      />
    </div>
  </section>

  <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
    <h2 class="text-lg font-semibold">Components (`tng-input`)</h2>
    <div class="grid gap-3 sm:max-w-md">
      <tng-input placeholder="Project name" />
      <tng-input type="email" placeholder="team@tailng.dev" [required]="true" />
      <tng-input placeholder="Disabled input" [disabled]="true" value="Cannot edit" />
    </div>
  </section>
</div>
