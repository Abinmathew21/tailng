<div class="mx-auto max-w-[72rem] grid gap-5">
  <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
    <h2 class="text-lg font-semibold">Primitives (`textarea[tngInput]`)</h2>
    <div class="grid gap-3">
      <textarea
        tngInput
        rows="4"
        placeholder="Primitive textarea"
        class="rounded-lg border border-tng-border-subtle bg-tng-bg-canvas px-3 py-2 text-tng-fg-primary"
      ></textarea>
      <textarea
        tngInput
        [rows]="5"
        [ariaInvalid]="true"
        placeholder="Invalid sample"
        class="rounded-lg border border-tng-accent-danger bg-tng-bg-canvas px-3 py-2 text-tng-fg-primary"
      ></textarea>
    </div>
  </section>

  <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
    <h2 class="text-lg font-semibold">Components (`tng-textarea`)</h2>
    <div class="grid gap-3">
      <tng-textarea
        [rows]="4"
        [value]="notes()"
        placeholder="Write release notes"
        (valueChange)="onNotesChange($event)"
      />
    </div>
    <p class="text-sm text-tng-fg-secondary m-0">Current value: {{ notes() }}</p>
  </section>
</div>
