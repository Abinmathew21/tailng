<main class="min-h-screen bg-slate-950 px-4 py-8 text-slate-100 md:px-8">
  <section class="mx-auto max-w-6xl space-y-6">
    <header class="space-y-3">
      <div class="flex flex-wrap items-center gap-3">
        <a
          routerLink="/"
          class="rounded-lg border border-slate-700 px-3 py-1.5 text-sm text-slate-300"
        >
          Home
        </a>
        <a
          routerLink="/button"
          class="rounded-lg border border-slate-700 px-3 py-1.5 text-sm text-slate-300"
        >
          Button Demo
        </a>
        <a
          routerLink="/input"
          class="rounded-lg border border-slate-700 px-3 py-1.5 text-sm text-slate-300"
        >
          Input Demo
        </a>
        <a
          routerLink="/radio"
          class="rounded-lg border border-slate-700 px-3 py-1.5 text-sm text-slate-300"
        >
          Radio Demo
        </a>
        <a
          routerLink="/checkbox"
          class="rounded-lg border border-slate-700 px-3 py-1.5 text-sm text-slate-300"
        >
          Checkbox Demo
        </a>
      </div>
      <h1 class="text-3xl font-semibold md:text-4xl">Textarea Demo (Tailwind)</h1>
      <p class="max-w-2xl text-slate-300">
        Multi-line input primitive plus owned `tng-textarea` wrapper with value change events.
      </p>
    </header>

    <section class="space-y-3 rounded-2xl border border-slate-700 bg-slate-900 p-5">
      <h2 class="text-lg font-semibold">Primitives (`tngTextarea`)</h2>
      <div class="grid gap-3 sm:max-w-xl">
        <textarea
          tngTextarea
          rows="4"
          placeholder="Primitive textarea"
          class="rounded-xl border border-cyan-400 bg-slate-950 px-3 py-2"
        ></textarea>
        <textarea
          tngTextarea
          [rows]="5"
          [ariaInvalid]="true"
          placeholder="Invalid sample"
          class="rounded-xl border border-rose-500 bg-slate-950 px-3 py-2"
        ></textarea>
      </div>
    </section>

    <section class="space-y-3 rounded-2xl border border-slate-700 bg-slate-900 p-5">
      <h2 class="text-lg font-semibold">Components (`tng-textarea`)</h2>
      <div class="grid gap-3 sm:max-w-xl">
        <tng-textarea
          [rows]="4"
          [value]="notes()"
          placeholder="Write release notes"
          (valueChange)="onNotesChange($event)"
        />
      </div>
      <p class="text-sm text-cyan-200">Current value: {{ notes() }}</p>
    </section>
  </section>
</main>
