<main class="min-h-screen bg-slate-950 px-4 py-8 text-slate-100 md:px-8">
  <section class="mx-auto max-w-6xl space-y-6">
    <header class="space-y-3">
      <div class="flex flex-wrap items-center gap-3">
        <a
          routerLink="/"
          class="rounded-lg border border-slate-700 px-3 py-1.5 text-sm text-slate-300"
        >
          Home
        </a>
        <a
          routerLink="/separator"
          class="rounded-lg border border-slate-700 px-3 py-1.5 text-sm text-slate-300"
        >
          Separator Demo
        </a>
        <a
          routerLink="/empty"
          class="rounded-lg border border-slate-700 px-3 py-1.5 text-sm text-slate-300"
        >
          Empty Demo
        </a>
      </div>
      <h1 class="text-3xl font-semibold md:text-4xl">Tag Demo (Tailwind)</h1>
      <p class="max-w-2xl text-slate-300">
        Small status labels using unstyled primitive (`tngTag`) and owned wrapper (`tng-tag`).
      </p>
    </header>

    <section class="space-y-3 rounded-2xl border border-slate-700 bg-slate-900 p-5">
      <h2 class="text-lg font-semibold">Primitives (`tngTag`)</h2>
      <div class="flex flex-wrap items-center gap-3">
        <span tngTag class="rounded-full bg-cyan-500 px-2.5 py-1 text-xs font-semibold text-slate-950">
          New
        </span>
        <span
          tngTag
          class="rounded-full border border-emerald-400 px-2.5 py-1 text-xs font-semibold text-emerald-300"
        >
          Success
        </span>
        <span
          tngTag
          class="rounded-md bg-rose-500/20 px-2.5 py-1 text-xs font-semibold text-rose-300"
        >
          Failed
        </span>
      </div>
    </section>

    <section class="space-y-3 rounded-2xl border border-slate-700 bg-slate-900 p-5">
      <h2 class="text-lg font-semibold">Components (`tng-tag`)</h2>
      <div class="flex flex-wrap items-center gap-3">
        <tng-tag tone="neutral">Neutral</tng-tag>
        <tng-tag tone="info">Info</tng-tag>
        <tng-tag tone="success">Success</tng-tag>
        <tng-tag tone="warning">Warning</tng-tag>
        <tng-tag tone="danger">Danger</tng-tag>
        <tng-tag appearance="outline" tone="info">Outline</tng-tag>
        <tng-tag appearance="solid" tone="success">Solid</tng-tag>
        <tng-tag shape="rounded">Rounded</tng-tag>
      </div>
    </section>
  </section>
</main>
