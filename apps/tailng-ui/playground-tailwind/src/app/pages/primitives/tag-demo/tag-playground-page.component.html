<div class="mx-auto max-w-[72rem] grid gap-5">
  <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
    <h2 class="text-lg font-semibold">Primitives (`tngTag`)</h2>
    <div class="flex flex-wrap gap-3">
      <span tngTag class="rounded-md border border-tng-accent-brand bg-tng-accent-brand/20 px-3 py-1 text-sm font-medium text-tng-accent-brand">
        New
      </span>
      <span tngTag class="rounded-md border border-tng-accent-success bg-tng-accent-success/20 px-3 py-1 text-sm font-medium text-tng-accent-success">
        Success
      </span>
      <span tngTag class="rounded-md border border-tng-accent-danger bg-tng-accent-danger/20 px-3 py-1 text-sm font-medium text-tng-accent-danger">
        Failed
      </span>
    </div>
  </section>

  <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
    <h2 class="text-lg font-semibold">Components (`tng-tag`)</h2>
    <div class="flex flex-wrap gap-3">
      <tng-tag tone="neutral">Neutral</tng-tag>
      <tng-tag tone="info">Info</tng-tag>
      <tng-tag tone="success">Success</tng-tag>
      <tng-tag tone="warning">Warning</tng-tag>
      <tng-tag tone="danger">Danger</tng-tag>
      <tng-tag appearance="outline" tone="info">Outline</tng-tag>
      <tng-tag appearance="solid" tone="success">Solid</tng-tag>
      <tng-tag shape="rounded">Rounded</tng-tag>
    </div>
  </section>
</div>
