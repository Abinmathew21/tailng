<div class="mx-auto max-w-[72rem] grid gap-5">
  <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
    <h2 class="text-lg font-semibold">Controls</h2>
    <div class="flex flex-wrap gap-2">
      <button class="rounded-lg border border-tng-border-subtle bg-transparent px-4 py-2 text-sm font-medium text-tng-fg-primary cursor-pointer" (click)="onToggleAnimated()">
        Animation: {{ animated() ? 'On' : 'Off' }}
      </button>
      <button class="rounded-lg border border-tng-border-subtle bg-transparent px-4 py-2 text-sm font-medium text-tng-fg-primary cursor-pointer" (click)="onToggleRounded()">
        Rounded: {{ rounded() ? 'On' : 'Off' }}
      </button>
    </div>
  </section>

  <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
    <h2 class="text-lg font-semibold">Primitive (`[tngSkeleton]`)</h2>
    <div class="grid gap-3">
      <div
        tngSkeleton
        class="h-4 w-full max-w-md rounded bg-tng-bg-muted"
        [animated]="animated()"
        [rounded]="rounded()"
      ></div>
      <div
        tngSkeleton
        class="h-4 w-[40%] max-w-xs rounded bg-tng-bg-muted"
        [animated]="animated()"
        [rounded]="rounded()"
      ></div>
    </div>
  </section>

  <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
    <h2 class="text-lg font-semibold">Component (`tng-skeleton`)</h2>
    <div class="grid gap-3">
      <tng-skeleton width="75%" height="1rem" [animated]="animated()" [rounded]="rounded()" />
      <tng-skeleton width="40%" height="1rem" [animated]="animated()" [rounded]="rounded()" />
      <tng-skeleton width="100%" height="7rem" [animated]="animated()" [rounded]="rounded()" />
    </div>
  </section>
</div>
