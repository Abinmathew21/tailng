<main class="min-h-screen bg-slate-950 px-4 py-8 text-slate-100 md:px-8">
  <section class="mx-auto max-w-6xl space-y-6">
    <header class="space-y-3">
      <div class="flex flex-wrap items-center gap-3">
        <a
          routerLink="/"
          class="rounded-lg border border-slate-700 px-3 py-1.5 text-sm text-slate-300"
        >
          Home
        </a>
      </div>
      <h1 class="text-3xl font-semibold md:text-4xl">Skeleton Demo (Tailwind)</h1>
      <p class="max-w-3xl text-slate-300">
        Decorative placeholders for loading states before real content is ready.
      </p>
    </header>

    <section class="space-y-3 rounded-2xl border border-slate-700 bg-slate-900 p-5">
      <h2 class="text-lg font-semibold">Controls</h2>
      <div class="flex flex-wrap gap-3">
        <button
          class="rounded-lg border border-slate-600 px-3 py-1.5 text-sm"
          (click)="onToggleAnimated()"
        >
          Animation: {{ animated() ? 'On' : 'Off' }}
        </button>
        <button
          class="rounded-lg border border-slate-600 px-3 py-1.5 text-sm"
          (click)="onToggleRounded()"
        >
          Rounded: {{ rounded() ? 'On' : 'Off' }}
        </button>
      </div>
    </section>

    <section class="space-y-3 rounded-2xl border border-slate-700 bg-slate-900 p-5">
      <h2 class="text-lg font-semibold">Primitive (`[tngSkeleton]`)</h2>
      <div
        tngSkeleton
        class="h-4 w-3/4 bg-slate-200"
        [animated]="animated()"
        [rounded]="rounded()"
      ></div>
      <div
        tngSkeleton
        class="h-4 w-2/5 bg-slate-200"
        [animated]="animated()"
        [rounded]="rounded()"
      ></div>
    </section>

    <section class="space-y-3 rounded-2xl border border-slate-700 bg-slate-900 p-5">
      <h2 class="text-lg font-semibold">Component (`tng-skeleton`)</h2>
      <div class="space-y-2">
        <tng-skeleton width="75%" height="1rem" [animated]="animated()" [rounded]="rounded()" />
        <tng-skeleton width="40%" height="1rem" [animated]="animated()" [rounded]="rounded()" />
        <tng-skeleton width="100%" height="7rem" [animated]="animated()" [rounded]="rounded()" />
      </div>
    </section>
  </section>
</main>
