<main class="min-h-screen bg-slate-950 px-4 py-8 text-slate-100 md:px-8">
  <section class="mx-auto max-w-6xl space-y-6">
    <header class="space-y-3">
      <div class="flex flex-wrap items-center gap-3">
        <a
          routerLink="/"
          class="rounded-lg border border-slate-700 px-3 py-1.5 text-sm text-slate-300"
        >
          Home
        </a>
        <a
          routerLink="/button"
          class="rounded-lg border border-slate-700 px-3 py-1.5 text-sm text-slate-300"
        >
          Button Demo
        </a>
        <a
          routerLink="/input"
          class="rounded-lg border border-slate-700 px-3 py-1.5 text-sm text-slate-300"
        >
          Input Demo
        </a>
        <a
          routerLink="/checkbox"
          class="rounded-lg border border-slate-700 px-3 py-1.5 text-sm text-slate-300"
        >
          Checkbox Demo
        </a>
        <a
          routerLink="/textarea"
          class="rounded-lg border border-slate-700 px-3 py-1.5 text-sm text-slate-300"
        >
          Textarea Demo
        </a>
      </div>
      <h1 class="text-3xl font-semibold md:text-4xl">Radio Demo (Tailwind)</h1>
      <p class="max-w-2xl text-slate-300">
        Native radio keyboard behavior from primitives, with owned wrappers for consistent visuals.
      </p>
    </header>

    <section class="space-y-3 rounded-2xl border border-slate-700 bg-slate-900 p-5">
      <h2 class="text-lg font-semibold">Primitives (`tngRadio`)</h2>
      <div class="grid gap-3">
        <label class="flex items-center gap-2">
          <input tngRadio name="primitive-plan" [checked]="true" />
          Starter
        </label>
        <label class="flex items-center gap-2">
          <input tngRadio name="primitive-plan" />
          Pro
        </label>
        <label class="flex items-center gap-2 text-slate-500">
          <input tngRadio name="primitive-plan" [disabled]="true" />
          Enterprise (disabled)
        </label>
      </div>
    </section>

    <section class="space-y-3 rounded-2xl border border-slate-700 bg-slate-900 p-5">
      <h2 class="text-lg font-semibold">Components (`tng-radio`)</h2>
      <div class="grid gap-3">
        <tng-radio
          name="owned-plan"
          value="starter"
          [checked]="selectedPlan() === 'starter'"
          (checkedChange)="onPlanChecked('starter', $event)"
        >
          Starter
        </tng-radio>
        <tng-radio
          name="owned-plan"
          value="pro"
          [checked]="selectedPlan() === 'pro'"
          (checkedChange)="onPlanChecked('pro', $event)"
        >
          Pro
        </tng-radio>
        <tng-radio
          name="owned-plan"
          value="enterprise"
          [checked]="selectedPlan() === 'enterprise'"
          (checkedChange)="onPlanChecked('enterprise', $event)"
        >
          Enterprise
        </tng-radio>
      </div>
      <p class="text-sm text-cyan-200">Current selection: {{ selectedPlan() }}</p>
    </section>
  </section>
</main>
