<div class="mx-auto max-w-[72rem] grid gap-5">
  <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
    <h2 class="text-lg font-semibold">Primitives (`tngRadio`)</h2>
    <div class="grid gap-3">
      <label class="flex items-center gap-2"><input tngRadio name="primitive-plan" [checked]="true" /> Starter</label>
      <label class="flex items-center gap-2"><input tngRadio name="primitive-plan" /> Pro</label>
      <label class="flex items-center gap-2 opacity-55"
        ><input tngRadio name="primitive-plan" [disabled]="true" /> Enterprise (disabled)</label
      >
    </div>
  </section>

  <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
    <h2 class="text-lg font-semibold">Components (`tng-radio`)</h2>
    <div class="grid gap-3">
      <tng-radio
        name="owned-plan"
        value="starter"
        [checked]="selectedPlan() === 'starter'"
        (checkedChange)="onPlanChecked('starter', $event)"
      >
        Starter
      </tng-radio>
      <tng-radio
        name="owned-plan"
        value="pro"
        [checked]="selectedPlan() === 'pro'"
        (checkedChange)="onPlanChecked('pro', $event)"
      >
        Pro
      </tng-radio>
      <tng-radio
        name="owned-plan"
        value="enterprise"
        [checked]="selectedPlan() === 'enterprise'"
        (checkedChange)="onPlanChecked('enterprise', $event)"
      >
        Enterprise
      </tng-radio>
    </div>
    <p class="text-sm text-tng-fg-secondary m-0">Current selection: {{ selectedPlan() }}</p>
  </section>
</div>
