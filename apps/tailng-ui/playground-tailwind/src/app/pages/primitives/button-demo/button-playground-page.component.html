<div class="mx-auto max-w-[72rem] grid gap-5">
  <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
    <h2 class="text-lg font-semibold">Primitives (`tngPress`)</h2>
    <div class="flex flex-wrap gap-3">
      <button tngPress type="button" class="rounded-lg bg-tng-accent-brand px-4 py-2 text-sm font-semibold text-tng-fg-inverse">
        Primary Action
      </button>
      <button tngPress type="button" class="rounded-lg border border-tng-accent-brand px-4 py-2 text-sm font-semibold text-tng-accent-brand">
        Outline Action
      </button>
      <a tngPress class="rounded-lg bg-tng-accent-success px-4 py-2 text-sm font-semibold text-tng-fg-inverse">
        Anchor Button
      </a>
      <a tngPress [disabled]="true" class="rounded-lg bg-tng-bg-muted px-4 py-2 text-sm font-semibold text-tng-fg-secondary">
        Disabled Anchor
      </a>
    </div>
  </section>

  <section class="rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-5 space-y-3">
    <h2 class="text-lg font-semibold">Components (`tng-button`)</h2>
    <div class="flex flex-wrap gap-3">
      <tng-button>Default</tng-button>
      <tng-button tone="success">Success</tng-button>
      <tng-button tone="danger">Danger</tng-button>
      <tng-button tone="neutral">Neutral</tng-button>
      <tng-button appearance="outline">Outline</tng-button>
      <tng-button appearance="ghost">Ghost</tng-button>
      <tng-button size="sm">Small</tng-button>
      <tng-button size="lg">Large</tng-button>
      <tng-button [disabled]="true">Disabled</tng-button>
    </div>
  </section>
</div>
