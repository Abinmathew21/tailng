<article class="headless-stepper-examples">
  <h2 class="headless-stepper-examples-title">Examples</h2>
  <p class="headless-stepper-examples-lead">
    Reusable headless stepper patterns for checkout, release workflows, and validation states.
  </p>

  <section id="checkout-progression" class="headless-stepper-examples-block">
    <app-docs-example-tabs-section
      heading="Checkout progression"
      description="An uncontrolled stepper with completed, current, optional, and disabled steps."
      ariaLabel="Headless stepper checkout progression examples"
      tabListAriaLabel="Headless stepper checkout progression tabs"
      defaultValue="plain-css"
      [codeBlockTheme]="codeBlockTheme()"
    >
      <ng-template
        appDocsExampleVariant
        value="plain-css"
        label="Plain-CSS"
        panelTitle="Headless stepper checkout progression (plain CSS)"
        [codeTabs]="checkoutPlainCodeTabs"
      >
        <section tngStepper defaultValue="shipping" ariaLabel="Checkout progress">
          <ol class="headless-stepper-example-list">
            <li tngStepperItem value="cart" label="Cart" completed class="headless-stepper-example-item">
              <button tngStepperTrigger class="headless-stepper-example-trigger">
                <span class="dot">1</span>
                <span tngStepperLabel>Cart</span>
              </button>
              <span tngStepperConnector class="connector"></span>
            </li>
            <li tngStepperItem value="shipping" label="Shipping" class="headless-stepper-example-item">
              <button tngStepperTrigger class="headless-stepper-example-trigger">
                <span class="dot">2</span>
                <span tngStepperLabel>Shipping</span>
                <span tngStepperDescription class="description">Address and delivery window</span>
              </button>
              <span tngStepperConnector class="connector"></span>
            </li>
            <li tngStepperItem value="payment" label="Payment" optional class="headless-stepper-example-item">
              <button tngStepperTrigger class="headless-stepper-example-trigger">
                <span class="dot">3</span>
                <span tngStepperLabel>Payment</span>
                <span tngStepperDescription class="description">Optional for invoice customers</span>
              </button>
            </li>
          </ol>
        </section>
      </ng-template>

      <ng-template
        appDocsExampleVariant
        value="tailwind-css"
        label="Tailwind CSS"
        panelTitle="Headless stepper checkout progression (Tailwind CSS)"
        [codeTabs]="checkoutTailwindCodeTabs"
      >
        <section tngStepper defaultValue="shipping" ariaLabel="Checkout progress">
          <ol class="grid gap-3">
            <li tngStepperItem value="cart" label="Cart" completed class="rounded-lg border border-emerald-300 bg-emerald-50 px-3 py-2 text-slate-900 dark:border-emerald-800 dark:bg-emerald-950/30 dark:text-slate-100">
              <button tngStepperTrigger class="inline-flex items-center gap-3"><span tngStepperLabel>Cart</span></button>
            </li>
            <li tngStepperItem value="shipping" label="Shipping" class="rounded-lg border border-sky-300 bg-sky-50 px-3 py-2 text-slate-900 dark:border-sky-800 dark:bg-sky-950/30 dark:text-slate-100">
              <button tngStepperTrigger class="inline-flex items-center gap-3"><span tngStepperLabel>Shipping</span></button>
            </li>
          </ol>
        </section>
      </ng-template>
    </app-docs-example-tabs-section>
  </section>

  <section id="release-pipeline" class="headless-stepper-examples-block">
    <app-docs-example-tabs-section
      heading="Release pipeline"
      description="Linear mode blocks future incomplete steps while keeping completed steps navigable."
      ariaLabel="Headless stepper release pipeline examples"
      tabListAriaLabel="Headless stepper release pipeline tabs"
      defaultValue="plain-css"
      [codeBlockTheme]="codeBlockTheme()"
    >
      <ng-template
        appDocsExampleVariant
        value="plain-css"
        label="Plain-CSS"
        panelTitle="Headless stepper release pipeline (plain CSS)"
        [codeTabs]="releasePlainCodeTabs"
      >
        <section tngStepper defaultValue="publish" linear ariaLabel="Release flow">
          <ol class="headless-stepper-example-list">
            <li tngStepperItem value="draft" label="Draft" completed class="headless-stepper-example-item">
              <button tngStepperTrigger class="headless-stepper-example-trigger"><span class="dot">1</span><span tngStepperLabel>Draft</span></button>
            </li>
            <li tngStepperItem value="review" label="Review" completed class="headless-stepper-example-item">
              <button tngStepperTrigger class="headless-stepper-example-trigger"><span class="dot">2</span><span tngStepperLabel>Review</span></button>
            </li>
            <li tngStepperItem value="publish" label="Publish" class="headless-stepper-example-item">
              <button tngStepperTrigger class="headless-stepper-example-trigger"><span class="dot">3</span><span tngStepperLabel>Publish</span></button>
            </li>
          </ol>
        </section>
      </ng-template>

      <ng-template
        appDocsExampleVariant
        value="tailwind-css"
        label="Tailwind CSS"
        panelTitle="Headless stepper release pipeline (Tailwind CSS)"
        [codeTabs]="releaseTailwindCodeTabs"
      >
        <section tngStepper defaultValue="publish" linear ariaLabel="Release flow">
          <ol class="grid gap-3">
            <li tngStepperItem value="draft" label="Draft" completed class="rounded-lg border border-emerald-300 px-3 py-2"><button tngStepperTrigger>Draft</button></li>
            <li tngStepperItem value="review" label="Review" completed class="rounded-lg border border-emerald-300 px-3 py-2"><button tngStepperTrigger>Review</button></li>
            <li tngStepperItem value="publish" label="Publish" class="rounded-lg border border-sky-300 px-3 py-2"><button tngStepperTrigger>Publish</button></li>
          </ol>
        </section>
      </ng-template>
    </app-docs-example-tabs-section>
  </section>

  <section id="error-surface" class="headless-stepper-examples-block">
    <app-docs-example-tabs-section
      heading="Error surface"
      description="Error state wins over completed and current styling hooks."
      ariaLabel="Headless stepper error surface examples"
      tabListAriaLabel="Headless stepper error surface tabs"
      defaultValue="plain-css"
      [codeBlockTheme]="codeBlockTheme()"
    >
      <ng-template
        appDocsExampleVariant
        value="plain-css"
        label="Plain-CSS"
        panelTitle="Headless stepper error surface (plain CSS)"
        [codeTabs]="errorPlainCodeTabs"
      >
        <section tngStepper defaultValue="billing" ariaLabel="Onboarding">
          <ol class="headless-stepper-example-list">
            <li tngStepperItem value="profile" label="Profile" completed class="headless-stepper-example-item">
              <button tngStepperTrigger class="headless-stepper-example-trigger"><span class="dot">1</span><span tngStepperLabel>Profile</span></button>
            </li>
            <li tngStepperItem value="billing" label="Billing" error class="headless-stepper-example-item">
              <button tngStepperTrigger class="headless-stepper-example-trigger">
                <span class="dot">2</span>
                <span tngStepperLabel>Billing</span>
                <span tngStepperDescription class="description">Payment method needs attention</span>
              </button>
            </li>
          </ol>
        </section>
      </ng-template>

      <ng-template
        appDocsExampleVariant
        value="tailwind-css"
        label="Tailwind CSS"
        panelTitle="Headless stepper error surface (Tailwind CSS)"
        [codeTabs]="errorTailwindCodeTabs"
      >
        <section tngStepper defaultValue="billing" ariaLabel="Onboarding">
          <ol class="grid gap-3">
            <li tngStepperItem value="profile" label="Profile" completed class="rounded-lg border border-emerald-300 px-3 py-2"><button tngStepperTrigger>Profile</button></li>
            <li tngStepperItem value="billing" label="Billing" error class="rounded-lg border border-rose-300 px-3 py-2"><button tngStepperTrigger>Billing</button></li>
          </ol>
        </section>
      </ng-template>
    </app-docs-example-tabs-section>
  </section>
</article>
