<section class="docs-component-page">
  <div class="docs-component-tabs docs-component-tabs--stack">
    <tng-tabs
      ariaLabel="Menu documentation sections"
      [activation]="'manual'"
      [value]="activePrimarySection()"
      (valueChange)="onPrimarySectionChange($event)"
    >
      <div tngTabList class="docs-component-tab-list" ariaLabel="Menu documentation tabs">
        <button type="button" tngTab value="overview" class="docs-component-tab-trigger">Overview</button>
        <button type="button" tngTab value="api" class="docs-component-tab-trigger">API</button>
        <button type="button" tngTab value="styling" class="docs-component-tab-trigger">Styling</button>
        <button type="button" tngTab value="examples" class="docs-component-tab-trigger">Examples</button>
      </div>
    </tng-tabs>

    <div class="docs-component-tabs-ownable" role="group" aria-label="Ownable">
      <span class="docs-component-tabs-ownable-label">Ownable</span>
      <tng-tabs
        ariaLabel="Menu ownable documentation"
        [activation]="'manual'"
        [value]="activeOwnableSection()"
        (valueChange)="onOwnableSectionChange($event)"
      >
        <div tngTabList class="docs-component-tab-list" ariaLabel="Menu ownable tabs">
          <button type="button" tngTab value="ownable-install" class="docs-component-tab-trigger">
            Install
          </button>
        </div>
      </tng-tabs>
    </div>
  </div>

  <section class="docs-component-content">
    <div class="docs-component-content-main" #docsContentRoot>
      <router-outlet />
    </div>
    <app-docs-component-section-outline
      [ariaLabel]="outlineAriaLabel()"
      [contentRoot]="docsContentRoot"
      [items]="outlineItems()"
      [title]="outlineTitle()"
    />
  </section>
</section>
