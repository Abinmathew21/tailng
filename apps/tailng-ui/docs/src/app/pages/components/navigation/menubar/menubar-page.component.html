<section class="menubar-docs-page">
  <tng-tabs
    class="menubar-docs-tabs"
    ariaLabel="Menubar documentation sections"
    [activation]="'manual'"
    [value]="activeSection()"
    (valueChange)="onSectionChange($event)"
  >
    <div tngTabList class="menubar-docs-tab-list" ariaLabel="Menubar documentation tabs">
      <button type="button" tngTab value="overview" class="menubar-docs-tab-trigger">Overview</button>
      <button type="button" tngTab value="api" class="menubar-docs-tab-trigger">API</button>
      <button type="button" tngTab value="styling" class="menubar-docs-tab-trigger">Styling</button>
      <button type="button" tngTab value="examples" class="menubar-docs-tab-trigger">Examples</button>
      <button type="button" tngTab value="ownable-install" class="menubar-docs-tab-trigger">
        Ownable Install
      </button>
    </div>
  </tng-tabs>

  <section class="menubar-docs-content">
    <router-outlet />
  </section>
</section>
