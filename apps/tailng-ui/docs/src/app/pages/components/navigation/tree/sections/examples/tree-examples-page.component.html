<article class="tree-examples">
  <h2 class="tree-examples-title">Examples</h2>
  <p class="tree-examples-lead">
    Reusable wrapper tree patterns for file browsers, settings panels, and explorer-style navigation.
  </p>

  <section class="tree-examples-block">
    <app-docs-example-tabs-section
      heading="File browser"
      description="Repository-like wrapper tree with workspace, libs, and apps branches."
      ariaLabel="File browser tree variants"
      tabListAriaLabel="File browser tree styles"
      defaultValue="plain-css"
      [codeBlockTheme]="codeBlockTheme()"
    >
      <ng-template
        appDocsExampleVariant
        value="plain-css"
        label="Plain-CSS"
        panelTitle="Wrapper file browser (plain CSS)"
        [codeTabs]="fileTreePlainCodeTabs"
      >
        <div class="tree-example-shell">
          <tng-tree
            [nodes]="fileTreeNodes"
            [defaultExpandedIds]="fileTreeExpanded"
            [defaultSelectedId]="'components'"
            ariaLabel="Repository files"
          />
        </div>
      </ng-template>

      <ng-template
        appDocsExampleVariant
        value="tailwind-css"
        label="Tailwind CSS"
        panelTitle="Wrapper file browser (Tailwind shell)"
        [codeTabs]="fileTreeTailwindCodeTabs"
      >
        <div class="rounded-xl border border-slate-300 bg-slate-50 p-4 dark:border-slate-700 dark:bg-slate-900/60">
          <tng-tree
            [nodes]="fileTreeNodes"
            [defaultExpandedIds]="fileTreeExpanded"
            [defaultSelectedId]="'components'"
            ariaLabel="Repository files"
          />
        </div>
      </ng-template>
    </app-docs-example-tabs-section>
  </section>

  <section class="tree-examples-block">
    <app-docs-example-tabs-section
      heading="Settings panel"
      description="Categorized wrapper tree with a disabled experimental branch."
      ariaLabel="Settings panel tree variants"
      tabListAriaLabel="Settings panel tree styles"
      defaultValue="plain-css"
      [codeBlockTheme]="codeBlockTheme()"
    >
      <ng-template
        appDocsExampleVariant
        value="plain-css"
        label="Plain-CSS"
        panelTitle="Wrapper settings panel (plain CSS)"
        [codeTabs]="settingsPlainCodeTabs"
      >
        <div class="tree-example-shell">
          <tng-tree
            [nodes]="settingsTreeNodes"
            [defaultExpandedIds]="settingsTreeExpanded"
            [defaultSelectedId]="'theme-mode'"
            ariaLabel="Settings"
          />
        </div>
      </ng-template>

      <ng-template
        appDocsExampleVariant
        value="tailwind-css"
        label="Tailwind CSS"
        panelTitle="Wrapper settings panel (Tailwind shell)"
        [codeTabs]="settingsTailwindCodeTabs"
      >
        <div class="rounded-xl border border-slate-300 bg-slate-50 p-4 dark:border-slate-700 dark:bg-slate-900/60">
          <tng-tree
            [nodes]="settingsTreeNodes"
            [defaultExpandedIds]="settingsTreeExpanded"
            [defaultSelectedId]="'theme-mode'"
            ariaLabel="Settings"
          />
        </div>
      </ng-template>
    </app-docs-example-tabs-section>
  </section>
</article>
