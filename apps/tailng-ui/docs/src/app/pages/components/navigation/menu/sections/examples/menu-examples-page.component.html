<article class="docs-overview">
  <h2 class="docs-overview-title">Examples</h2>
  <p class="docs-overview-lead">
    Reference patterns for trigger wiring, command groups, and nested submenu behavior.
  </p>

  <section class="docs-overview-block">
    <app-docs-example-tabs-section
      heading="Action menu variants"
      description="Open with click or Enter/Space, then traverse options with Arrow keys."
      ariaLabel="Menu variant examples"
      tabListAriaLabel="Menu variant tabs"
      defaultValue="plain-css"
      [codeBlockTheme]="codeBlockTheme()"
    >
      <ng-template
        appDocsExampleVariant
        value="plain-css"
        label="Plain-CSS"
        panelTitle="Wrapper action menu (plain CSS)"
        [codeTabs]="plainCssCodeTabs"
      >
        <div class="docs-example-stage">
          <div>
            <button type="button" id="menu-examples-plain-trigger" [tngMenuTriggerFor]="plainMenu">
              Options
            </button>
            <tng-menu #plainMenu="tngMenu" ariaLabel="Plain options menu" (tngMenuSelect)="onPlainSelect($event)">
              <div tngMenuGroupLabel>Options</div>
              <button type="button" tngMenuItem tngMenuItemValue="Pin item">Pin</button>
              <button type="button" tngMenuItem tngMenuItemValue="Mute notifications">Mute</button>
              <button type="button" tngMenuItem tngMenuItemValue="Remove item">Remove</button>
            </tng-menu>
          </div>
        </div>
        <p class="docs-overview-state">last command: {{ plainCommand() }}</p>
      </ng-template>

      <ng-template
        appDocsExampleVariant
        value="tailwind-css"
        label="Tailwind CSS"
        panelTitle="Wrapper action menu (tailwind shell)"
        [codeTabs]="tailwindCodeTabs"
      >
        <div
          class="rounded-xl border border-[var(--tng-semantic-border-subtle)] bg-[color-mix(in_srgb,var(--tng-semantic-background-surface)_88%,transparent)] p-4"
        >
          <div class="docs-example-stage">
            <div>
              <button type="button" id="menu-examples-tailwind-trigger" [tngMenuTriggerFor]="tailwindMenu">
                Open menu
              </button>
              <tng-menu #tailwindMenu="tngMenu" ariaLabel="Tailwind actions menu" (tngMenuSelect)="onTailwindSelect($event)">
                <div tngMenuGroupLabel>Actions</div>
                <button type="button" tngMenuItem tngMenuItemValue="Export report">Export report</button>
                <button type="button" tngMenuItem tngMenuItemValue="Share link">Share link</button>
                <button type="button" tngMenuItem tngMenuItemValue="Copy path">Copy path</button>
              </tng-menu>
            </div>
          </div>
        </div>
        <p class="docs-overview-state">last command: {{ tailwindCommand() }}</p>
      </ng-template>
    </app-docs-example-tabs-section>
  </section>

  <section class="docs-overview-block">
    <app-docs-example-tabs-section
      heading="Cascaded submenu example"
      description="Nested submenu wiring with [tngMenuItemSubmenu]. Use ArrowRight on the active parent option to enter deeper levels."
      ariaLabel="Cascaded submenu variants"
      tabListAriaLabel="Cascaded submenu style tabs"
      defaultValue="plain-css"
      [codeBlockTheme]="codeBlockTheme()"
    >
      <ng-template
        appDocsExampleVariant
        value="plain-css"
        label="Plain-CSS"
        panelTitle="Wrapper cascaded menu (plain CSS)"
        [codeTabs]="cascadePlainCodeTabs"
      >
        <div class="docs-example-stage docs-example-stage--cascade">
          <div>
            <button type="button" id="menu-examples-cascade-plain-root-trigger" [tngMenuTriggerFor]="cascadePlainRootMenu">
              Import
            </button>
            <tng-menu #cascadePlainRootMenu="tngMenu" ariaLabel="Import root menu" (tngMenuSelect)="onCascadePlainSelect($event)">
              <button type="button" tngMenuItem tngMenuItemValue="Import from CSV">CSV file</button>
              <button
                type="button"
                tngMenuItem
                [tngMenuItemSubmenu]="cascadePlainGitMenu"
                tngMenuItemValue="Import from git"
              >
                Git repository
              </button>

              <tng-menu #cascadePlainGitMenu="tngMenu" ariaLabel="Git submenu" (tngMenuSelect)="onCascadePlainSelect($event)">
                <button type="button" tngMenuItem tngMenuItemValue="Import from GitHub">GitHub</button>
                <button type="button" tngMenuItem tngMenuItemValue="Import from GitLab">GitLab</button>
              </tng-menu>
            </tng-menu>
          </div>
        </div>
        <p class="docs-overview-state">last cascaded command: {{ cascadePlainCommand() }}</p>
      </ng-template>

      <ng-template
        appDocsExampleVariant
        value="tailwind-css"
        label="Tailwind CSS"
        panelTitle="Wrapper cascaded menu (tailwind shell)"
        [codeTabs]="cascadeTailwindCodeTabs"
      >
        <div
          class="rounded-xl border border-[var(--tng-semantic-border-subtle)] bg-[color-mix(in_srgb,var(--tng-semantic-background-surface)_88%,transparent)] p-4"
        >
          <div class="docs-example-stage docs-example-stage--cascade">
            <div>
              <button type="button" id="menu-examples-cascade-tailwind-root-trigger" [tngMenuTriggerFor]="cascadeTailwindRootMenu">
                Import
              </button>
              <tng-menu #cascadeTailwindRootMenu="tngMenu" ariaLabel="Import root menu" (tngMenuSelect)="onCascadeTailwindSelect($event)">
                <div tngMenuGroupLabel>Import</div>
                <button type="button" tngMenuItem tngMenuItemValue="Import from CSV">CSV file</button>
                <button
                  type="button"
                  tngMenuItem
                  [tngMenuItemSubmenu]="cascadeTailwindGitMenu"
                  tngMenuItemValue="Import from git"
                >
                  Git repository
                </button>

                <tng-menu #cascadeTailwindGitMenu="tngMenu" ariaLabel="Git submenu" (tngMenuSelect)="onCascadeTailwindSelect($event)">
                  <button type="button" tngMenuItem tngMenuItemValue="Import from GitHub">GitHub</button>
                  <button type="button" tngMenuItem tngMenuItemValue="Import from GitLab">GitLab</button>
                </tng-menu>
              </tng-menu>
            </div>
          </div>
        </div>
        <p class="docs-overview-state">last cascaded command: {{ cascadeTailwindCommand() }}</p>
      </ng-template>
    </app-docs-example-tabs-section>
  </section>
</article>
