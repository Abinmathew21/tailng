<article class="menu-examples">
  <h2 class="menu-examples-title">Examples</h2>
  <p class="menu-examples-lead">
    Reference patterns for trigger wiring, command groups, and nested submenu behavior.
  </p>

  <section class="menu-examples-block">
    <app-docs-example-tabs-section
      heading="Action menu variants"
      description="Open with click or Enter/Space, then traverse options with Arrow keys."
      ariaLabel="Menu variant examples"
      tabListAriaLabel="Menu variant tabs"
      defaultValue="plain-css"
      [codeBlockTheme]="codeBlockTheme()"
    >
      <ng-template
        appDocsExampleVariant
        value="plain-css"
        label="Plain-CSS"
        panelTitle="Wrapper action menu (plain CSS)"
        [codeTabs]="plainCssCodeTabs"
      >
        <div class="menu-example-stage">
          <div class="menu-example-trigger-shell">
            <button type="button" [tngMenuTriggerFor]="plainMenu" class="menu-example-trigger">Options</button>
            <tng-menu
              #plainMenu="tngMenu"
              ariaLabel="Plain options menu"
              class="menu-example-panel"
              (tngMenuSelect)="onPlainSelect($event)"
            >
              <div tngMenuGroupLabel class="menu-example-group-label">Options</div>
              <button type="button" tngMenuItem tngMenuItemValue="Pin item">Pin</button>
              <button type="button" tngMenuItem tngMenuItemValue="Mute notifications">Mute</button>
              <button type="button" tngMenuItem tngMenuItemValue="Remove item">Remove</button>
            </tng-menu>
          </div>
        </div>
        <p class="menu-example-state">last command: {{ plainCommand() }}</p>
      </ng-template>

      <ng-template
        appDocsExampleVariant
        value="tailwind-css"
        label="Tailwind CSS"
        panelTitle="Wrapper action menu (tailwind shell)"
        [codeTabs]="tailwindCodeTabs"
      >
        <div
          class="rounded-xl border border-[var(--tng-semantic-border-subtle)] bg-[color-mix(in_srgb,var(--tng-semantic-background-surface)_88%,transparent)] p-4"
        >
          <div class="menu-example-stage">
            <div class="menu-example-trigger-shell">
              <button
                type="button"
                [tngMenuTriggerFor]="tailwindMenu"
                class="min-h-[2.15rem] rounded-[0.72rem] border border-[var(--tng-semantic-border-subtle)] bg-[color-mix(in_srgb,var(--tng-semantic-background-surface)_86%,transparent)] px-[0.9rem] py-[0.45rem] text-[0.92rem] font-semibold text-[var(--tng-semantic-foreground-primary)] transition hover:border-[color-mix(in_srgb,var(--tng-semantic-accent-brand)_38%,var(--tng-semantic-border-subtle))] hover:bg-[color-mix(in_srgb,var(--tng-semantic-accent-brand)_10%,transparent)] focus-visible:outline-none aria-expanded:bg-[color-mix(in_srgb,var(--tng-semantic-accent-brand)_15%,transparent)] aria-expanded:text-[color-mix(in_srgb,var(--tng-semantic-accent-brand)_74%,var(--tng-semantic-foreground-primary))]"
              >
                Open menu
              </button>
              <tng-menu
                #tailwindMenu="tngMenu"
                ariaLabel="Tailwind actions menu"
                class="hidden min-w-[14.2rem] gap-[0.22rem] rounded-[0.82rem] border border-[var(--tng-semantic-border-subtle)] bg-[var(--tng-semantic-background-canvas)] p-[0.48rem] shadow-[0_16px_30px_-22px_color-mix(in_srgb,var(--tng-semantic-foreground-primary)_35%,transparent)] data-[state=open]:grid"
                (tngMenuSelect)="onTailwindSelect($event)"
              >
                <div
                  tngMenuGroupLabel
                  class="px-[0.45rem] py-[0.2rem] text-[0.72rem] font-bold uppercase tracking-[0.08em] text-[var(--tng-semantic-foreground-secondary)]"
                >
                  Actions
                </div>
                <button
                  type="button"
                  tngMenuItem
                  tngMenuItemValue="Export report"
                  class="min-h-[2rem] rounded-[0.6rem] bg-transparent px-[0.68rem] py-[0.42rem] text-left text-[0.88rem] font-[550] text-[var(--tng-semantic-foreground-primary)] transition hover:bg-[color-mix(in_srgb,var(--tng-semantic-foreground-primary)_8%,transparent)] focus-visible:outline-none [&[data-active]]:bg-[color-mix(in_srgb,var(--tng-semantic-accent-brand)_16%,transparent)] [&[data-active]]:text-[color-mix(in_srgb,var(--tng-semantic-accent-brand)_72%,var(--tng-semantic-foreground-primary))]"
                >
                  Export report
                </button>
                <button
                  type="button"
                  tngMenuItem
                  tngMenuItemValue="Share link"
                  class="min-h-[2rem] rounded-[0.6rem] bg-transparent px-[0.68rem] py-[0.42rem] text-left text-[0.88rem] font-[550] text-[var(--tng-semantic-foreground-primary)] transition hover:bg-[color-mix(in_srgb,var(--tng-semantic-foreground-primary)_8%,transparent)] focus-visible:outline-none [&[data-active]]:bg-[color-mix(in_srgb,var(--tng-semantic-accent-brand)_16%,transparent)] [&[data-active]]:text-[color-mix(in_srgb,var(--tng-semantic-accent-brand)_72%,var(--tng-semantic-foreground-primary))]"
                >
                  Share link
                </button>
                <button
                  type="button"
                  tngMenuItem
                  tngMenuItemValue="Copy path"
                  class="min-h-[2rem] rounded-[0.6rem] bg-transparent px-[0.68rem] py-[0.42rem] text-left text-[0.88rem] font-[550] text-[var(--tng-semantic-foreground-primary)] transition hover:bg-[color-mix(in_srgb,var(--tng-semantic-foreground-primary)_8%,transparent)] focus-visible:outline-none [&[data-active]]:bg-[color-mix(in_srgb,var(--tng-semantic-accent-brand)_16%,transparent)] [&[data-active]]:text-[color-mix(in_srgb,var(--tng-semantic-accent-brand)_72%,var(--tng-semantic-foreground-primary))]"
                >
                  Copy path
                </button>
              </tng-menu>
            </div>
          </div>
        </div>
        <p class="menu-example-state">last command: {{ tailwindCommand() }}</p>
      </ng-template>
    </app-docs-example-tabs-section>
  </section>

  <section class="menu-examples-block">
    <app-docs-example-tabs-section
      heading="Cascaded submenu example"
      description="Nested submenu wiring with [tngMenuItemSubmenu]. Use ArrowRight on the active parent option to enter deeper levels."
      ariaLabel="Cascaded submenu variants"
      tabListAriaLabel="Cascaded submenu style tabs"
      defaultValue="plain-css"
      [codeBlockTheme]="codeBlockTheme()"
    >
      <ng-template
        appDocsExampleVariant
        value="plain-css"
        label="Plain-CSS"
        panelTitle="Wrapper cascaded menu (plain CSS)"
        [codeTabs]="cascadePlainCodeTabs"
      >
        <div class="menu-example-stage menu-example-stage--cascade">
          <div class="menu-example-trigger-shell">
            <button type="button" [tngMenuTriggerFor]="cascadePlainRootMenu" class="menu-example-trigger">
              Import
            </button>
            <tng-menu
              #cascadePlainRootMenu="tngMenu"
              ariaLabel="Import root menu"
              class="menu-example-panel"
              (tngMenuSelect)="onCascadePlainSelect($event)"
            >
              <button type="button" tngMenuItem tngMenuItemValue="Import from CSV">CSV file</button>
              <button
                type="button"
                tngMenuItem
                [tngMenuItemSubmenu]="cascadePlainGitMenu"
                tngMenuItemValue="Import from git"
              >
                Git repository
              </button>

              <tng-menu
                #cascadePlainGitMenu="tngMenu"
                ariaLabel="Git submenu"
                class="menu-example-panel menu-example-panel--submenu menu-example-panel--level-1"
                (tngMenuSelect)="onCascadePlainSelect($event)"
              >
                <button type="button" tngMenuItem tngMenuItemValue="Import from GitHub">GitHub</button>
                <button type="button" tngMenuItem tngMenuItemValue="Import from GitLab">GitLab</button>
              </tng-menu>
            </tng-menu>
          </div>
        </div>
        <p class="menu-example-state">last cascaded command: {{ cascadePlainCommand() }}</p>
      </ng-template>

      <ng-template
        appDocsExampleVariant
        value="tailwind-css"
        label="Tailwind CSS"
        panelTitle="Wrapper cascaded menu (tailwind shell)"
        [codeTabs]="cascadeTailwindCodeTabs"
      >
        <div
          class="rounded-xl border border-[var(--tng-semantic-border-subtle)] bg-[color-mix(in_srgb,var(--tng-semantic-background-surface)_88%,transparent)] p-4"
        >
          <div class="menu-example-stage menu-example-stage--cascade">
            <div class="menu-example-trigger-shell">
              <button
                type="button"
                [tngMenuTriggerFor]="cascadeTailwindRootMenu"
                class="min-h-[2.15rem] rounded-[0.72rem] border border-[var(--tng-semantic-border-subtle)] bg-[color-mix(in_srgb,var(--tng-semantic-background-surface)_86%,transparent)] px-[0.9rem] py-[0.45rem] text-[0.92rem] font-semibold text-[var(--tng-semantic-foreground-primary)] transition hover:border-[color-mix(in_srgb,var(--tng-semantic-accent-brand)_38%,var(--tng-semantic-border-subtle))] hover:bg-[color-mix(in_srgb,var(--tng-semantic-accent-brand)_10%,transparent)] focus-visible:outline-none aria-expanded:bg-[color-mix(in_srgb,var(--tng-semantic-accent-brand)_15%,transparent)] aria-expanded:text-[color-mix(in_srgb,var(--tng-semantic-accent-brand)_74%,var(--tng-semantic-foreground-primary))]"
              >
                Import
              </button>
              <tng-menu
                #cascadeTailwindRootMenu="tngMenu"
                ariaLabel="Import root menu"
                class="hidden min-w-[14.2rem] gap-[0.22rem] rounded-[0.82rem] border border-[var(--tng-semantic-border-subtle)] bg-[var(--tng-semantic-background-canvas)] p-[0.48rem] shadow-[0_16px_30px_-22px_color-mix(in_srgb,var(--tng-semantic-foreground-primary)_35%,transparent)] data-[state=open]:grid"
                (tngMenuSelect)="onCascadeTailwindSelect($event)"
              >
                <div
                  tngMenuGroupLabel
                  class="px-[0.45rem] py-[0.2rem] text-[0.72rem] font-bold uppercase tracking-[0.08em] text-[var(--tng-semantic-foreground-secondary)]"
                >
                  Import
                </div>
                <button
                  type="button"
                  tngMenuItem
                  tngMenuItemValue="Import from CSV"
                  class="min-h-[2rem] rounded-[0.6rem] bg-transparent px-[0.68rem] py-[0.42rem] text-left text-[0.88rem] font-[550] text-[var(--tng-semantic-foreground-primary)] transition hover:bg-[color-mix(in_srgb,var(--tng-semantic-foreground-primary)_8%,transparent)] focus-visible:outline-none data-[active]:bg-[color-mix(in_srgb,var(--tng-semantic-accent-brand)_16%,transparent)] data-[active]:text-[color-mix(in_srgb,var(--tng-semantic-accent-brand)_72%,var(--tng-semantic-foreground-primary))] aria-expanded:bg-[color-mix(in_srgb,var(--tng-semantic-accent-brand)_16%,transparent)] aria-expanded:text-[color-mix(in_srgb,var(--tng-semantic-accent-brand)_72%,var(--tng-semantic-foreground-primary))]"
                >
                  CSV file
                </button>
                <button
                  type="button"
                  tngMenuItem
                  [tngMenuItemSubmenu]="cascadeTailwindGitMenu"
                  tngMenuItemValue="Import from git"
                  class="min-h-[2rem] rounded-[0.6rem] bg-transparent px-[0.68rem] py-[0.42rem] text-left text-[0.88rem] font-[550] text-[var(--tng-semantic-foreground-primary)] transition hover:bg-[color-mix(in_srgb,var(--tng-semantic-foreground-primary)_8%,transparent)] focus-visible:outline-none data-[active]:bg-[color-mix(in_srgb,var(--tng-semantic-accent-brand)_16%,transparent)] data-[active]:text-[color-mix(in_srgb,var(--tng-semantic-accent-brand)_72%,var(--tng-semantic-foreground-primary))] aria-expanded:bg-[color-mix(in_srgb,var(--tng-semantic-accent-brand)_16%,transparent)] aria-expanded:text-[color-mix(in_srgb,var(--tng-semantic-accent-brand)_72%,var(--tng-semantic-foreground-primary))]"
                >
                  Git repository
                </button>

                <tng-menu
                  #cascadeTailwindGitMenu="tngMenu"
                  ariaLabel="Git submenu"
                  class="hidden min-w-[14.2rem] gap-[0.22rem] rounded-[0.82rem] border border-[var(--tng-semantic-border-subtle)] bg-[var(--tng-semantic-background-canvas)] p-[0.48rem] shadow-[0_16px_30px_-22px_color-mix(in_srgb,var(--tng-semantic-foreground-primary)_35%,transparent)] data-[state=open]:grid"
                  (tngMenuSelect)="onCascadeTailwindSelect($event)"
                >
                  <button
                    type="button"
                    tngMenuItem
                    tngMenuItemValue="Import from GitHub"
                    class="min-h-[2rem] rounded-[0.6rem] bg-transparent px-[0.68rem] py-[0.42rem] text-left text-[0.88rem] font-[550] text-[var(--tng-semantic-foreground-primary)] transition hover:bg-[color-mix(in_srgb,var(--tng-semantic-foreground-primary)_8%,transparent)] focus-visible:outline-none [&[data-active]]:bg-[color-mix(in_srgb,var(--tng-semantic-accent-brand)_16%,transparent)] [&[data-active]]:text-[color-mix(in_srgb,var(--tng-semantic-accent-brand)_72%,var(--tng-semantic-foreground-primary))]"
                  >
                    GitHub
                  </button>
                  <button
                    type="button"
                    tngMenuItem
                    tngMenuItemValue="Import from GitLab"
                    class="min-h-[2rem] rounded-[0.6rem] bg-transparent px-[0.68rem] py-[0.42rem] text-left text-[0.88rem] font-[550] text-[var(--tng-semantic-foreground-primary)] transition hover:bg-[color-mix(in_srgb,var(--tng-semantic-foreground-primary)_8%,transparent)] focus-visible:outline-none [&[data-active]]:bg-[color-mix(in_srgb,var(--tng-semantic-accent-brand)_16%,transparent)] [&[data-active]]:text-[color-mix(in_srgb,var(--tng-semantic-accent-brand)_72%,var(--tng-semantic-foreground-primary))]"
                  >
                    GitLab
                  </button>
                </tng-menu>
              </tng-menu>
            </div>
          </div>
        </div>
        <p class="menu-example-state">last cascaded command: {{ cascadeTailwindCommand() }}</p>
      </ng-template>
    </app-docs-example-tabs-section>
  </section>
</article>
