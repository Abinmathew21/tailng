<section class="breadcrumb-docs-page">
  <tng-tabs
    class="breadcrumb-docs-tabs"
    ariaLabel="Breadcrumb documentation sections"
    [activation]="'manual'"
    [value]="activeSection()"
    (valueChange)="onSectionChange($event)"
  >
    <div tngTabList class="breadcrumb-docs-tab-list" ariaLabel="Breadcrumb documentation tabs">
      <button type="button" tngTab value="overview" class="breadcrumb-docs-tab-trigger">Overview</button>
      <button type="button" tngTab value="api" class="breadcrumb-docs-tab-trigger">API</button>
      <button type="button" tngTab value="styling" class="breadcrumb-docs-tab-trigger">Styling</button>
      <button type="button" tngTab value="examples" class="breadcrumb-docs-tab-trigger">Examples</button>
      <button type="button" tngTab value="ownable-install" class="breadcrumb-docs-tab-trigger">
        Ownable Install
      </button>
    </div>
  </tng-tabs>

  <section class="breadcrumb-docs-content">
    <router-outlet />
  </section>
</section>
