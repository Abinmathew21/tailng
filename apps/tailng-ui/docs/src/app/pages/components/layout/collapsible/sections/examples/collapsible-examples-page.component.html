<article class="collapsible-examples">
  <h2 class="collapsible-examples-title">Examples</h2>
  <p class="collapsible-examples-lead">
    Wrapper-focused collapsible patterns for progress disclosure and compact error recovery panels.
  </p>

  <section class="collapsible-examples-block" id="checkout-progression-variants">
    <app-docs-example-tabs-section
      heading="Checkout progression variants"
      description="Cart, Shipping, and Payment steps rendered through the wrapper component."
      ariaLabel="Checkout collapsible variants"
      tabListAriaLabel="Checkout collapsible styles"
      defaultValue="plain-css"
      [codeBlockTheme]="codeBlockTheme()"
    >
      <ng-template
        appDocsExampleVariant
        value="plain-css"
        label="Plain-CSS"
        panelTitle="Plain CSS checkout progression"
        [codeTabs]="checkoutPlainCodeTabs"
      >
        <div class="collapsible-example-shell collapsible-example-shell--plain">
          <tng-collapsible
            title="Checkout progress"
            [open]="checkoutPlainOpen()"
            (openChange)="checkoutPlainOpen.set($event)"
          >
            <ol class="collapsible-example-list">
              <li class="collapsible-example-item is-complete"><span class="dot">✓</span> Cart</li>
              <li class="collapsible-example-item is-current"><span class="dot">2</span> Shipping</li>
              <li class="collapsible-example-item"><span class="dot">3</span> Payment</li>
            </ol>
          </tng-collapsible>
        </div>
      </ng-template>

      <ng-template
        appDocsExampleVariant
        value="tailwind-css"
        label="Tailwind CSS"
        panelTitle="Tailwind checkout progression"
        [codeTabs]="checkoutTailwindCodeTabs"
      >
        <div
          class="collapsible-example-shell rounded-xl border border-slate-300 bg-slate-50 p-4 dark:border-slate-700 dark:bg-slate-900/60"
        >
          <tng-collapsible
            title="Checkout progress"
            [open]="checkoutTailwindOpen()"
            (openChange)="checkoutTailwindOpen.set($event)"
          >
            <ol class="collapsible-example-list">
              <li class="collapsible-example-item is-complete"><span class="dot">✓</span> Cart</li>
              <li class="collapsible-example-item is-current"><span class="dot">2</span> Shipping</li>
              <li class="collapsible-example-item"><span class="dot">3</span> Payment</li>
            </ol>
          </tng-collapsible>
        </div>
      </ng-template>
    </app-docs-example-tabs-section>
  </section>

  <section class="collapsible-examples-block" id="error-surface-variants">
    <app-docs-example-tabs-section
      heading="Error surface variants"
      description="A compact disclosure for onboarding state with one step in error."
      ariaLabel="Error surface collapsible variants"
      tabListAriaLabel="Error surface collapsible styles"
      defaultValue="plain-css"
      [codeBlockTheme]="codeBlockTheme()"
    >
      <ng-template
        appDocsExampleVariant
        value="plain-css"
        label="Plain-CSS"
        panelTitle="Plain CSS error surface"
        [codeTabs]="errorPlainCodeTabs"
      >
        <div class="collapsible-example-shell collapsible-example-shell--plain">
          <tng-collapsible
            title="Onboarding"
            [open]="errorPlainOpen()"
            (openChange)="errorPlainOpen.set($event)"
          >
            <ol class="collapsible-example-list">
              <li class="collapsible-example-item is-complete"><span class="dot">✓</span> Profile</li>
              <li class="collapsible-example-item is-error"><span class="dot">2</span> Billing</li>
              <li class="collapsible-example-item"><span class="dot">3</span> Team invite</li>
            </ol>
          </tng-collapsible>
        </div>
      </ng-template>

      <ng-template
        appDocsExampleVariant
        value="tailwind-css"
        label="Tailwind CSS"
        panelTitle="Tailwind error surface"
        [codeTabs]="errorTailwindCodeTabs"
      >
        <div
          class="collapsible-example-shell rounded-xl border border-slate-300 bg-slate-50 p-4 dark:border-slate-700 dark:bg-slate-900/60"
        >
          <tng-collapsible
            title="Onboarding"
            [open]="errorTailwindOpen()"
            (openChange)="errorTailwindOpen.set($event)"
          >
            <ol class="collapsible-example-list">
              <li class="collapsible-example-item is-complete"><span class="dot">✓</span> Profile</li>
              <li class="collapsible-example-item is-error"><span class="dot">2</span> Billing</li>
              <li class="collapsible-example-item"><span class="dot">3</span> Team invite</li>
            </ol>
          </tng-collapsible>
        </div>
      </ng-template>
    </app-docs-example-tabs-section>
  </section>
</article>
