<article class="stepper-examples">
  <h2 class="stepper-examples-title">Examples</h2>
  <p class="stepper-examples-lead">
    Reusable wrapper-based stepper layouts that compose the styled host with headless step items,
    triggers, and state attributes.
  </p>

  <section id="checkout-progression-variants" class="stepper-examples-block">
    <app-docs-example-tabs-section
      heading="Checkout progression variants"
      description="Cart, Shipping, and Payment steps with consistent current/completed state treatment."
      ariaLabel="Checkout stepper variants"
      tabListAriaLabel="Checkout stepper styles"
      defaultValue="plain-css"
      [codeBlockTheme]="codeBlockTheme()"
    >
      <ng-template
        appDocsExampleVariant
        value="plain-css"
        label="Plain-CSS"
        panelTitle="Plain CSS checkout progression"
        [codeTabs]="checkoutPlainCodeTabs"
      >
        <div class="stepper-example-shell stepper-example-shell--plain">
          <tng-stepper ariaLabel="Checkout progress" defaultValue="shipping" linear>
            <ol class="stepper-example-list">
              <li tngStepperItem value="cart" label="Cart" completed class="stepper-example-item">
                <button tngStepperTrigger class="stepper-example-trigger">
                  <span class="dot">1</span>
                  <span tngStepperLabel>Cart</span>
                </button>
              </li>
              <li tngStepperItem value="shipping" label="Shipping" class="stepper-example-item">
                <button tngStepperTrigger class="stepper-example-trigger">
                  <span class="dot">2</span>
                  <span tngStepperLabel>Shipping</span>
                </button>
              </li>
              <li tngStepperItem value="payment" label="Payment" class="stepper-example-item">
                <button tngStepperTrigger class="stepper-example-trigger">
                  <span class="dot">3</span>
                  <span tngStepperLabel>Payment</span>
                </button>
              </li>
            </ol>
          </tng-stepper>
        </div>
      </ng-template>

      <ng-template
        appDocsExampleVariant
        value="tailwind-css"
        label="Tailwind CSS"
        panelTitle="Tailwind checkout progression"
        [codeTabs]="checkoutTailwindCodeTabs"
      >
        <div
          class="stepper-example-shell rounded-xl border border-slate-300 bg-slate-50 p-4 dark:border-slate-700 dark:bg-slate-900/60"
        >
          <tng-stepper ariaLabel="Checkout progress" defaultValue="shipping" linear>
            <ol class="stepper-example-list">
              <li tngStepperItem value="cart" label="Cart" completed class="stepper-example-item">
                <button tngStepperTrigger class="stepper-example-trigger">
                  <span class="dot">1</span>
                  <span tngStepperLabel>Cart</span>
                </button>
              </li>
              <li tngStepperItem value="shipping" label="Shipping" class="stepper-example-item">
                <button tngStepperTrigger class="stepper-example-trigger">
                  <span class="dot">2</span>
                  <span tngStepperLabel>Shipping</span>
                </button>
              </li>
              <li tngStepperItem value="payment" label="Payment" class="stepper-example-item">
                <button tngStepperTrigger class="stepper-example-trigger">
                  <span class="dot">3</span>
                  <span tngStepperLabel>Payment</span>
                </button>
              </li>
            </ol>
          </tng-stepper>
        </div>
      </ng-template>
    </app-docs-example-tabs-section>
  </section>

  <section id="release-pipeline-variants" class="stepper-examples-block">
    <app-docs-example-tabs-section
      heading="Release pipeline variants"
      description="Draft and Review complete states with a current Publish stage."
      ariaLabel="Release pipeline stepper variants"
      tabListAriaLabel="Release pipeline stepper styles"
      defaultValue="plain-css"
      [codeBlockTheme]="codeBlockTheme()"
    >
      <ng-template
        appDocsExampleVariant
        value="plain-css"
        label="Plain-CSS"
        panelTitle="Plain CSS release pipeline"
        [codeTabs]="releasePlainCodeTabs"
      >
        <div class="stepper-example-shell stepper-example-shell--plain">
          <tng-stepper ariaLabel="Release flow" defaultValue="publish">
            <ol class="stepper-example-list">
              <li tngStepperItem value="draft" label="Draft" completed class="stepper-example-item">
                <button tngStepperTrigger class="stepper-example-trigger">
                  <span class="dot">1</span>
                  <span tngStepperLabel>Draft</span>
                </button>
              </li>
              <li tngStepperItem value="review" label="Review" completed class="stepper-example-item">
                <button tngStepperTrigger class="stepper-example-trigger">
                  <span class="dot">2</span>
                  <span tngStepperLabel>Review</span>
                </button>
              </li>
              <li tngStepperItem value="publish" label="Publish" class="stepper-example-item">
                <button tngStepperTrigger class="stepper-example-trigger">
                  <span class="dot">3</span>
                  <span tngStepperLabel>Publish</span>
                </button>
              </li>
            </ol>
          </tng-stepper>
        </div>
      </ng-template>

      <ng-template
        appDocsExampleVariant
        value="tailwind-css"
        label="Tailwind CSS"
        panelTitle="Tailwind release pipeline"
        [codeTabs]="releaseTailwindCodeTabs"
      >
        <div
          class="stepper-example-shell rounded-xl border border-slate-300 bg-slate-50 p-4 dark:border-slate-700 dark:bg-slate-900/60"
        >
          <tng-stepper ariaLabel="Release flow" defaultValue="publish">
            <ol class="stepper-example-list">
              <li tngStepperItem value="draft" label="Draft" completed class="stepper-example-item">
                <button tngStepperTrigger class="stepper-example-trigger">
                  <span class="dot">1</span>
                  <span tngStepperLabel>Draft</span>
                </button>
              </li>
              <li tngStepperItem value="review" label="Review" completed class="stepper-example-item">
                <button tngStepperTrigger class="stepper-example-trigger">
                  <span class="dot">2</span>
                  <span tngStepperLabel>Review</span>
                </button>
              </li>
              <li tngStepperItem value="publish" label="Publish" class="stepper-example-item">
                <button tngStepperTrigger class="stepper-example-trigger">
                  <span class="dot">3</span>
                  <span tngStepperLabel>Publish</span>
                </button>
              </li>
            </ol>
          </tng-stepper>
        </div>
      </ng-template>
    </app-docs-example-tabs-section>
  </section>

  <section id="error-surface-variants" class="stepper-examples-block">
    <app-docs-example-tabs-section
      heading="Error surface variants"
      description="Billing step exposes error state while neighboring steps remain complete/upcoming."
      ariaLabel="Error surface stepper variants"
      tabListAriaLabel="Error surface stepper styles"
      defaultValue="plain-css"
      [codeBlockTheme]="codeBlockTheme()"
    >
      <ng-template
        appDocsExampleVariant
        value="plain-css"
        label="Plain-CSS"
        panelTitle="Plain CSS error surface"
        [codeTabs]="errorPlainCodeTabs"
      >
        <div class="stepper-example-shell stepper-example-shell--plain">
          <tng-stepper ariaLabel="Onboarding" defaultValue="billing">
            <ol class="stepper-example-list">
              <li tngStepperItem value="profile" label="Profile" completed class="stepper-example-item">
                <button tngStepperTrigger class="stepper-example-trigger">
                  <span class="dot">1</span>
                  <span tngStepperLabel>Profile</span>
                </button>
              </li>
              <li tngStepperItem value="billing" label="Billing" error class="stepper-example-item">
                <button tngStepperTrigger class="stepper-example-trigger">
                  <span class="dot">2</span>
                  <span tngStepperLabel>Billing</span>
                </button>
                <span tngStepperDescription class="stepper-example-description">Card declined</span>
              </li>
              <li tngStepperItem value="invite" label="Team invite" class="stepper-example-item">
                <button tngStepperTrigger class="stepper-example-trigger">
                  <span class="dot">3</span>
                  <span tngStepperLabel>Team invite</span>
                </button>
              </li>
            </ol>
          </tng-stepper>
        </div>
      </ng-template>

      <ng-template
        appDocsExampleVariant
        value="tailwind-css"
        label="Tailwind CSS"
        panelTitle="Tailwind error surface"
        [codeTabs]="errorTailwindCodeTabs"
      >
        <div
          class="stepper-example-shell rounded-xl border border-slate-300 bg-slate-50 p-4 dark:border-slate-700 dark:bg-slate-900/60"
        >
          <tng-stepper ariaLabel="Onboarding" defaultValue="billing">
            <ol class="stepper-example-list">
              <li tngStepperItem value="profile" label="Profile" completed class="stepper-example-item">
                <button tngStepperTrigger class="stepper-example-trigger">
                  <span class="dot">1</span>
                  <span tngStepperLabel>Profile</span>
                </button>
              </li>
              <li tngStepperItem value="billing" label="Billing" error class="stepper-example-item">
                <button tngStepperTrigger class="stepper-example-trigger">
                  <span class="dot">2</span>
                  <span tngStepperLabel>Billing</span>
                </button>
                <span tngStepperDescription class="stepper-example-description">Card declined</span>
              </li>
              <li tngStepperItem value="invite" label="Team invite" class="stepper-example-item">
                <button tngStepperTrigger class="stepper-example-trigger">
                  <span class="dot">3</span>
                  <span tngStepperLabel>Team invite</span>
                </button>
              </li>
            </ol>
          </tng-stepper>
        </div>
      </ng-template>
    </app-docs-example-tabs-section>
  </section>
</article>
