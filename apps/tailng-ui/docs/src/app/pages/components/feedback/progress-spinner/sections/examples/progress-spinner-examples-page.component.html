<article class="progress-spinner-examples">
  <h2 class="progress-spinner-examples-title">Examples</h2>
  <p class="progress-spinner-examples-lead">
    Pair determinate and indeterminate states to communicate completion and loading intent clearly.
  </p>

  <section class="progress-spinner-examples-block">
    <app-docs-example-tabs-section
      heading="Sync and quality metrics"
      description="Track completion of known-duration tasks with determinate values."
      ariaLabel="Progress spinner sync examples"
      tabListAriaLabel="Progress spinner sync style variants"
      defaultValue="headless"
      [codeBlockTheme]="codeBlockTheme()"
    >
      <ng-template
        appDocsExampleVariant
        value="headless"
        label="Headless"
        panelTitle="Headless metric spinners"
        [codeTabs]="uploadHeadlessTabs"
      >
        <section class="spinner-example-shell spinner-example-shell--headless">
          <div class="spinner-example-row">
            <span>Upload progress</span>
            <span tngProgressSpinner [value]="uploadProgress" class="spinner-example-item">
              <svg class="spinner-example-svg" viewBox="0 0 40 40">
                <circle
                  cx="20"
                  cy="20"
                  r="18"
                  fill="none"
                  stroke="var(--tng-semantic-border-subtle)"
                  stroke-width="4"
                ></circle>
                <circle
                  cx="20"
                  cy="20"
                  r="18"
                  fill="none"
                  stroke="var(--tng-semantic-accent-brand)"
                  stroke-width="4"
                  stroke-linecap="round"
                  [attr.stroke-dasharray]="spinnerCircumference"
                  [attr.stroke-dashoffset]="spinnerCircumference - (spinnerCircumference * uploadProgress) / 100"
                  transform="rotate(-90 20 20)"
                ></circle>
              </svg>
            </span>
          </div>
          <div class="spinner-example-row">
            <span>Test coverage</span>
            <span tngProgressSpinner [value]="testCoverageProgress" class="spinner-example-item">
              <svg class="spinner-example-svg" viewBox="0 0 40 40">
                <circle
                  cx="20"
                  cy="20"
                  r="18"
                  fill="none"
                  stroke="var(--tng-semantic-border-subtle)"
                  stroke-width="4"
                ></circle>
                <circle
                  cx="20"
                  cy="20"
                  r="18"
                  fill="none"
                  stroke="var(--tng-semantic-accent-brand)"
                  stroke-width="4"
                  stroke-linecap="round"
                  [attr.stroke-dasharray]="spinnerCircumference"
                  [attr.stroke-dashoffset]="spinnerCircumference - (spinnerCircumference * testCoverageProgress) / 100"
                  transform="rotate(-90 20 20)"
                ></circle>
              </svg>
            </span>
          </div>
        </section>
      </ng-template>

      <ng-template
        appDocsExampleVariant
        value="plain-css"
        label="Plain-CSS"
        panelTitle="Wrapper metric spinners"
        [codeTabs]="uploadPlainTabs"
      >
        <section class="spinner-example-shell spinner-example-shell--plain">
          <div class="spinner-example-row">
            <span>Upload progress</span>
            <tng-progress-spinner [value]="uploadProgress" ariaLabel="Upload progress"></tng-progress-spinner>
          </div>
          <div class="spinner-example-row">
            <span>Test coverage</span>
            <tng-progress-spinner
              [value]="testCoverageProgress"
              ariaLabel="Test coverage"
            ></tng-progress-spinner>
          </div>
        </section>
      </ng-template>

      <ng-template
        appDocsExampleVariant
        value="tailwind-css"
        label="Tailwind CSS"
        panelTitle="Tailwind metric spinners"
        [codeTabs]="uploadTailwindTabs"
      >
        <section
          class="flex flex-wrap gap-4 rounded-xl border border-slate-300 bg-slate-50 p-4 dark:border-slate-700 dark:bg-slate-900/60"
        >
          <tng-progress-spinner [value]="uploadProgress" ariaLabel="Upload progress"></tng-progress-spinner>
          <tng-progress-spinner [value]="testCoverageProgress" ariaLabel="Test coverage"></tng-progress-spinner>
        </section>
      </ng-template>
    </app-docs-example-tabs-section>
  </section>

  <section class="progress-spinner-examples-block">
    <app-docs-example-tabs-section
      heading="Loading and rollout state"
      description="Use indeterminate when duration is unknown, then switch to determinate rollout progress."
      ariaLabel="Progress spinner loading examples"
      tabListAriaLabel="Progress spinner loading style variants"
      defaultValue="headless"
      [codeBlockTheme]="codeBlockTheme()"
    >
      <ng-template
        appDocsExampleVariant
        value="headless"
        label="Headless"
        panelTitle="Headless loading spinners"
        [codeTabs]="loadingHeadlessTabs"
      >
        <section class="spinner-example-shell spinner-example-shell--headless">
          <div class="spinner-example-row">
            <span>Preparing release</span>
            <span
              tngProgressSpinner
              [indeterminate]="true"
              class="spinner-example-item spinner-example-item--indeterminate"
              aria-label="Preparing release"
            ></span>
          </div>
          <div class="spinner-example-row">
            <span>Rollout</span>
            <tng-progress-spinner [value]="releaseProgress" ariaLabel="Release rollout"></tng-progress-spinner>
          </div>
        </section>
      </ng-template>

      <ng-template
        appDocsExampleVariant
        value="plain-css"
        label="Plain-CSS"
        panelTitle="Wrapper loading spinners"
        [codeTabs]="loadingPlainTabs"
      >
        <section class="spinner-example-shell spinner-example-shell--plain">
          <div class="spinner-example-row">
            <span>Preparing release</span>
            <tng-progress-spinner [indeterminate]="true" ariaLabel="Preparing release"></tng-progress-spinner>
          </div>
          <div class="spinner-example-row">
            <span>Rollout</span>
            <tng-progress-spinner [value]="releaseProgress" ariaLabel="Release rollout"></tng-progress-spinner>
          </div>
        </section>
      </ng-template>

      <ng-template
        appDocsExampleVariant
        value="tailwind-css"
        label="Tailwind CSS"
        panelTitle="Tailwind loading spinners"
        [codeTabs]="loadingTailwindTabs"
      >
        <section
          class="flex flex-wrap gap-4 rounded-xl border border-slate-300 bg-slate-50 p-4 dark:border-slate-700 dark:bg-slate-900/60"
        >
          <tng-progress-spinner [indeterminate]="true" ariaLabel="Preparing release"></tng-progress-spinner>
          <tng-progress-spinner [value]="releaseProgress" ariaLabel="Release rollout"></tng-progress-spinner>
        </section>
      </ng-template>
    </app-docs-example-tabs-section>
  </section>
</article>
