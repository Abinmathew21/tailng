<article class="progress-bar-styling">
  <h2 class="progress-bar-styling-title">Styling contract</h2>
  <p class="progress-bar-styling-lead">
    Progress Bar exposes stable slot hooks so design systems can control track, indicator, and
    indeterminate motion.
  </p>

  <section class="progress-bar-styling-block">
    <h3>Slot hooks</h3>
    <p>
      Both primitives and wrappers expose the same selectors:
      <code>progress-bar</code> and <code>progress-bar-indicator</code>.
    </p>
    <tng-code-block
      [code]="cssContractCode"
      adapter="shiki"
      language="css"
      title="Recommended CSS contract"
      [theme]="codeBlockTheme()"
      [lineNumbers]="false"
      [wrap]="true"
      [sanitizeHtml]="false"
    ></tng-code-block>
  </section>
</article>
