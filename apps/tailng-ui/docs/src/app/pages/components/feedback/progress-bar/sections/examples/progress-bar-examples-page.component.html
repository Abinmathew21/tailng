<article class="progress-bar-examples">
  <h2 class="progress-bar-examples-title">Examples</h2>
  <p class="progress-bar-examples-lead">
    Pair determinate and indeterminate states to communicate progress and loading intent clearly.
  </p>

  <section id="determinate-metrics" class="progress-bar-examples-block">
    <app-docs-example-tabs-section
      heading="Determinate metrics"
      description="Track completion of known-duration tasks with determinate values."
      ariaLabel="Progress upload examples"
      tabListAriaLabel="Progress upload style variants"
      defaultValue="plain-css"
      [codeBlockTheme]="codeBlockTheme()"
    >
      <ng-template
        appDocsExampleVariant
        value="plain-css"
        label="Plain-CSS"
        panelTitle="Wrapper metric bars"
        [codeTabs]="uploadPlainTabs"
      >
        <section class="progress-example-shell progress-example-shell--plain">
          <div class="progress-example-row">
            <span>Upload progress</span>
            <tng-progress-bar [value]="uploadProgress" ariaLabel="Upload progress"></tng-progress-bar>
          </div>
          <div class="progress-example-row">
            <span>Quality checks</span>
            <tng-progress-bar [value]="qualityProgress" ariaLabel="Quality checks"></tng-progress-bar>
          </div>
        </section>
      </ng-template>

      <ng-template
        appDocsExampleVariant
        value="tailwind-css"
        label="Tailwind CSS"
        panelTitle="Tailwind metric bars"
        [codeTabs]="uploadTailwindTabs"
      >
        <section
          class="grid gap-3 rounded-xl border border-[var(--tng-semantic-border-subtle)] bg-[color-mix(in_srgb,var(--tng-semantic-background-surface)_88%,transparent)] p-4"
        >
          <div class="grid gap-1 text-sm">
            <span class="text-[var(--tng-semantic-foreground-primary)]">Upload progress</span>
            <tng-progress-bar [value]="uploadProgress" ariaLabel="Upload progress"></tng-progress-bar>
          </div>
          <div class="grid gap-1 text-sm">
            <span class="text-[var(--tng-semantic-foreground-primary)]">Quality checks</span>
            <tng-progress-bar [value]="qualityProgress" ariaLabel="Quality checks"></tng-progress-bar>
          </div>
        </section>
      </ng-template>
    </app-docs-example-tabs-section>
  </section>

  <section id="indeterminate-handoff" class="progress-bar-examples-block">
    <app-docs-example-tabs-section
      heading="Indeterminate handoff"
      description="Use indeterminate when duration is unknown, then switch to determinate rollout progress."
      ariaLabel="Progress loading examples"
      tabListAriaLabel="Progress loading style variants"
      defaultValue="plain-css"
      [codeBlockTheme]="codeBlockTheme()"
    >
      <ng-template
        appDocsExampleVariant
        value="plain-css"
        label="Plain-CSS"
        panelTitle="Wrapper loading bars"
        [codeTabs]="loadingPlainTabs"
      >
        <section class="progress-example-shell progress-example-shell--plain">
          <div class="progress-example-row">
            <span>Preparing release</span>
            <tng-progress-bar [indeterminate]="true" ariaLabel="Preparing release"></tng-progress-bar>
          </div>
          <div class="progress-example-row">
            <span>Rollout</span>
            <tng-progress-bar [value]="releaseProgress" ariaLabel="Release rollout"></tng-progress-bar>
          </div>
        </section>
      </ng-template>

      <ng-template
        appDocsExampleVariant
        value="tailwind-css"
        label="Tailwind CSS"
        panelTitle="Tailwind loading bars"
        [codeTabs]="loadingTailwindTabs"
      >
        <section
          class="grid gap-3 rounded-xl border border-[var(--tng-semantic-border-subtle)] bg-[color-mix(in_srgb,var(--tng-semantic-background-surface)_88%,transparent)] p-4"
        >
          <div class="grid gap-1 text-sm">
            <span class="text-[var(--tng-semantic-foreground-primary)]">Preparing release</span>
            <tng-progress-bar [indeterminate]="true" ariaLabel="Preparing release"></tng-progress-bar>
          </div>
          <div class="grid gap-1 text-sm">
            <span class="text-[var(--tng-semantic-foreground-primary)]">Rollout</span>
            <tng-progress-bar [value]="releaseProgress" ariaLabel="Release rollout"></tng-progress-bar>
          </div>
        </section>
      </ng-template>
    </app-docs-example-tabs-section>
  </section>
</article>
