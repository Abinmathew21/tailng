<article class="skeleton-examples">
  <h2 class="skeleton-examples-title">Examples</h2>
  <p class="skeleton-examples-lead">
    Compose wrapper skeletons for headline stacks, media cards, and action rows while content is
    still loading.
  </p>

  <section id="text-stack" class="skeleton-examples-block">
    <app-docs-example-tabs-section
      heading="Text stack"
      description="Layer wrapper skeletons to mirror heading and paragraph rhythm."
      ariaLabel="Skeleton text examples"
      tabListAriaLabel="Skeleton text style variants"
      defaultValue="plain-css"
      [codeBlockTheme]="codeBlockTheme()"
    >
      <ng-template
        appDocsExampleVariant
        value="plain-css"
        label="Plain-CSS"
        panelTitle="Wrapper text stack"
        [codeTabs]="textPlainTabs"
      >
        <section class="skeleton-example-shell skeleton-example-shell--plain">
          <tng-skeleton width="52%" height="0.85rem"></tng-skeleton>
          <tng-skeleton width="100%" height="1.1rem"></tng-skeleton>
          <tng-skeleton width="88%" height="0.95rem"></tng-skeleton>
          <tng-skeleton width="76%" height="0.95rem"></tng-skeleton>
        </section>
      </ng-template>

      <ng-template
        appDocsExampleVariant
        value="tailwind-css"
        label="Tailwind CSS"
        panelTitle="Tailwind text stack"
        [codeTabs]="textTailwindTabs"
      >
        <section
          class="grid gap-3 rounded-2xl border border-[var(--tng-semantic-border-subtle)] bg-[color-mix(in_srgb,var(--tng-semantic-background-surface)_88%,transparent)] p-4"
        >
          <tng-skeleton width="6rem" height="0.75rem"></tng-skeleton>
          <tng-skeleton width="100%" height="1.15rem"></tng-skeleton>
          <tng-skeleton width="90%" height="0.95rem"></tng-skeleton>
          <tng-skeleton width="72%" height="0.95rem"></tng-skeleton>
        </section>
      </ng-template>
    </app-docs-example-tabs-section>
  </section>

  <section id="message-placeholder" class="skeleton-examples-block">
    <app-docs-example-tabs-section
      heading="Message skeleton"
      description="Add static or random status text for longer loading states."
      ariaLabel="Skeleton message examples"
      tabListAriaLabel="Skeleton message style variants"
      defaultValue="plain-css"
      [codeBlockTheme]="codeBlockTheme()"
    >
      <ng-template
        appDocsExampleVariant
        value="plain-css"
        label="Plain-CSS"
        panelTitle="Wrapper message skeleton"
        [codeTabs]="messagePlainTabs"
      >
        <section class="skeleton-message-shell">
          <tng-skeleton
            width="100%"
            height="1.1rem"
            message="Preparing your dashboard..."
          ></tng-skeleton>

          <tng-skeleton width="100%" height="1.1rem"> Preparing your dashboard... </tng-skeleton>

          <tng-skeleton width="100%" height="1.1rem" [messages]="loadingMessages"></tng-skeleton>

          <tng-skeleton
            width="100%"
            height="1.1rem"
            messageMode="random"
            messageStrategy="interval"
            [messageInterval]="5000"
            [messages]="loadingMessages"
          ></tng-skeleton>
        </section>
      </ng-template>
    </app-docs-example-tabs-section>
  </section>

  <section id="card-placeholder" class="skeleton-examples-block">
    <app-docs-example-tabs-section
      heading="Card placeholder"
      description="Combine media, label, body, and action placeholders for card loading states."
      ariaLabel="Skeleton card examples"
      tabListAriaLabel="Skeleton card style variants"
      defaultValue="plain-css"
      [codeBlockTheme]="codeBlockTheme()"
    >
      <ng-template
        appDocsExampleVariant
        value="plain-css"
        label="Plain-CSS"
        panelTitle="Wrapper card placeholder"
        [codeTabs]="cardPlainTabs"
      >
        <section class="skeleton-card-shell">
          <tng-skeleton width="100%" height="8rem" [rounded]="false"></tng-skeleton>
          <tng-skeleton width="42%" height="0.8rem"></tng-skeleton>
          <tng-skeleton width="76%" height="1rem"></tng-skeleton>
          <tng-skeleton width="100%" height="0.9rem"></tng-skeleton>
          <div class="skeleton-card-actions">
            <tng-skeleton width="5.5rem" height="2.25rem"></tng-skeleton>
            <tng-skeleton width="4.5rem" height="2.25rem"></tng-skeleton>
          </div>
        </section>
      </ng-template>

      <ng-template
        appDocsExampleVariant
        value="tailwind-css"
        label="Tailwind CSS"
        panelTitle="Tailwind card placeholder"
        [codeTabs]="cardTailwindTabs"
      >
        <section
          class="grid gap-3 rounded-2xl border border-[var(--tng-semantic-border-subtle)] bg-[color-mix(in_srgb,var(--tng-semantic-background-surface)_88%,transparent)] p-4"
        >
          <tng-skeleton width="100%" height="8rem" [rounded]="false"></tng-skeleton>
          <tng-skeleton width="7rem" height="0.8rem"></tng-skeleton>
          <tng-skeleton width="82%" height="1rem"></tng-skeleton>
          <tng-skeleton width="100%" height="0.9rem"></tng-skeleton>
          <div class="flex flex-wrap gap-3">
            <tng-skeleton width="6rem" height="2.25rem"></tng-skeleton>
            <tng-skeleton width="4.75rem" height="2.25rem"></tng-skeleton>
          </div>
        </section>
      </ng-template>
    </app-docs-example-tabs-section>
  </section>
</article>
