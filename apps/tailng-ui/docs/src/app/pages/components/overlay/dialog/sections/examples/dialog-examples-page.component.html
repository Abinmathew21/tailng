<article class="dialog-examples">
  <h2 class="dialog-examples-title">Examples</h2>
  <p class="dialog-examples-lead">
    Wrapper dialog examples focused on common confirmation flows. Use the headless dialog page when
    you need to author the overlay DOM yourself.
  </p>

  <section id="delete-release-branch" class="dialog-examples-block">
    <app-docs-example-tabs-section
      heading="Confirmation workflow"
      description="Open a dialog, choose an action, and capture the result in local state."
      ariaLabel="Dialog wrapper examples"
      tabListAriaLabel="Dialog wrapper example style tabs"
      defaultValue="plain-css"
      [codeBlockTheme]="codeBlockTheme()"
    >
      <ng-template
        appDocsExampleVariant
        value="plain-css"
        label="Plain-CSS"
        panelTitle="Wrapper destructive confirmation"
        [codeTabs]="plainCodeTabs"
      >
        <div class="dialog-example-stage">
          <button type="button" class="dialog-example-trigger" (click)="plainOpen.set(true)">
            Delete release branch
          </button>

          <tng-dialog
            title="Delete release branch?"
            description="This action removes branch automation and cannot be undone."
            [open]="plainOpen()"
            (openChange)="plainOpen.set($event)"
          >
            <div class="dialog-action-row">
              <button type="button" class="dialog-example-secondary" (click)="onPlainCancel()">Cancel</button>
              <button type="button" class="dialog-example-danger" (click)="onPlainApprove()">Delete</button>
            </div>
          </tng-dialog>
        </div>
        <p class="dialog-example-state">result: {{ plainResult() }}</p>
      </ng-template>

      <ng-template
        appDocsExampleVariant
        value="tailwind-css"
        label="Tailwind CSS"
        panelTitle="Wrapper deployment dialog"
        [codeTabs]="tailwindCodeTabs"
      >
        <div class="rounded-xl border border-slate-300 bg-slate-50 p-4 dark:border-slate-700 dark:bg-slate-900/60">
          <div class="dialog-example-stage">
            <button
              type="button"
              class="rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm font-semibold text-slate-800 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-100"
              (click)="tailwindOpen.set(true)"
            >
              Approve deployment
            </button>

            <tng-dialog
              title="Approve deployment"
              description="Proceed with production rollout for version 2.7.0?"
              [open]="tailwindOpen()"
              (openChange)="tailwindOpen.set($event)"
            >
              <p class="m-0 text-sm text-slate-700 dark:text-slate-300">
                Rollout will start in us-east and eu-west.
              </p>
              <div class="mt-3 flex flex-wrap justify-end gap-2">
                <button
                  type="button"
                  class="rounded-lg border border-slate-300 px-3 py-2 text-sm font-semibold text-slate-700 dark:border-slate-600 dark:text-slate-200"
                  (click)="onTailwindCancel()"
                >
                  Hold
                </button>
                <button
                  type="button"
                  class="rounded-lg border border-emerald-600 bg-emerald-600 px-3 py-2 text-sm font-semibold text-white"
                  (click)="onTailwindApprove()"
                >
                  Approve
                </button>
              </div>
            </tng-dialog>
          </div>
        </div>
        <p class="dialog-example-state">result: {{ tailwindResult() }}</p>
      </ng-template>
    </app-docs-example-tabs-section>
  </section>
</article>
