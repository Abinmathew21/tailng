<article class="tooltip-examples">
  <h2 class="tooltip-examples-title">Examples</h2>
  <p class="tooltip-examples-lead">
    Production tooltip patterns for short helper hints across plain CSS and Tailwind wrapper shells.
  </p>

  <app-docs-example-tabs-section
    id="action-hint-workflow"
    class="tooltip-examples-block"
    heading="Action hint workflow"
    description="Use tooltip for short non-interactive hints. Prefer popover when users need actions."
    ariaLabel="Tooltip examples"
    tabListAriaLabel="Tooltip example style tabs"
    defaultValue="plain-css"
    [codeBlockTheme]="codeBlockTheme()"
  >
    <ng-template
      appDocsExampleVariant
      value="plain-css"
      label="Plain-CSS"
      panelTitle="Wrapper archive tooltip"
      [codeTabs]="plainCodeTabs"
    >
      <div class="tooltip-example-shell tooltip-example-stage">
        <tng-tooltip
          triggerLabel="Archive release notes"
          text="Moves notes to readonly archive."
          side="bottom"
          [openDelay]="100"
          [closeDelay]="80"
          (openChange)="plainOpen.set($event)"
        ></tng-tooltip>
      </div>
      <p class="tooltip-example-state">open: {{ plainOpen() ? 'true' : 'false' }}</p>
    </ng-template>

    <ng-template
      appDocsExampleVariant
      value="tailwind-css"
      label="Tailwind CSS"
      panelTitle="Wrapper deployment tooltip"
      [codeTabs]="tailwindCodeTabs"
    >
      <div
        class="rounded-xl border border-[var(--tng-semantic-border-subtle)] bg-[color-mix(in_srgb,var(--tng-semantic-background-surface)_88%,transparent)] p-4"
      >
        <div class="grid min-h-[8.5rem] content-start justify-items-start gap-3">
          <tng-tooltip
            triggerLabel="Approve deployment"
            side="top"
            [openDelay]="150"
            [closeDelay]="100"
            (openChange)="tailwindOpen.set($event)"
          >
            <span
              class="block max-w-56 text-sm leading-6 text-[var(--tng-semantic-foreground-primary)]"
            >
              Rollout starts in us-east, then eu-west.
            </span>
          </tng-tooltip>
        </div>
      </div>
      <p class="m-0 text-[0.9rem] text-[var(--tng-semantic-foreground-secondary)]">
        open: {{ tailwindOpen() ? 'true' : 'false' }}
      </p>
    </ng-template>
  </app-docs-example-tabs-section>
</article>
