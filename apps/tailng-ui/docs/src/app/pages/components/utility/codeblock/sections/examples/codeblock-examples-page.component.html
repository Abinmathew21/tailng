<article class="codeblock-examples">
  <h2 class="codeblock-examples-title">Examples</h2>
  <p class="codeblock-examples-lead">
    Use the wrapper for compact snippets or richer review surfaces with focused lines, captions, and copy actions.
  </p>

  <section id="compact-snippet" class="codeblock-examples-block">
    <app-docs-example-tabs-section
      heading="Compact snippet"
      description="Use the compact or ghost variants when you want a smaller shell around short code references."
      ariaLabel="Codeblock compact snippet examples"
      tabListAriaLabel="Codeblock compact snippet styles"
      defaultValue="plain-css"
      [codeBlockTheme]="codeBlockTheme()"
    >
      <ng-template
        appDocsExampleVariant
        value="plain-css"
        label="Plain-CSS"
        panelTitle="Compact snippet"
        [codeTabs]="compactPlainTabs"
      >
        <div class="codeblock-example-shell codeblock-example-shell--plain">
          <tng-code-block
            title="status.ts"
            variant="compact"
            language="ts"
            [code]="compactSnippet"
            [copy]="true"
          ></tng-code-block>
        </div>
      </ng-template>

      <ng-template
        appDocsExampleVariant
        value="tailwind-css"
        label="Tailwind CSS"
        panelTitle="Compact snippet (Tailwind)"
        [codeTabs]="compactTailwindTabs"
      >
        <div
          class="codeblock-example-shell rounded-2xl border border-[var(--tng-semantic-border-subtle)] bg-[color-mix(in_srgb,var(--tng-semantic-background-surface)_88%,transparent)] p-4"
        >
          <tng-code-block
            title="status.ts"
            variant="ghost"
            language="ts"
            [code]="compactSnippet"
            [copy]="true"
          ></tng-code-block>
        </div>
      </ng-template>
    </app-docs-example-tabs-section>
  </section>

  <section id="focused-review" class="codeblock-examples-block">
    <app-docs-example-tabs-section
      heading="Focused review"
      description="Highlight a narrow range and dim the rest when the code block is guiding someone through a review step."
      ariaLabel="Codeblock focused review examples"
      tabListAriaLabel="Codeblock focused review styles"
      defaultValue="plain-css"
      [codeBlockTheme]="codeBlockTheme()"
    >
      <ng-template
        appDocsExampleVariant
        value="plain-css"
        label="Plain-CSS"
        panelTitle="Focused review"
        [codeTabs]="reviewPlainTabs"
      >
        <div class="codeblock-example-shell codeblock-example-shell--plain">
          <tng-code-block
            title="review.ts"
            language="ts"
            [code]="reviewSnippet"
            [lineNumbers]="true"
            [highlightLines]="[3, [4, 4]]"
            [focusLines]="true"
            [wrap]="true"
            maxHeight="14rem"
            [copy]="true"
            caption="Focused review shell"
          ></tng-code-block>
        </div>
      </ng-template>

      <ng-template
        appDocsExampleVariant
        value="tailwind-css"
        label="Tailwind CSS"
        panelTitle="Focused review (Tailwind)"
        [codeTabs]="reviewTailwindTabs"
      >
        <div
          class="codeblock-example-shell rounded-2xl border border-[var(--tng-semantic-border-subtle)] bg-[color-mix(in_srgb,var(--tng-semantic-background-surface)_88%,transparent)] p-4"
        >
          <tng-code-block
            title="review.ts"
            variant="ghost"
            language="ts"
            [code]="reviewSnippet"
            [lineNumbers]="true"
            [highlightLines]="[3, [4, 4]]"
            [focusLines]="true"
            [wrap]="true"
            maxHeight="14rem"
            [copy]="true"
            caption="Focused review shell"
          ></tng-code-block>
        </div>
      </ng-template>
    </app-docs-example-tabs-section>
  </section>
</article>
