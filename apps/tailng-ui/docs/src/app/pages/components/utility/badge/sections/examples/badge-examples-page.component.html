<article class="badge-examples">
  <h2 class="badge-examples-title">Examples</h2>
  <p class="badge-examples-lead">
    Production badge scenarios rendered through the components package with Plain-CSS and Tailwind
    host styling layers.
  </p>

  <app-docs-example-tabs-section
    id="notification-counts"
    class="badge-examples-block"
    heading="Notification counts"
    description="Count badges with max capping and status dots updated at runtime."
    ariaLabel="Notification badge variants"
    tabListAriaLabel="Notification badge style tabs"
    defaultValue="plain-css"
    [codeBlockTheme]="codeBlockTheme()"
  >
    <ng-template
      appDocsExampleVariant
      value="plain-css"
      label="Plain-CSS"
      panelTitle="Notification row (Plain CSS)"
      [codeTabs]="notificationsPlainCodeTabs"
    >
      <div class="badge-example-shell badge-example-shell--plain">
        <div class="badge-example-row">
          <button type="button" [tngBadge]="count('plain')" tngBadgeTone="info" class="badge-example-host">
            Inbox
          </button>
          <button type="button" [tngBadge]="count('plain') * 8" [tngBadgeMax]="99" tngBadgeTone="danger" class="badge-example-host">
            Alerts
          </button>
          <button type="button" [tngBadge]="null" [tngBadgeDot]="count('plain') > 0" tngBadgeTone="success" class="badge-example-host">
            Presence
          </button>
        </div>
        <div class="badge-example-controls">
          <button type="button" class="badge-control" (click)="adjustCount('plain', 1)">+1</button>
          <button type="button" class="badge-control" (click)="adjustCount('plain', -1)">-1</button>
          <button type="button" class="badge-control" (click)="clearCount('plain')">Clear</button>
        </div>
        <p class="badge-example-status">count: {{ count('plain') }}</p>
      </div>
    </ng-template>

    <ng-template
      appDocsExampleVariant
      value="tailwind-css"
      label="Tailwind CSS"
      panelTitle="Notification row (Tailwind CSS)"
      [codeTabs]="notificationsTailwindCodeTabs"
    >
      <div
        class="flex flex-col gap-3 rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-4 text-tng-fg-primary shadow-[inset_0_0_0_1px_color-mix(in_srgb,var(--tng-semantic-border-subtle)_55%,transparent)]"
      >
        <div class="flex flex-wrap gap-3">
          <button
            type="button"
            [tngBadge]="count('tailwind')"
            class="inline-flex min-h-10 min-w-28 items-center rounded-lg border border-tng-border-subtle bg-tng-bg-base px-4 py-2 text-sm font-semibold text-tng-fg-primary shadow-[inset_0_0_0_1px_color-mix(in_srgb,var(--tng-semantic-border-subtle)_55%,transparent)] transition hover:bg-tng-bg-muted"
          >
            Inbox
          </button>
          <button
            type="button"
            [tngBadge]="count('tailwind') * 6"
            [tngBadgeMax]="99"
            tngBadgeTone="warning"
            class="inline-flex min-h-10 min-w-28 items-center rounded-lg border border-tng-border-subtle bg-tng-bg-base px-4 py-2 text-sm font-semibold text-tng-fg-primary shadow-[inset_0_0_0_1px_color-mix(in_srgb,var(--tng-semantic-border-subtle)_55%,transparent)] transition hover:bg-tng-bg-muted"
          >
            Alerts
          </button>
          <button
            type="button"
            [tngBadge]="null"
            [tngBadgeDot]="count('tailwind') > 0"
            tngBadgeTone="success"
            class="inline-flex min-h-10 min-w-28 items-center rounded-lg border border-tng-border-subtle bg-tng-bg-base px-4 py-2 text-sm font-semibold text-tng-fg-primary shadow-[inset_0_0_0_1px_color-mix(in_srgb,var(--tng-semantic-border-subtle)_55%,transparent)] transition hover:bg-tng-bg-muted"
          >
            Presence
          </button>
        </div>
        <div class="flex flex-wrap gap-2">
          <button
            type="button"
            class="inline-flex min-h-8 items-center rounded-md border border-[var(--tng-semantic-border-default)] px-3 text-xs font-semibold text-tng-fg-primary transition hover:bg-tng-bg-muted focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[color-mix(in_srgb,var(--tng-semantic-focus-ring)_40%,transparent)] focus-visible:ring-offset-2 focus-visible:ring-offset-tng-bg-surface"
            (click)="adjustCount('tailwind', 1)"
          >
            +1
          </button>
          <button
            type="button"
            class="inline-flex min-h-8 items-center rounded-md border border-[var(--tng-semantic-border-default)] px-3 text-xs font-semibold text-tng-fg-primary transition hover:bg-tng-bg-muted focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[color-mix(in_srgb,var(--tng-semantic-focus-ring)_40%,transparent)] focus-visible:ring-offset-2 focus-visible:ring-offset-tng-bg-surface"
            (click)="adjustCount('tailwind', -1)"
          >
            -1
          </button>
          <button
            type="button"
            class="inline-flex min-h-8 items-center rounded-md border border-[var(--tng-semantic-border-default)] px-3 text-xs font-semibold text-tng-fg-primary transition hover:bg-tng-bg-muted focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[color-mix(in_srgb,var(--tng-semantic-focus-ring)_40%,transparent)] focus-visible:ring-offset-2 focus-visible:ring-offset-tng-bg-surface"
            (click)="clearCount('tailwind')"
          >
            Clear
          </button>
        </div>
        <p class="m-0 text-sm text-tng-fg-secondary">count: {{ count('tailwind') }}</p>
      </div>
    </ng-template>
  </app-docs-example-tabs-section>

  <app-docs-example-tabs-section
    id="placement-and-host-sizing"
    class="badge-examples-block"
    heading="Placement and host sizing"
    description="Adjust runtime placement and host dimensions while keeping the badge anchored."
    ariaLabel="Badge runtime placement variants"
    tabListAriaLabel="Badge placement style tabs"
    defaultValue="plain-css"
    [codeBlockTheme]="codeBlockTheme()"
  >
    <ng-template
      appDocsExampleVariant
      value="plain-css"
      label="Plain-CSS"
      panelTitle="Runtime placement (Plain CSS)"
      [codeTabs]="runtimePlainCodeTabs"
    >
      <div class="badge-example-shell badge-example-shell--plain">
        <button
          type="button"
          [tngBadge]="14"
          [tngBadgePosition]="position('plain')"
          [tngBadgeHidden]="hidden('plain')"
          class="badge-runtime-host"
          [style.width.px]="width('plain')"
          [style.height.px]="height('plain')"
        >
          Runtime host
        </button>
        <div class="badge-runtime-controls">
          <div class="badge-position-buttons">
            <button type="button" class="badge-control" (click)="setPosition('plain', 'top-start')">top-start</button>
            <button type="button" class="badge-control" (click)="setPosition('plain', 'top-end')">top-end</button>
            <button type="button" class="badge-control" (click)="setPosition('plain', 'bottom-start')">bottom-start</button>
            <button type="button" class="badge-control" (click)="setPosition('plain', 'bottom-end')">bottom-end</button>
          </div>
          <label class="badge-input-row">
            Hidden
            <input type="checkbox" [checked]="hidden('plain')" (change)="toggleHidden('plain', $event)" />
          </label>
          <label class="badge-input-row">
            Width
            <input type="range" min="140" max="320" [value]="width('plain')" (input)="updateWidth('plain', $event)" />
          </label>
          <label class="badge-input-row">
            Height
            <input type="range" min="48" max="140" [value]="height('plain')" (input)="updateHeight('plain', $event)" />
          </label>
        </div>
        <p class="badge-example-status">{{ runtimeSummary('plain') }}</p>
      </div>
    </ng-template>

    <ng-template
      appDocsExampleVariant
      value="tailwind-css"
      label="Tailwind CSS"
      panelTitle="Runtime placement (Tailwind CSS)"
      [codeTabs]="runtimeTailwindCodeTabs"
    >
      <div
        class="flex flex-col gap-3 rounded-2xl border border-tng-border-subtle bg-tng-bg-surface p-4 text-tng-fg-primary shadow-[inset_0_0_0_1px_color-mix(in_srgb,var(--tng-semantic-border-subtle)_55%,transparent)]"
      >
        <button
          type="button"
          [tngBadge]="14"
          [tngBadgePosition]="position('tailwind')"
          [tngBadgeHidden]="hidden('tailwind')"
          class="inline-flex items-center justify-center rounded-lg border border-tng-border-subtle bg-tng-bg-base px-4 py-2 text-sm font-semibold text-tng-fg-primary shadow-[inset_0_0_0_1px_color-mix(in_srgb,var(--tng-semantic-border-subtle)_55%,transparent)] transition-[width,height] hover:bg-tng-bg-muted"
          [style.width.px]="width('tailwind')"
          [style.height.px]="height('tailwind')"
        >
          Runtime host
        </button>
        <div class="flex flex-wrap gap-2">
          <button
            type="button"
            class="inline-flex min-h-8 items-center rounded-md border border-[var(--tng-semantic-border-default)] px-3 text-xs font-semibold text-tng-fg-primary transition hover:bg-tng-bg-muted focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[color-mix(in_srgb,var(--tng-semantic-focus-ring)_40%,transparent)] focus-visible:ring-offset-2 focus-visible:ring-offset-tng-bg-surface"
            (click)="setPosition('tailwind', 'top-start')"
          >
            top-start
          </button>
          <button
            type="button"
            class="inline-flex min-h-8 items-center rounded-md border border-[var(--tng-semantic-border-default)] px-3 text-xs font-semibold text-tng-fg-primary transition hover:bg-tng-bg-muted focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[color-mix(in_srgb,var(--tng-semantic-focus-ring)_40%,transparent)] focus-visible:ring-offset-2 focus-visible:ring-offset-tng-bg-surface"
            (click)="setPosition('tailwind', 'top-end')"
          >
            top-end
          </button>
          <button
            type="button"
            class="inline-flex min-h-8 items-center rounded-md border border-[var(--tng-semantic-border-default)] px-3 text-xs font-semibold text-tng-fg-primary transition hover:bg-tng-bg-muted focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[color-mix(in_srgb,var(--tng-semantic-focus-ring)_40%,transparent)] focus-visible:ring-offset-2 focus-visible:ring-offset-tng-bg-surface"
            (click)="setPosition('tailwind', 'bottom-start')"
          >
            bottom-start
          </button>
          <button
            type="button"
            class="inline-flex min-h-8 items-center rounded-md border border-[var(--tng-semantic-border-default)] px-3 text-xs font-semibold text-tng-fg-primary transition hover:bg-tng-bg-muted focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[color-mix(in_srgb,var(--tng-semantic-focus-ring)_40%,transparent)] focus-visible:ring-offset-2 focus-visible:ring-offset-tng-bg-surface"
            (click)="setPosition('tailwind', 'bottom-end')"
          >
            bottom-end
          </button>
        </div>
        <div class="badge-tailwind-runtime-fields flex flex-wrap items-center gap-4 text-sm text-tng-fg-secondary">
          <label class="inline-flex items-center gap-2">
            Hidden
            <input type="checkbox" [checked]="hidden('tailwind')" (change)="toggleHidden('tailwind', $event)" />
          </label>
          <label class="inline-flex items-center gap-2">
            Width
            <input type="range" min="140" max="320" [value]="width('tailwind')" (input)="updateWidth('tailwind', $event)" />
          </label>
          <label class="inline-flex items-center gap-2">
            Height
            <input type="range" min="48" max="140" [value]="height('tailwind')" (input)="updateHeight('tailwind', $event)" />
          </label>
        </div>
        <p class="m-0 text-sm text-tng-fg-secondary">{{ runtimeSummary('tailwind') }}</p>
      </div>
    </ng-template>
  </app-docs-example-tabs-section>
</article>
