<section class="multiselect-docs-page">
  <tng-tabs
    class="multiselect-docs-tabs"
    ariaLabel="MultiSelect documentation sections"
    [activation]="'manual'"
    [value]="activeSection()"
    (valueChange)="onSectionChange($event)"
  >
    <div
      tngTabList
      class="multiselect-docs-tab-list"
      ariaLabel="MultiSelect documentation tabs"
    >
      <button type="button" tngTab value="overview" class="multiselect-docs-tab-trigger">
        Overview
      </button>
      <button type="button" tngTab value="api" class="multiselect-docs-tab-trigger">API</button>
      <button type="button" tngTab value="styling" class="multiselect-docs-tab-trigger">
        Styling
      </button>
      <button type="button" tngTab value="examples" class="multiselect-docs-tab-trigger">
        Examples
      </button>
      <button type="button" tngTab value="ownable-install" class="multiselect-docs-tab-trigger">
        Ownable Install
      </button>
    </div>
  </tng-tabs>

  <section class="multiselect-docs-content">
    <router-outlet />
  </section>
</section>
