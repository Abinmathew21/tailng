<article class="docs-section-page switch-examples">
  <div class="docs-section-page-main">
    <section id="settings-panel" class="docs-section-anchor switch-examples-block">
      <app-docs-example-tabs-section
        heading="Settings panel"
        description="A small settings stack is the most common wrapper around component switches."
        ariaLabel="Switch settings examples"
        tabListAriaLabel="Switch settings style variants"
        defaultValue="plain-css"
        [codeBlockTheme]="codeBlockTheme()"
      >
        <ng-template
          appDocsExampleVariant
          value="plain-css"
          label="Plain-CSS"
          panelTitle="Settings panel (Plain-CSS)"
          [codeTabs]="settingsPlainCodeTabs"
          [stackblitzUrl]="stackblitzVanillaUrl"
        >
          <section class="component-switch-settings-card">
            <tng-switch
              class="component-switch-settings-card__switch"
              [checked]="plainCssReleaseEmails()"
              (checkedChange)="plainCssReleaseEmails.set($event)"
            >
              Release summary email
            </tng-switch>
            <tng-switch
              class="component-switch-settings-card__switch"
              [checked]="plainCssFreezeWindow()"
              (checkedChange)="plainCssFreezeWindow.set($event)"
            >
              Freeze deploy window
            </tng-switch>
          </section>
        </ng-template>

        <ng-template
          appDocsExampleVariant
          value="tailwind-css"
          label="Tailwind CSS"
          panelTitle="Settings panel (Tailwind CSS)"
          [codeTabs]="settingsTailwindCodeTabs"
          [stackblitzUrl]="stackblitzTailwindUrl"
        >
          <section class="grid w-full max-w-[32rem] gap-3 rounded-2xl border border-slate-300 bg-white p-4 text-slate-900 shadow-sm [color-scheme:light]">
            <tng-switch
              class="[--tng-semantic-accent-brand:#2563eb] [--tng-semantic-border-subtle:#cbd5e1] [--tng-semantic-focus-ring:rgba(37,99,235,0.25)] [--tng-semantic-foreground-primary:#0f172a]"
              [checked]="tailwindReleaseEmails()"
              (checkedChange)="tailwindReleaseEmails.set($event)"
            >
              Release summary email
            </tng-switch>
            <tng-switch
              class="[--tng-semantic-accent-brand:#2563eb] [--tng-semantic-border-subtle:#cbd5e1] [--tng-semantic-focus-ring:rgba(37,99,235,0.25)] [--tng-semantic-foreground-primary:#0f172a]"
              [checked]="tailwindFreezeWindow()"
              (checkedChange)="tailwindFreezeWindow.set($event)"
            >
              Freeze deploy window
            </tng-switch>
          </section>
        </ng-template>
      </app-docs-example-tabs-section>
    </section>

    <section id="disabled-state" class="docs-section-anchor switch-examples-block">
      <app-docs-example-tabs-section
        heading="Disabled state"
        description="Server-locked or compliance-locked settings should present the same state while clearly muting interaction."
        ariaLabel="Switch disabled state examples"
        tabListAriaLabel="Switch disabled style variants"
        defaultValue="plain-css"
        [codeBlockTheme]="codeBlockTheme()"
      >
        <ng-template
          appDocsExampleVariant
          value="plain-css"
          label="Plain-CSS"
          panelTitle="Disabled state (Plain-CSS)"
          [codeTabs]="disabledPlainCodeTabs"
          [stackblitzUrl]="stackblitzVanillaUrl"
        >
          <section class="component-switch-disabled-card">
            <tng-switch
              class="component-switch-disabled-card__switch"
              [checked]="true"
              [disabled]="true"
            >
              Locked after compliance review
            </tng-switch>
          </section>
        </ng-template>

        <ng-template
          appDocsExampleVariant
          value="tailwind-css"
          label="Tailwind CSS"
          panelTitle="Disabled state (Tailwind CSS)"
          [codeTabs]="disabledTailwindCodeTabs"
          [stackblitzUrl]="stackblitzTailwindUrl"
        >
          <section class="grid w-full max-w-[32rem] gap-3 rounded-2xl border border-slate-300 bg-white p-4 text-slate-500 shadow-sm [color-scheme:light]">
            <tng-switch
              class="[--tng-semantic-accent-brand:#2563eb] [--tng-semantic-border-subtle:#cbd5e1] [--tng-semantic-focus-ring:rgba(37,99,235,0.25)] [--tng-semantic-foreground-primary:#64748b]"
              [checked]="true"
              [disabled]="true"
            >
              Locked after compliance review
            </tng-switch>
          </section>
        </ng-template>
      </app-docs-example-tabs-section>
    </section>
  </div>
</article>
