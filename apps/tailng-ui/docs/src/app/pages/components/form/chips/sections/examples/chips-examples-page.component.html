<article class="chips-examples">
  <h2 class="chips-examples-title">Chips examples</h2>
  <p class="chips-examples-lead">
    Use chips for removable tags, multi-selection summaries, and filter tokens.
  </p>

  <section class="chips-examples-block">
    <h3>Removable chip list</h3>
    <tng-code-block
      [code]="removableChipsCode"
      adapter="shiki"
      language="ts"
      title="Controlled chips"
      [lineNumbers]="false"
      [wrap]="true"
      [sanitizeHtml]="false"
    ></tng-code-block>
  </section>

  <section class="chips-examples-block">
    <h3>Disabled chip sample</h3>
    <tng-code-block
      [code]="disabledChipCode"
      adapter="shiki"
      language="html"
      title="Disabled + active chips"
      [lineNumbers]="false"
      [wrap]="true"
      [sanitizeHtml]="false"
    ></tng-code-block>
  </section>
</article>
