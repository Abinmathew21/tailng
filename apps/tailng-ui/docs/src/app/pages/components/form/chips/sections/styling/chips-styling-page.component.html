<article class="chips-styling">
  <h2 class="chips-styling-title">Chips styling</h2>
  <p class="chips-styling-lead">
    Chips are intentionally presentation-light. Use `data-slot` and state hooks to map your own
    visual system.
  </p>

  <section class="chips-styling-block">
    <h3>State hooks</h3>
    <tng-code-block
      [code]="stateHooksCode"
      adapter="shiki"
      language="css"
      title="Headless hooks"
      [lineNumbers]="false"
      [wrap]="true"
      [sanitizeHtml]="false"
    ></tng-code-block>
  </section>

  <section class="chips-styling-block">
    <h3>Plain CSS example</h3>
    <tng-code-block
      [code]="plainCssSnippet"
      adapter="shiki"
      language="css"
      title="Chip styles"
      [lineNumbers]="false"
      [wrap]="true"
      [sanitizeHtml]="false"
    ></tng-code-block>
  </section>
</article>
