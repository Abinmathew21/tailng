<section class="button-toggle-docs-page">
  <tng-tabs
    class="button-toggle-docs-tabs"
    ariaLabel="Button Toggle documentation sections"
    [activation]="'manual'"
    [value]="activeSection()"
    (valueChange)="onSectionChange($event)"
  >
    <div
      tngTabList
      class="button-toggle-docs-tab-list"
      ariaLabel="Button Toggle documentation tabs"
    >
      <button type="button" tngTab value="overview" class="button-toggle-docs-tab-trigger">
        Overview
      </button>
      <button type="button" tngTab value="api" class="button-toggle-docs-tab-trigger">API</button>
      <button type="button" tngTab value="styling" class="button-toggle-docs-tab-trigger">
        Styling
      </button>
      <button type="button" tngTab value="examples" class="button-toggle-docs-tab-trigger">
        Examples
      </button>
      <button
        type="button"
        tngTab
        value="ownable-install"
        class="button-toggle-docs-tab-trigger"
      >
        Ownable Install
      </button>
    </div>
  </tng-tabs>

  <section class="button-toggle-docs-content">
    <router-outlet />
  </section>
</section>
