<article class="textarea-examples">
  <h2 class="textarea-examples-title">Examples</h2>
  <p class="textarea-examples-lead">
    Copy-ready multiline input patterns rendered with the same component behavior in plain CSS and
    Tailwind shells.
  </p>

  <section class="textarea-examples-block">
    <app-docs-example-tabs-section
      heading="Form usage"
      description="Use the textarea inside a submit-ready form when a larger text field belongs to a workflow."
      ariaLabel="Textarea form usage example"
      tabListAriaLabel="Textarea form usage variants"
      defaultValue="live-demo"
      [codeBlockTheme]="codeBlockTheme()"
    >
      <ng-template
        appDocsExampleVariant
        value="live-demo"
        label="Live demo"
        panelTitle="Textarea form usage"
      >
        <app-docs-form-demo-shell
          title="Draft incident summary"
          description="Capture multiline status notes before routing the incident update."
          submitLabel="Save summary"
        >
          <div docsFormDemoField class="textarea-postmortem-example">
            <label class="textarea-postmortem-example__label" for="textarea-form-usage">
              Incident summary
            </label>
            <tng-textarea
              [id]="'textarea-form-usage'"
              [rows]="5"
              [resize]="'vertical'"
              [placeholder]="'Add the latest incident summary'"
              [value]="plainValue()"
              (valueChange)="onPlainValueChange($event)"
            ></tng-textarea>
          </div>
          <p docsFormDemoSummary>{{ plainValue().length }} characters</p>
        </app-docs-form-demo-shell>
      </ng-template>
    </app-docs-example-tabs-section>
  </section>

  <section class="textarea-examples-block">
    <app-docs-example-tabs-section
      heading="Incident summary composer"
      description="Capture richer text while preserving native textarea semantics and predictable resize behavior."
      ariaLabel="Textarea examples"
      tabListAriaLabel="Textarea example style variants"
      defaultValue="plain-css"
      [codeBlockTheme]="codeBlockTheme()"
    >
      <ng-template
        appDocsExampleVariant
        value="plain-css"
        label="Plain-CSS"
        panelTitle="Plain CSS textarea example"
        [codeTabs]="plainCssCodeTabs"
        [stackblitzUrl]="stackblitzVanillaUrl"
      >
        <section class="textarea-postmortem-example">
          <label class="textarea-postmortem-example__label" for="textarea-examples-plain">
            Postmortem summary
          </label>
          <tng-textarea
            [id]="'textarea-examples-plain'"
            [rows]="5"
            [resize]="'none'"
            [placeholder]="'Add postmortem summary'"
            [value]="plainValue()"
            (valueChange)="onPlainValueChange($event)"
          ></tng-textarea>
          <p class="textarea-postmortem-example__meta">{{ plainValue().length }} characters</p>
        </section>
      </ng-template>

      <ng-template
        appDocsExampleVariant
        value="tailwind-css"
        label="Tailwind CSS"
        panelTitle="Tailwind textarea example"
        [codeTabs]="tailwindCodeTabs"
        [stackblitzUrl]="stackblitzTailwindUrl"
        >
        <section
          class="textarea-example-shell rounded-xl border border-slate-300 bg-slate-50 p-4 dark:border-slate-700 dark:bg-slate-900/60"
        >
          <label class="textarea-example-label" for="textarea-examples-tailwind">Customer update</label>
          <tng-textarea
            [id]="'textarea-examples-tailwind'"
            [rows]="5"
            [resize]="'vertical'"
            [placeholder]="'Write customer-facing notes'"
            [value]="tailwindValue()"
            (valueChange)="onTailwindValueChange($event)"
          ></tng-textarea>
          <p class="textarea-example-meta">{{ tailwindValue().length }} characters</p>
        </section>
      </ng-template>
    </app-docs-example-tabs-section>
  </section>
</article>
