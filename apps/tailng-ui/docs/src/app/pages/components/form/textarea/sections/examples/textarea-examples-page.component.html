<article class="textarea-examples">
  <h2 class="textarea-examples-title">Examples</h2>
  <p class="textarea-examples-lead">
    Common multiline input patterns rendered with the same behavior across headless, plain CSS, and
    Tailwind wrappers.
  </p>

  <section class="textarea-examples-block">
    <app-docs-example-tabs-section
      heading="Incident summary composer"
      description="Capture richer text while preserving native textarea semantics and predictable resize behavior."
      ariaLabel="Textarea examples"
      tabListAriaLabel="Textarea example style variants"
      defaultValue="headless"
      [codeBlockTheme]="codeBlockTheme()"
    >
      <ng-template
        appDocsExampleVariant
        value="headless"
        label="Headless"
        panelTitle="Headless textarea example"
        [codeTabs]="headlessCodeTabs"
      >
        <section class="textarea-example-shell textarea-example-shell--headless">
          <label class="textarea-example-label" for="textarea-examples-headless">Incident summary</label>
          <div tngInputGroup class="textarea-example-field-shell">
            <textarea
              id="textarea-examples-headless"
              tngInput
              rows="5"
              [value]="headlessValue()"
              (input)="onHeadlessInput($event)"
            ></textarea>
          </div>
          <p class="textarea-example-meta">{{ headlessValue().length }} characters</p>
        </section>
      </ng-template>

      <ng-template
        appDocsExampleVariant
        value="plain-css"
        label="Plain-CSS"
        panelTitle="Plain CSS textarea example"
        [codeTabs]="plainCssCodeTabs"
      >
        <section class="textarea-example-shell textarea-example-shell--plain">
          <label class="textarea-example-label">Postmortem summary</label>
          <tng-textarea
            [rows]="5"
            [resize]="'none'"
            [placeholder]="'Add postmortem summary'"
            [value]="plainValue()"
            (valueChange)="onPlainValueChange($event)"
          ></tng-textarea>
          <p class="textarea-example-meta">{{ plainValue().length }} characters</p>
        </section>
      </ng-template>

      <ng-template
        appDocsExampleVariant
        value="tailwind-css"
        label="Tailwind CSS"
        panelTitle="Tailwind textarea example"
        [codeTabs]="tailwindCodeTabs"
      >
        <section
          class="textarea-example-shell rounded-xl border border-slate-300 bg-slate-50 p-4 dark:border-slate-700 dark:bg-slate-900/60"
        >
          <label class="textarea-example-label">Customer update</label>
          <tng-textarea
            [rows]="5"
            [resize]="'vertical'"
            [placeholder]="'Write customer-facing notes'"
            [value]="tailwindValue()"
            (valueChange)="onTailwindValueChange($event)"
          ></tng-textarea>
          <p class="textarea-example-meta">{{ tailwindValue().length }} characters</p>
        </section>
      </ng-template>
    </app-docs-example-tabs-section>
  </section>
</article>
