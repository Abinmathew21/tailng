<section class="radio-docs-page">
  <tng-tabs
    class="radio-docs-tabs"
    ariaLabel="Radio documentation sections"
    [activation]="'manual'"
    [value]="activeSection()"
    (valueChange)="onSectionChange($event)"
  >
    <div tngTabList class="radio-docs-tab-list" ariaLabel="Radio documentation tabs">
      <button type="button" tngTab value="overview" class="radio-docs-tab-trigger">Overview</button>
      <button type="button" tngTab value="api" class="radio-docs-tab-trigger">API</button>
      <button type="button" tngTab value="styling" class="radio-docs-tab-trigger">Styling</button>
      <button type="button" tngTab value="examples" class="radio-docs-tab-trigger">Examples</button>
      <button type="button" tngTab value="ownable-install" class="radio-docs-tab-trigger">
        Ownable Install
      </button>
    </div>
  </tng-tabs>

  <section class="radio-docs-content">
    <router-outlet />
  </section>
</section>
