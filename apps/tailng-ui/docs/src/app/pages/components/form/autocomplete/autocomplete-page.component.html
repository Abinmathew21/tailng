<section class="autocomplete-docs-page">
  <tng-tabs
    class="autocomplete-docs-tabs"
    ariaLabel="Autocomplete documentation sections"
    [activation]="'manual'"
    [value]="activeSection()"
    (valueChange)="onSectionChange($event)"
  >
    <div
      tngTabList
      class="autocomplete-docs-tab-list"
      ariaLabel="Autocomplete documentation tabs"
    >
      <button type="button" tngTab value="overview" class="autocomplete-docs-tab-trigger">
        Overview
      </button>
      <button type="button" tngTab value="api" class="autocomplete-docs-tab-trigger">API</button>
      <button type="button" tngTab value="styling" class="autocomplete-docs-tab-trigger">
        Styling
      </button>
      <button type="button" tngTab value="examples" class="autocomplete-docs-tab-trigger">
        Examples
      </button>
      <button
        type="button"
        tngTab
        value="ownable-install"
        class="autocomplete-docs-tab-trigger"
      >
        Ownable Install
      </button>
    </div>
  </tng-tabs>

  <section class="autocomplete-docs-content">
    <router-outlet />
  </section>
</section>
