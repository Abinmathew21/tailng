<section class="input-otp-docs-page">
  <tng-tabs
    class="input-otp-docs-tabs"
    ariaLabel="Input OTP documentation sections"
    [activation]="'manual'"
    [value]="activeSection()"
    (valueChange)="onSectionChange($event)"
  >
    <div tngTabList class="input-otp-docs-tab-list" ariaLabel="Input OTP documentation tabs">
      <button type="button" tngTab value="overview" class="input-otp-docs-tab-trigger">
        Overview
      </button>
      <button type="button" tngTab value="api" class="input-otp-docs-tab-trigger">API</button>
      <button type="button" tngTab value="styling" class="input-otp-docs-tab-trigger">
        Styling
      </button>
      <button type="button" tngTab value="examples" class="input-otp-docs-tab-trigger">
        Examples
      </button>
      <button type="button" tngTab value="ownable-install" class="input-otp-docs-tab-trigger">
        Ownable Install
      </button>
    </div>
  </tng-tabs>

  <section class="input-otp-docs-content">
    <router-outlet />
  </section>
</section>
