<section class="checkbox-docs-page">
  <tng-tabs
    class="checkbox-docs-tabs"
    ariaLabel="Checkbox documentation sections"
    [activation]="'manual'"
    [value]="activeSection()"
    (valueChange)="onSectionChange($event)"
  >
    <div tngTabList class="checkbox-docs-tab-list" ariaLabel="Checkbox documentation tabs">
      <button type="button" tngTab value="overview" class="checkbox-docs-tab-trigger">
        Overview
      </button>
      <button type="button" tngTab value="api" class="checkbox-docs-tab-trigger">API</button>
      <button type="button" tngTab value="styling" class="checkbox-docs-tab-trigger">
        Styling
      </button>
      <button type="button" tngTab value="examples" class="checkbox-docs-tab-trigger">
        Examples
      </button>
    </div>
  </tng-tabs>

  <section class="checkbox-docs-content">
    <router-outlet />
  </section>
</section>
