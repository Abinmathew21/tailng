<article class="label-examples docs-section-page">
  <div class="docs-section-page-main">
    <section id="association-patterns" class="docs-section-anchor label-examples-block">
      <app-docs-example-tabs-section
        heading="Association patterns"
        description="Use the label component for stacked fields, inline checkbox rows, and muted metadata labels without changing the API."
        ariaLabel="Label association examples"
        tabListAriaLabel="Label example variants"
        defaultValue="plain-css"
        [codeBlockTheme]="codeBlockTheme()"
      >
        <ng-template
          appDocsExampleVariant
          value="plain-css"
          label="Plain-CSS"
          panelTitle="Label association patterns (Plain-CSS)"
          [codeTabs]="plainCssCodeTabs"
          [stackblitzUrl]="stackblitzVanillaUrl"
        >
          <section class="doc-cmp-label-examples-card">
            <div class="doc-cmp-label-examples-card__field">
              <tng-label forId="doc-cmp-label-examples-live-project" [required]="true">Project name</tng-label>
              <input id="doc-cmp-label-examples-live-project" class="doc-cmp-label-examples-card__input" type="text" aria-required="true" placeholder="Nova" />
            </div>
            <div class="doc-cmp-label-examples-card__row">
              <input id="doc-cmp-label-examples-live-alerts" type="checkbox" class="doc-cmp-label-examples-card__checkbox" />
              <tng-label forId="doc-cmp-label-examples-live-alerts">Send release alerts</tng-label>
            </div>
            <div class="doc-cmp-label-examples-card__field">
              <tng-label class="doc-cmp-label-examples-card__meta-label" forId="doc-cmp-label-examples-live-archive" [disabled]="true">Archive note</tng-label>
              <input id="doc-cmp-label-examples-live-archive" class="doc-cmp-label-examples-card__input" type="text" disabled placeholder="Readonly metadata" />
            </div>
          </section>
        </ng-template>

        <ng-template
          appDocsExampleVariant
          value="tailwind-css"
          label="Tailwind CSS"
          panelTitle="Label association patterns (Tailwind CSS)"
          [codeTabs]="tailwindCodeTabs"
          [stackblitzUrl]="stackblitzTailwindUrl"
        >
          <section class="grid w-full max-w-[34rem] gap-4 rounded-2xl border border-slate-300 bg-white p-4 text-slate-900 shadow-sm [--tng-semantic-accent-danger:#dc2626] [--tng-semantic-foreground-primary:#0f172a] [--tng-semantic-foreground-secondary:#64748b] [color-scheme:light]">
            <div class="grid gap-2">
              <tng-label forId="doc-cmp-label-examples-live-tailwind-project" [required]="true">Project name</tng-label>
              <input
                id="doc-cmp-label-examples-live-tailwind-project"
                type="text"
                aria-required="true"
                placeholder="Nova"
                class="min-h-11 rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900 shadow-sm outline-none transition placeholder:text-slate-400 focus:border-blue-500 focus:ring-4 focus:ring-blue-100"
              />
            </div>
            <div class="inline-flex items-center gap-3">
              <input id="doc-cmp-label-examples-live-tailwind-alerts" type="checkbox" class="h-4 w-4 accent-blue-600" />
              <tng-label forId="doc-cmp-label-examples-live-tailwind-alerts">Send release alerts</tng-label>
            </div>
            <div class="grid gap-2">
              <tng-label class="block [--tng-semantic-foreground-primary:#64748b]" forId="doc-cmp-label-examples-live-tailwind-archive" [disabled]="true">Archive note</tng-label>
              <input
                id="doc-cmp-label-examples-live-tailwind-archive"
                type="text"
                disabled
                placeholder="Readonly metadata"
                class="min-h-11 rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-500"
              />
            </div>
          </section>
        </ng-template>
      </app-docs-example-tabs-section>
    </section>
  </div>
</article>
