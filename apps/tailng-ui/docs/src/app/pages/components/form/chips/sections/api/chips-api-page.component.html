<article class="chips-api">
  <h2 class="chips-api-title">Chips API</h2>
  <p class="chips-api-lead">
    API surface for the headless directives and the component wrapper used in form selections.
  </p>

  <section class="chips-api-block">
    <h3>Root (`tngChips`)</h3>
    <tng-code-block
      [code]="chipsRootApi"
      adapter="shiki"
      language="md"
      title="Root contract"
      [lineNumbers]="false"
      [wrap]="true"
      [sanitizeHtml]="false"
    ></tng-code-block>
  </section>

  <section class="chips-api-block">
    <h3>Item (`tngChip`)</h3>
    <tng-code-block
      [code]="chipItemApi"
      adapter="shiki"
      language="md"
      title="Chip item contract"
      [lineNumbers]="false"
      [wrap]="true"
      [sanitizeHtml]="false"
    ></tng-code-block>
  </section>

  <section class="chips-api-block">
    <h3>Remove control (`tngChipRemove`)</h3>
    <tng-code-block
      [code]="chipRemoveApi"
      adapter="shiki"
      language="md"
      title="Remove contract"
      [lineNumbers]="false"
      [wrap]="true"
      [sanitizeHtml]="false"
    ></tng-code-block>
  </section>
</article>
