<article class="docs-section-page input-examples">
  <div class="docs-section-page-main">
    <h2 class="input-examples-title">Examples</h2>
    <p class="input-examples-lead">
      Component-first input patterns built around <code>&lt;tng-input&gt;</code>. Adornment-heavy
      compositions now live on the dedicated Form Field page.
    </p>

    <section id="form-usage" class="docs-section-anchor input-examples-block">
      <app-docs-example-tabs-section
        heading="Form usage"
        description="A live submit-ready input example using controlled component state."
        ariaLabel="Input form usage example"
        tabListAriaLabel="Input form usage variants"
        defaultValue="live-demo"
        [codeBlockTheme]="codeBlockTheme()"
      >
        <ng-template appDocsExampleVariant value="live-demo" label="Live demo" panelTitle="Input form usage">
          <app-docs-form-demo-shell
            title="Create a workspace"
            description="Capture the project name before provisioning the workspace."
            submitLabel="Create workspace"
          >
            <div docsFormDemoField class="doc-cmp-input-ex-basic-preview">
              <tng-input
                type="text"
                name="workspaceName"
                placeholder="Workspace name"
                ariaLabel="Workspace name"
                [value]="formDemoValue()"
                (valueChange)="formDemoValue.set($event)"
              ></tng-input>
            </div>
            <p docsFormDemoSummary>Current value: {{ formDemoValue() || '—' }}</p>
          </app-docs-form-demo-shell>
        </ng-template>
      </app-docs-example-tabs-section>
    </section>

    <section id="basic-text-field" class="docs-section-anchor input-examples-block">
      <app-docs-example-tabs-section
        heading="Basic text field"
        description="The default component path for a plain single-line input."
        ariaLabel="Basic text field variants"
        tabListAriaLabel="Basic text field style variants"
        defaultValue="plain-css"
        [codeBlockTheme]="codeBlockTheme()"
      >
        <ng-template appDocsExampleVariant value="plain-css" label="Plain-CSS" panelTitle="Basic text field (Plain-CSS)" [codeTabs]="basicPlainCodeTabs" [stackblitzUrl]="stackblitzVanillaUrl">
          <div class="doc-cmp-input-ex-basic-preview">
            <tng-input
              type="text"
              placeholder="Project name"
              ariaLabel="Project name"
              (click)="focusProjectedInput($event)"
            ></tng-input>
          </div>
        </ng-template>

        <ng-template appDocsExampleVariant value="tailwind-css" label="Tailwind CSS" panelTitle="Basic text field (Tailwind CSS)" [codeTabs]="basicTailwindCodeTabs" [stackblitzUrl]="stackblitzTailwindUrl">
          <div class="doc-cmp-input-ex-basic-preview">
            <tng-input
              type="text"
              placeholder="Project name"
              ariaLabel="Project name"
              (click)="focusProjectedInput($event)"
            ></tng-input>
          </div>
        </ng-template>
      </app-docs-example-tabs-section>
    </section>

    <section id="type-variants" class="docs-section-anchor input-examples-block">
      <app-docs-example-tabs-section
        heading="Type variants"
        description="The same component API works across the supported native input types."
        ariaLabel="Input type variants"
        tabListAriaLabel="Input type style variants"
        defaultValue="plain-css"
        [codeBlockTheme]="codeBlockTheme()"
      >
        <ng-template appDocsExampleVariant value="plain-css" label="Plain-CSS" panelTitle="Type variants (Plain-CSS)" [codeTabs]="typePlainCodeTabs" [stackblitzUrl]="stackblitzVanillaUrl">
          <div class="doc-cmp-input-ex-types-preview doc-cmp-input-ex-types-grid">
            <tng-input type="email" placeholder="team@tailng.dev" ariaLabel="Email"></tng-input>
            <tng-input type="search" placeholder="Search docs" ariaLabel="Search"></tng-input>
            <tng-input type="number" placeholder="42" ariaLabel="Number"></tng-input>
          </div>
        </ng-template>

        <ng-template appDocsExampleVariant value="tailwind-css" label="Tailwind CSS" panelTitle="Type variants (Tailwind CSS)" [codeTabs]="typeTailwindCodeTabs" [stackblitzUrl]="stackblitzTailwindUrl">
          <div class="doc-cmp-input-ex-types-preview doc-cmp-input-ex-types-grid">
            <tng-input type="email" placeholder="team@tailng.dev" ariaLabel="Email"></tng-input>
            <tng-input type="search" placeholder="Search docs" ariaLabel="Search"></tng-input>
            <tng-input type="number" placeholder="42" ariaLabel="Number"></tng-input>
          </div>
        </ng-template>
      </app-docs-example-tabs-section>
    </section>

    <section id="validation-feedback" class="docs-section-anchor input-examples-block">
      <app-docs-example-tabs-section
        heading="Validation feedback"
        description="Invalid input state with explicit helper text."
        ariaLabel="Validation input variants"
        tabListAriaLabel="Validation style variants"
        defaultValue="plain-css"
        [codeBlockTheme]="codeBlockTheme()"
      >
        <ng-template appDocsExampleVariant value="plain-css" label="Plain-CSS" panelTitle="Validation feedback (Plain-CSS)" [codeTabs]="validationPlainCodeTabs" [stackblitzUrl]="stackblitzVanillaUrl">
          <div class="doc-cmp-input-ex-validation-preview doc-cmp-input-ex-validation-stack">
            <tng-input
              tone="danger"
              type="email"
              value="team@tailng"
              [ariaInvalid]="true"
              (click)="focusProjectedInput($event)"
            ></tng-input>
            <p class="doc-cmp-input-ex-validation-helper doc-cmp-input-ex-validation-helper--danger">Enter a valid email address in user&#64;domain format.</p>
          </div>
        </ng-template>

        <ng-template appDocsExampleVariant value="tailwind-css" label="Tailwind CSS" panelTitle="Validation feedback (Tailwind CSS)" [codeTabs]="validationTailwindCodeTabs" [stackblitzUrl]="stackblitzTailwindUrl">
          <div class="doc-cmp-input-ex-validation-preview doc-cmp-input-ex-validation-stack">
            <tng-input
              tone="danger"
              type="email"
              value="team@tailng"
              [ariaInvalid]="true"
              (click)="focusProjectedInput($event)"
            ></tng-input>
            <p class="doc-cmp-input-ex-validation-tw-helper text-xs font-medium text-red-600">Enter a valid email address in user&#64;domain format.</p>
          </div>
        </ng-template>
      </app-docs-example-tabs-section>
    </section>

    <section id="readonly-and-disabled-states" class="docs-section-anchor input-examples-block">
      <app-docs-example-tabs-section
        heading="Readonly and disabled states"
        description="Side-by-side state treatment for readonly and disabled fields."
        ariaLabel="Readonly disabled input variants"
        tabListAriaLabel="Readonly disabled style variants"
        defaultValue="plain-css"
        [codeBlockTheme]="codeBlockTheme()"
      >
        <ng-template appDocsExampleVariant value="plain-css" label="Plain-CSS" panelTitle="Readonly and disabled states (Plain-CSS)" [codeTabs]="statesPlainCodeTabs" [stackblitzUrl]="stackblitzVanillaUrl">
          <div class="doc-cmp-input-ex-states-preview doc-cmp-input-ex-states-stack">
            <tng-input type="text" value="Readonly API key" readonly (click)="focusProjectedInput($event)"></tng-input>
            <tng-input type="text" value="Disabled while syncing" disabled (click)="focusProjectedInput($event)"></tng-input>
          </div>
        </ng-template>

        <ng-template appDocsExampleVariant value="tailwind-css" label="Tailwind CSS" panelTitle="Readonly and disabled states (Tailwind CSS)" [codeTabs]="statesTailwindCodeTabs" [stackblitzUrl]="stackblitzTailwindUrl">
          <div class="doc-cmp-input-ex-states-preview doc-cmp-input-ex-states-stack">
            <tng-input type="text" value="Readonly API key" readonly (click)="focusProjectedInput($event)"></tng-input>
            <tng-input type="text" value="Disabled while syncing" disabled (click)="focusProjectedInput($event)"></tng-input>
          </div>
        </ng-template>
      </app-docs-example-tabs-section>
    </section>
  </div>
</article>
