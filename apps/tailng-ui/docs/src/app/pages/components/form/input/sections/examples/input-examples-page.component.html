<article class="docs-section-page input-examples">
  <div class="docs-section-page-main">
    <h2 class="input-examples-title">Examples</h2>
    <p class="input-examples-lead">
      Component-first input patterns built around <code>&lt;tng-input&gt;</code>. Adornment-heavy
      compositions now live on the dedicated Form Field page.
    </p>

    <section id="basic-text-field" class="docs-section-anchor input-examples-block">
      <app-docs-example-tabs-section
        heading="Basic text field"
        description="The default component path for a plain single-line input."
        ariaLabel="Basic text field variants"
        tabListAriaLabel="Basic text field style variants"
        defaultValue="plain-css"
        [codeBlockTheme]="codeBlockTheme()"
      >
        <ng-template appDocsExampleVariant value="plain-css" label="Plain-CSS" panelTitle="Basic text field (Plain-CSS)" [codeTabs]="basicPlainCodeTabs">
          <div class="input-example-preview">
            <tng-input
              class="input-example-control input-example-control--basic"
              type="text"
              placeholder="Project name"
              ariaLabel="Project name"
              (click)="focusProjectedInput($event)"
            ></tng-input>
          </div>
        </ng-template>

        <ng-template appDocsExampleVariant value="tailwind-css" label="Tailwind CSS" panelTitle="Basic text field (Tailwind CSS)" [codeTabs]="basicTailwindCodeTabs">
          <div class="input-example-preview">
            <tng-input
              class="block
                     [&_[data-slot='input-group']]:min-h-11
                     [&_[data-slot='input-group']]:rounded-xl
                     [&_[data-slot='input-group']]:border
                     [&_[data-slot='input-group']]:border-slate-300
                     [&_[data-slot='input-group']]:bg-white
                     [&_[data-slot='input-group']]:px-3
                     [&_[data-slot='input-group']]:shadow-sm
                     [&_[data-slot='input-group'][data-focused]]:border-blue-500
                     [&_[data-slot='input-group'][data-focused]]:ring-2
                     [&_[data-slot='input-group'][data-focused]]:ring-blue-200/70
                     [&_[data-slot='input']]:min-w-0
                     [&_[data-slot='input']]:w-full
                     [&_[data-slot='input']]:appearance-none
                     [&_[data-slot='input']]:border-0
                     [&_[data-slot='input']]:bg-transparent
                     [&_[data-slot='input']]:p-0
                     [&_[data-slot='input']]:text-[0.98rem]
                     [&_[data-slot='input']]:text-slate-900
                     [&_[data-slot='input']]:placeholder:text-slate-400
                     [&_[data-slot='input']]:outline-none"
              type="text"
              placeholder="Project name"
              ariaLabel="Project name"
              (click)="focusProjectedInput($event)"
            ></tng-input>
          </div>
        </ng-template>
      </app-docs-example-tabs-section>
    </section>

    <section id="type-variants" class="docs-section-anchor input-examples-block">
      <app-docs-example-tabs-section
        heading="Type variants"
        description="The same component API works across the supported native input types."
        ariaLabel="Input type variants"
        tabListAriaLabel="Input type style variants"
        defaultValue="plain-css"
        [codeBlockTheme]="codeBlockTheme()"
      >
        <ng-template appDocsExampleVariant value="plain-css" label="Plain-CSS" panelTitle="Type variants (Plain-CSS)" [codeTabs]="typePlainCodeTabs">
          <div class="input-example-preview input-example-variant-grid">
            <tng-input class="input-example-control" type="email" placeholder="team@tailng.dev" ariaLabel="Email"></tng-input>
            <tng-input class="input-example-control" type="search" placeholder="Search docs" ariaLabel="Search"></tng-input>
            <tng-input class="input-example-control" type="number" placeholder="42" ariaLabel="Number"></tng-input>
          </div>
        </ng-template>

        <ng-template appDocsExampleVariant value="tailwind-css" label="Tailwind CSS" panelTitle="Type variants (Tailwind CSS)" [codeTabs]="typeTailwindCodeTabs">
          <div class="input-example-preview input-example-variant-grid">
            <tng-input class="block [&_[data-slot='input-group']]:min-h-11 [&_[data-slot='input-group']]:rounded-xl [&_[data-slot='input-group']]:border [&_[data-slot='input-group']]:border-slate-300 [&_[data-slot='input-group']]:bg-white [&_[data-slot='input-group']]:px-3 [&_[data-slot='input-group']]:shadow-sm [&_[data-slot='input-group'][data-focused]]:border-blue-500 [&_[data-slot='input-group'][data-focused]]:ring-2 [&_[data-slot='input-group'][data-focused]]:ring-blue-200/70 [&_[data-slot='input']]:min-w-0 [&_[data-slot='input']]:w-full [&_[data-slot='input']]:appearance-none [&_[data-slot='input']]:border-0 [&_[data-slot='input']]:bg-transparent [&_[data-slot='input']]:p-0 [&_[data-slot='input']]:text-[0.98rem] [&_[data-slot='input']]:text-slate-900 [&_[data-slot='input']]:placeholder:text-slate-400 [&_[data-slot='input']]:outline-none" type="email" placeholder="team@tailng.dev" ariaLabel="Email"></tng-input>
            <tng-input class="block [&_[data-slot='input-group']]:min-h-11 [&_[data-slot='input-group']]:rounded-xl [&_[data-slot='input-group']]:border [&_[data-slot='input-group']]:border-slate-300 [&_[data-slot='input-group']]:bg-white [&_[data-slot='input-group']]:px-3 [&_[data-slot='input-group']]:shadow-sm [&_[data-slot='input-group'][data-focused]]:border-blue-500 [&_[data-slot='input-group'][data-focused]]:ring-2 [&_[data-slot='input-group'][data-focused]]:ring-blue-200/70 [&_[data-slot='input']]:min-w-0 [&_[data-slot='input']]:w-full [&_[data-slot='input']]:appearance-none [&_[data-slot='input']]:border-0 [&_[data-slot='input']]:bg-transparent [&_[data-slot='input']]:p-0 [&_[data-slot='input']]:text-[0.98rem] [&_[data-slot='input']]:text-slate-900 [&_[data-slot='input']]:placeholder:text-slate-400 [&_[data-slot='input']]:outline-none" type="search" placeholder="Search docs" ariaLabel="Search"></tng-input>
            <tng-input class="block [&_[data-slot='input-group']]:min-h-11 [&_[data-slot='input-group']]:rounded-xl [&_[data-slot='input-group']]:border [&_[data-slot='input-group']]:border-slate-300 [&_[data-slot='input-group']]:bg-white [&_[data-slot='input-group']]:px-3 [&_[data-slot='input-group']]:shadow-sm [&_[data-slot='input-group'][data-focused]]:border-blue-500 [&_[data-slot='input-group'][data-focused]]:ring-2 [&_[data-slot='input-group'][data-focused]]:ring-blue-200/70 [&_[data-slot='input']]:min-w-0 [&_[data-slot='input']]:w-full [&_[data-slot='input']]:appearance-none [&_[data-slot='input']]:border-0 [&_[data-slot='input']]:bg-transparent [&_[data-slot='input']]:p-0 [&_[data-slot='input']]:text-[0.98rem] [&_[data-slot='input']]:text-slate-900 [&_[data-slot='input']]:placeholder:text-slate-400 [&_[data-slot='input']]:outline-none" type="number" placeholder="42" ariaLabel="Number"></tng-input>
          </div>
        </ng-template>
      </app-docs-example-tabs-section>
    </section>

    <section id="validation-feedback" class="docs-section-anchor input-examples-block">
      <app-docs-example-tabs-section
        heading="Validation feedback"
        description="Invalid input state with explicit helper text."
        ariaLabel="Validation input variants"
        tabListAriaLabel="Validation style variants"
        defaultValue="plain-css"
        [codeBlockTheme]="codeBlockTheme()"
      >
        <ng-template appDocsExampleVariant value="plain-css" label="Plain-CSS" panelTitle="Validation feedback (Plain-CSS)" [codeTabs]="validationPlainCodeTabs">
          <div class="input-example-preview input-example-validation-stack">
            <tng-input
              class="input-example-control"
              tone="danger"
              type="email"
              value="team@tailng"
              [ariaInvalid]="true"
              (click)="focusProjectedInput($event)"
            ></tng-input>
            <p class="input-example-helper input-example-helper--danger">Enter a valid email address in user&#64;domain format.</p>
          </div>
        </ng-template>

        <ng-template appDocsExampleVariant value="tailwind-css" label="Tailwind CSS" panelTitle="Validation feedback (Tailwind CSS)" [codeTabs]="validationTailwindCodeTabs">
          <div class="input-example-preview input-example-validation-stack">
            <tng-input
              class="block
                     [&_[data-slot='input-group']]:min-h-11
                     [&_[data-slot='input-group']]:rounded-xl
                     [&_[data-slot='input-group']]:border
                     [&_[data-slot='input-group']]:border-red-400
                     [&_[data-slot='input-group']]:bg-red-50/70
                     [&_[data-slot='input-group']]:px-3
                     [&_[data-slot='input-group']]:shadow-sm
                     [&_[data-slot='input-group'][data-focused]]:border-red-500
                     [&_[data-slot='input-group'][data-focused]]:ring-2
                     [&_[data-slot='input-group'][data-focused]]:ring-red-200
                     [&_[data-slot='input']]:min-w-0
                     [&_[data-slot='input']]:w-full
                     [&_[data-slot='input']]:appearance-none
                     [&_[data-slot='input']]:border-0
                     [&_[data-slot='input']]:bg-transparent
                     [&_[data-slot='input']]:p-0
                     [&_[data-slot='input']]:text-[0.98rem]
                     [&_[data-slot='input']]:text-slate-900
                     [&_[data-slot='input']]:placeholder:text-slate-400
                     [&_[data-slot='input']]:outline-none"
              tone="danger"
              type="email"
              value="team@tailng"
              [ariaInvalid]="true"
              (click)="focusProjectedInput($event)"
            ></tng-input>
            <p class="text-xs font-medium text-red-600">Enter a valid email address in user&#64;domain format.</p>
          </div>
        </ng-template>
      </app-docs-example-tabs-section>
    </section>

    <section id="readonly-and-disabled-states" class="docs-section-anchor input-examples-block">
      <app-docs-example-tabs-section
        heading="Readonly and disabled states"
        description="Side-by-side state treatment for readonly and disabled fields."
        ariaLabel="Readonly disabled input variants"
        tabListAriaLabel="Readonly disabled style variants"
        defaultValue="plain-css"
        [codeBlockTheme]="codeBlockTheme()"
      >
        <ng-template appDocsExampleVariant value="plain-css" label="Plain-CSS" panelTitle="Readonly and disabled states (Plain-CSS)" [codeTabs]="statesPlainCodeTabs">
          <div class="input-example-preview input-example-stacked">
            <tng-input class="input-example-control" type="text" value="Readonly API key" readonly (click)="focusProjectedInput($event)"></tng-input>
            <tng-input class="input-example-control" type="text" value="Disabled while syncing" disabled (click)="focusProjectedInput($event)"></tng-input>
          </div>
        </ng-template>

        <ng-template appDocsExampleVariant value="tailwind-css" label="Tailwind CSS" panelTitle="Readonly and disabled states (Tailwind CSS)" [codeTabs]="statesTailwindCodeTabs">
          <div class="input-example-preview input-example-stacked">
            <tng-input class="block [&_[data-slot='input-group']]:min-h-11 [&_[data-slot='input-group']]:rounded-xl [&_[data-slot='input-group']]:border [&_[data-slot='input-group']]:border-slate-300 [&_[data-slot='input-group']]:bg-slate-100/80 [&_[data-slot='input-group']]:px-3 [&_[data-slot='input-group']]:shadow-sm [&_[data-slot='input']]:min-w-0 [&_[data-slot='input']]:w-full [&_[data-slot='input']]:appearance-none [&_[data-slot='input']]:border-0 [&_[data-slot='input']]:bg-transparent [&_[data-slot='input']]:p-0 [&_[data-slot='input']]:text-[0.98rem] [&_[data-slot='input']]:text-slate-700 [&_[data-slot='input']]:outline-none" type="text" value="Readonly API key" readonly (click)="focusProjectedInput($event)"></tng-input>
            <tng-input class="block [&_[data-slot='input-group']]:min-h-11 [&_[data-slot='input-group']]:rounded-xl [&_[data-slot='input-group']]:border [&_[data-slot='input-group']]:border-slate-300 [&_[data-slot='input-group']]:bg-slate-100/80 [&_[data-slot='input-group']]:px-3 [&_[data-slot='input-group']]:opacity-60 [&_[data-slot='input']]:min-w-0 [&_[data-slot='input']]:w-full [&_[data-slot='input']]:appearance-none [&_[data-slot='input']]:border-0 [&_[data-slot='input']]:bg-transparent [&_[data-slot='input']]:p-0 [&_[data-slot='input']]:text-[0.98rem] [&_[data-slot='input']]:text-slate-700 [&_[data-slot='input']]:outline-none" type="text" value="Disabled while syncing" disabled (click)="focusProjectedInput($event)"></tng-input>
          </div>
        </ng-template>
      </app-docs-example-tabs-section>
    </section>
  </div>
</article>
