<article class="docs-section-page input-examples">
  <div class="docs-section-page-main">
    <h2 class="input-examples-title">Examples</h2>
    <p class="input-examples-lead">
      Production-ready input patterns with dedicated Plain-CSS and Tailwind CSS wrapper variants for
      each scenario.
    </p>

    <section id="global-search-field" class="docs-section-anchor input-examples-block">
      <app-docs-example-tabs-section
        heading="Global search field"
        description="Search input with icon prefix and keyboard-hint suffix."
        ariaLabel="Global search input variants"
        tabListAriaLabel="Global search style variants"
        defaultValue="plain-css"
        [codeBlockTheme]="codeBlockTheme()"
      >
        <ng-template
          appDocsExampleVariant
          value="plain-css"
          label="Plain-CSS"
          panelTitle="Global search field (Plain-CSS)"
          [codeTabs]="searchPlainCodeTabs"
        >
          <div class="input-example-preview">
            <tng-form-field
              class="input-example-control input-example-control--search"
              (click)="focusProjectedInput($event)"
            >
              <span tngPrefix aria-hidden="true">
                <tng-icon icon="search" class="input-example-icon" />
              </span>
              <input tngInput type="search" placeholder="Search components..." />
              <span tngSuffix class="input-example-meta">Ctrl+K</span>
            </tng-form-field>
          </div>
        </ng-template>

        <ng-template
          appDocsExampleVariant
          value="tailwind-css"
          label="Tailwind CSS"
          panelTitle="Global search field (Tailwind CSS)"
          [codeTabs]="searchTailwindCodeTabs"
        >
          <div class="input-example-preview">
            <tng-form-field
              class="block
                     [&_[data-slot='input-group']]:min-h-11
                     [&_[data-slot='input-group']]:items-center
                     [&_[data-slot='input-group']]:rounded-xl
                     [&_[data-slot='input-group']]:border
                     [&_[data-slot='input-group']]:border-slate-300
                     [&_[data-slot='input-group']]:bg-white
                     [&_[data-slot='input-group']]:px-3
                     [&_[data-slot='input-group']]:shadow-sm
                     [&_[data-slot='input-group']]:transition
                     [&_[data-slot='input-group'][data-focused]]:border-blue-500
                     [&_[data-slot='input-group'][data-focused]]:ring-2
                     [&_[data-slot='input-group'][data-focused]]:ring-blue-200
                     dark:[&_[data-slot='input-group']]:border-slate-600
                     dark:[&_[data-slot='input-group']]:bg-slate-900/60
                     dark:[&_[data-slot='input-group'][data-focused]]:border-blue-400
                     dark:[&_[data-slot='input-group'][data-focused]]:ring-blue-400/30
                     [&_[data-slot='input-group-leading']]:text-slate-500
                     dark:[&_[data-slot='input-group-leading']]:text-slate-300
                     [&_[data-slot='input-group-trailing']]:text-slate-500
                     [&_[data-slot='input-group-trailing']]:text-xs
                     [&_[data-slot='input-group-trailing']]:font-semibold
                     dark:[&_[data-slot='input-group-trailing']]:text-slate-300
                     [&_[data-slot='input']]:w-full
                     [&_[data-slot='input']]:border-0
                     [&_[data-slot='input']]:bg-transparent
                     [&_[data-slot='input']]:p-0
                     [&_[data-slot='input']]:text-[0.98rem]
                     [&_[data-slot='input']]:outline-none"
              (click)="focusProjectedInput($event)"
            >
              <span tngPrefix aria-hidden="true">
                <tng-icon icon="search" class="h-4 w-4" />
              </span>
              <input tngInput type="search" placeholder="Search components..." />
              <span tngSuffix>Ctrl+K</span>
            </tng-form-field>
          </div>
        </ng-template>
      </app-docs-example-tabs-section>
    </section>

    <section id="workspace-slug-field" class="docs-section-anchor input-examples-block">
      <app-docs-example-tabs-section
        heading="Workspace slug field"
        description="Editable workspace identifier paired with a fixed domain suffix."
        ariaLabel="Workspace slug input variants"
        tabListAriaLabel="Workspace slug style variants"
        defaultValue="plain-css"
        [codeBlockTheme]="codeBlockTheme()"
      >
        <ng-template
          appDocsExampleVariant
          value="plain-css"
          label="Plain-CSS"
          panelTitle="Workspace slug field (Plain-CSS)"
          [codeTabs]="workspacePlainCodeTabs"
        >
          <div class="input-example-preview">
            <tng-form-field
              tone="primary"
              class="input-example-control input-example-control--workspace"
              (click)="focusProjectedInput($event)"
            >
              <input tngInput type="text" placeholder="Workspace slug" value="core-platform" />
              <span tngSuffix class="input-example-meta">.tailng.dev</span>
            </tng-form-field>
          </div>
        </ng-template>

        <ng-template
          appDocsExampleVariant
          value="tailwind-css"
          label="Tailwind CSS"
          panelTitle="Workspace slug field (Tailwind CSS)"
          [codeTabs]="workspaceTailwindCodeTabs"
        >
          <div class="input-example-preview">
            <tng-form-field
              class="block
                     [&_[data-slot='input-group']]:min-h-11
                     [&_[data-slot='input-group']]:items-center
                     [&_[data-slot='input-group']]:rounded-xl
                     [&_[data-slot='input-group']]:border
                     [&_[data-slot='input-group']]:border-blue-300
                     [&_[data-slot='input-group']]:bg-blue-50/70
                     [&_[data-slot='input-group']]:px-3
                     [&_[data-slot='input-group']]:shadow-sm
                     [&_[data-slot='input-group']]:transition
                     [&_[data-slot='input-group'][data-focused]]:border-blue-500
                     [&_[data-slot='input-group'][data-focused]]:ring-2
                     [&_[data-slot='input-group'][data-focused]]:ring-blue-200
                     dark:[&_[data-slot='input-group']]:border-blue-500/60
                     dark:[&_[data-slot='input-group']]:bg-blue-950/30
                     dark:[&_[data-slot='input-group'][data-focused]]:border-blue-300
                     dark:[&_[data-slot='input-group'][data-focused]]:ring-blue-400/30
                     [&_[data-slot='input-group-trailing']]:text-xs
                     [&_[data-slot='input-group-trailing']]:font-semibold
                     [&_[data-slot='input-group-trailing']]:text-blue-700
                     dark:[&_[data-slot='input-group-trailing']]:text-blue-300
                     [&_[data-slot='input']]:w-full
                     [&_[data-slot='input']]:border-0
                     [&_[data-slot='input']]:bg-transparent
                     [&_[data-slot='input']]:p-0
                     [&_[data-slot='input']]:text-[0.98rem]
                     [&_[data-slot='input']]:outline-none"
              (click)="focusProjectedInput($event)"
            >
              <input tngInput type="text" placeholder="Workspace slug" value="core-platform" />
              <span tngSuffix>.tailng.dev</span>
            </tng-form-field>
          </div>
        </ng-template>
      </app-docs-example-tabs-section>
    </section>

    <section id="validation-feedback" class="docs-section-anchor input-examples-block">
      <app-docs-example-tabs-section
        heading="Validation feedback"
        description="Invalid input state with explicit helper text."
        ariaLabel="Validation input variants"
        tabListAriaLabel="Validation style variants"
        defaultValue="plain-css"
        [codeBlockTheme]="codeBlockTheme()"
      >
        <ng-template
          appDocsExampleVariant
          value="plain-css"
          label="Plain-CSS"
          panelTitle="Validation feedback (Plain-CSS)"
          [codeTabs]="validationPlainCodeTabs"
        >
          <div class="input-example-preview input-example-validation-stack">
            <tng-input
              tone="danger"
              type="email"
              value="team@tailng"
              [ariaInvalid]="true"
              class="input-example-control input-example-control--validation"
              (click)="focusProjectedInput($event)"
            ></tng-input>
            <p class="input-example-helper input-example-helper--danger">
              Enter a valid email address in user&#64;domain format.
            </p>
          </div>
        </ng-template>

        <ng-template
          appDocsExampleVariant
          value="tailwind-css"
          label="Tailwind CSS"
          panelTitle="Validation feedback (Tailwind CSS)"
          [codeTabs]="validationTailwindCodeTabs"
        >
          <div class="input-example-preview grid gap-2">
            <tng-input
              tone="danger"
              class="block
                     [&_[data-slot='input-group']]:min-h-11
                     [&_[data-slot='input-group']]:items-center
                     [&_[data-slot='input-group']]:rounded-xl
                     [&_[data-slot='input-group']]:border
                     [&_[data-slot='input-group']]:border-red-400
                     [&_[data-slot='input-group']]:bg-red-50/70
                     [&_[data-slot='input-group']]:px-3
                     [&_[data-slot='input-group']]:shadow-sm
                     [&_[data-slot='input-group']]:transition
                     [&_[data-slot='input-group'][data-focused]]:border-red-500
                     [&_[data-slot='input-group'][data-focused]]:ring-2
                     [&_[data-slot='input-group'][data-focused]]:ring-red-200
                     dark:[&_[data-slot='input-group']]:border-red-500/70
                     dark:[&_[data-slot='input-group']]:bg-red-950/25
                     dark:[&_[data-slot='input-group'][data-focused]]:border-red-300
                     dark:[&_[data-slot='input-group'][data-focused]]:ring-red-400/30
                     [&_[data-slot='input']]:w-full
                     [&_[data-slot='input']]:border-0
                     [&_[data-slot='input']]:bg-transparent
                     [&_[data-slot='input']]:p-0
                     [&_[data-slot='input']]:text-[0.98rem]
                     [&_[data-slot='input']]:outline-none"
              type="email"
              value="team@tailng"
              [ariaInvalid]="true"
              (click)="focusProjectedInput($event)"
            ></tng-input>
            <p class="text-xs font-medium text-red-600 dark:text-red-300">
              Enter a valid email address in user&#64;domain format.
            </p>
          </div>
        </ng-template>
      </app-docs-example-tabs-section>
    </section>

    <section id="readonly-and-disabled-states" class="docs-section-anchor input-examples-block">
      <app-docs-example-tabs-section
        heading="Readonly and disabled states"
        description="Side-by-side state treatment for readonly and disabled input controls."
        ariaLabel="Readonly disabled input variants"
        tabListAriaLabel="Readonly disabled style variants"
        defaultValue="plain-css"
        [codeBlockTheme]="codeBlockTheme()"
      >
        <ng-template
          appDocsExampleVariant
          value="plain-css"
          label="Plain-CSS"
          panelTitle="Readonly and disabled states (Plain-CSS)"
          [codeTabs]="statesPlainCodeTabs"
        >
          <div class="input-example-preview input-example-stacked">
            <tng-input
              class="input-example-control input-example-control--state"
              type="text"
              value="Readonly API key"
              readonly
              (click)="focusProjectedInput($event)"
            ></tng-input>
            <tng-input
              class="input-example-control input-example-control--state"
              type="text"
              value="Disabled while syncing"
              disabled
              (click)="focusProjectedInput($event)"
            ></tng-input>
          </div>
        </ng-template>

        <ng-template
          appDocsExampleVariant
          value="tailwind-css"
          label="Tailwind CSS"
          panelTitle="Readonly and disabled states (Tailwind CSS)"
          [codeTabs]="statesTailwindCodeTabs"
        >
          <div class="input-example-preview grid gap-3">
            <tng-input
              class="block
                     [&_[data-slot='input-group']]:min-h-11
                     [&_[data-slot='input-group']]:items-center
                     [&_[data-slot='input-group']]:rounded-xl
                     [&_[data-slot='input-group']]:border
                     [&_[data-slot='input-group']]:border-slate-300
                     [&_[data-slot='input-group']]:bg-slate-100/80
                     [&_[data-slot='input-group']]:px-3
                     [&_[data-slot='input-group']]:shadow-sm
                     dark:[&_[data-slot='input-group']]:border-slate-600
                     dark:[&_[data-slot='input-group']]:bg-slate-800/70
                     [&_[data-slot='input']]:w-full
                     [&_[data-slot='input']]:border-0
                     [&_[data-slot='input']]:bg-transparent
                     [&_[data-slot='input']]:p-0
                     [&_[data-slot='input']]:text-[0.98rem]
                     [&_[data-slot='input']]:outline-none"
              type="text"
              value="Readonly API key"
              readonly
              (click)="focusProjectedInput($event)"
            ></tng-input>
            <tng-input
              class="block
                     [&_[data-slot='input-group']]:min-h-11
                     [&_[data-slot='input-group']]:items-center
                     [&_[data-slot='input-group']]:rounded-xl
                     [&_[data-slot='input-group']]:border
                     [&_[data-slot='input-group']]:border-slate-300
                     [&_[data-slot='input-group']]:bg-slate-100/80
                     [&_[data-slot='input-group']]:px-3
                     [&_[data-slot='input-group']]:opacity-60
                     dark:[&_[data-slot='input-group']]:border-slate-600
                     dark:[&_[data-slot='input-group']]:bg-slate-800/70
                     [&_[data-slot='input']]:w-full
                     [&_[data-slot='input']]:border-0
                     [&_[data-slot='input']]:bg-transparent
                     [&_[data-slot='input']]:p-0
                     [&_[data-slot='input']]:text-[0.98rem]
                     [&_[data-slot='input']]:outline-none"
              type="text"
              value="Disabled while syncing"
              disabled
              (click)="focusProjectedInput($event)"
            ></tng-input>
          </div>
        </ng-template>
      </app-docs-example-tabs-section>
    </section>
  </div>
</article>
