<article class="docs-section-page input-examples">
  <div class="docs-section-page-main">
    <h2 class="input-examples-title">Examples</h2>
    <p class="input-examples-lead">
      Common <code>tng-form-field</code> patterns with explicit Plain-CSS and Tailwind CSS shell examples.
    </p>

    <section id="global-search-field" class="docs-section-anchor input-examples-block">
      <app-docs-example-tabs-section
        heading="Global search field"
        description="Search field with an icon prefix and keyboard-hint suffix."
        ariaLabel="Form field search variants"
        tabListAriaLabel="Form field search style variants"
        defaultValue="plain-css"
        [codeBlockTheme]="codeBlockTheme()"
      >
        <ng-template appDocsExampleVariant value="plain-css" label="Plain-CSS" panelTitle="Global search field (Plain-CSS)" [codeTabs]="searchPlainCodeTabs">
          <div class="input-example-preview">
            <tng-form-field class="input-example-control input-example-control--search">
              <span tngPrefix aria-hidden="true">
                <tng-icon icon="search" class="input-example-icon" />
              </span>
              <input tngInput type="search" placeholder="Search components..." />
              <span tngSuffix class="input-example-meta">Ctrl+K</span>
            </tng-form-field>
          </div>
        </ng-template>

        <ng-template appDocsExampleVariant value="tailwind-css" label="Tailwind CSS" panelTitle="Global search field (Tailwind CSS)" [codeTabs]="searchTailwindCodeTabs">
          <div class="input-example-preview">
            <tng-form-field class="block [&_[data-slot='input-group']]:min-h-11 [&_[data-slot='input-group']]:items-center [&_[data-slot='input-group']]:rounded-xl [&_[data-slot='input-group']]:border [&_[data-slot='input-group']]:border-slate-300 [&_[data-slot='input-group']]:bg-white [&_[data-slot='input-group']]:px-3 [&_[data-slot='input-group']]:shadow-sm [&_[data-slot='input-group'][data-focused]]:border-blue-500 [&_[data-slot='input-group'][data-focused]]:ring-2 [&_[data-slot='input-group'][data-focused]]:ring-blue-200 [&_[data-slot='input']]:w-full [&_[data-slot='input']]:border-0 [&_[data-slot='input']]:bg-transparent [&_[data-slot='input']]:p-0 [&_[data-slot='input']]:outline-none">
              <span tngPrefix aria-hidden="true">
                <tng-icon icon="search" class="h-4 w-4" />
              </span>
              <input tngInput type="search" placeholder="Search components..." />
              <span tngSuffix class="text-xs font-semibold text-slate-500">Ctrl+K</span>
            </tng-form-field>
          </div>
        </ng-template>
      </app-docs-example-tabs-section>
    </section>

    <section id="workspace-slug-field" class="docs-section-anchor input-examples-block">
      <app-docs-example-tabs-section
        heading="Workspace slug field"
        description="Editable workspace slug paired with a fixed suffix domain."
        ariaLabel="Form field workspace variants"
        tabListAriaLabel="Form field workspace style variants"
        defaultValue="plain-css"
        [codeBlockTheme]="codeBlockTheme()"
      >
        <ng-template appDocsExampleVariant value="plain-css" label="Plain-CSS" panelTitle="Workspace slug field (Plain-CSS)" [codeTabs]="workspacePlainCodeTabs">
          <div class="input-example-preview">
            <tng-form-field class="input-example-control input-example-control--workspace">
              <input tngInput type="text" value="core-platform" />
              <span tngSuffix class="input-example-meta">.tailng.dev</span>
            </tng-form-field>
          </div>
        </ng-template>

        <ng-template appDocsExampleVariant value="tailwind-css" label="Tailwind CSS" panelTitle="Workspace slug field (Tailwind CSS)" [codeTabs]="workspaceTailwindCodeTabs">
          <div class="input-example-preview">
            <tng-form-field class="block [&_[data-slot='input-group']]:min-h-11 [&_[data-slot='input-group']]:items-center [&_[data-slot='input-group']]:rounded-xl [&_[data-slot='input-group']]:border [&_[data-slot='input-group']]:border-blue-300 [&_[data-slot='input-group']]:bg-blue-50/70 [&_[data-slot='input-group']]:px-3 [&_[data-slot='input-group']]:shadow-sm [&_[data-slot='input-group'][data-focused]]:border-blue-500 [&_[data-slot='input-group'][data-focused]]:ring-2 [&_[data-slot='input-group'][data-focused]]:ring-blue-200 [&_[data-slot='input']]:w-full [&_[data-slot='input']]:border-0 [&_[data-slot='input']]:bg-transparent [&_[data-slot='input']]:p-0 [&_[data-slot='input']]:outline-none [&_[data-slot='input-group-trailing']]:text-xs [&_[data-slot='input-group-trailing']]:font-semibold">
              <input tngInput type="text" value="core-platform" />
              <span tngSuffix>.tailng.dev</span>
            </tng-form-field>
          </div>
        </ng-template>
      </app-docs-example-tabs-section>
    </section>

    <section id="clear-action-field" class="docs-section-anchor input-examples-block">
      <app-docs-example-tabs-section
        heading="Clear action field"
        description="Trailing action button inside the shared shell."
        ariaLabel="Form field clear action variants"
        tabListAriaLabel="Form field clear action style variants"
        defaultValue="plain-css"
        [codeBlockTheme]="codeBlockTheme()"
      >
        <ng-template appDocsExampleVariant value="plain-css" label="Plain-CSS" panelTitle="Clear action field (Plain-CSS)" [codeTabs]="clearPlainCodeTabs">
          <div class="input-example-preview">
            <tng-form-field class="input-example-control input-example-control--search">
              <input tngInput type="search" value="TailNG" />
              <button tngSuffix type="button" aria-label="Clear search">Clear</button>
            </tng-form-field>
          </div>
        </ng-template>

        <ng-template appDocsExampleVariant value="tailwind-css" label="Tailwind CSS" panelTitle="Clear action field (Tailwind CSS)" [codeTabs]="clearTailwindCodeTabs">
          <div class="input-example-preview">
            <tng-form-field class="block [&_[data-slot='input-group']]:min-h-11 [&_[data-slot='input-group']]:items-center [&_[data-slot='input-group']]:rounded-xl [&_[data-slot='input-group']]:border [&_[data-slot='input-group']]:border-slate-300 [&_[data-slot='input-group']]:bg-white [&_[data-slot='input-group']]:px-3 [&_[data-slot='input-group']]:shadow-sm [&_[data-slot='input-group'][data-focused]]:border-blue-500 [&_[data-slot='input-group'][data-focused]]:ring-2 [&_[data-slot='input-group'][data-focused]]:ring-blue-200 [&_[data-slot='input']]:w-full [&_[data-slot='input']]:border-0 [&_[data-slot='input']]:bg-transparent [&_[data-slot='input']]:p-0 [&_[data-slot='input']]:outline-none [&_[data-slot='input-group-trailing']_button]:rounded-md [&_[data-slot='input-group-trailing']_button]:px-2 [&_[data-slot='input-group-trailing']_button]:py-1 [&_[data-slot='input-group-trailing']_button]:text-xs [&_[data-slot='input-group-trailing']_button]:font-semibold [&_[data-slot='input-group-trailing']_button]:text-slate-600 hover:[&_[data-slot='input-group-trailing']_button]:bg-slate-100">
              <input tngInput type="search" value="TailNG" />
              <button tngSuffix type="button" aria-label="Clear search">Clear</button>
            </tng-form-field>
          </div>
        </ng-template>
      </app-docs-example-tabs-section>
    </section>
  </div>
</article>
