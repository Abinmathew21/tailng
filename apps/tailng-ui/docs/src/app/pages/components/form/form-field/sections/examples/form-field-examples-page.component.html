<article class="docs-section-page input-examples">
  <div class="docs-section-page-main">
    <h2 class="input-examples-title">Examples</h2>
    <p class="input-examples-lead">
      Common <code>tng-form-field</code> patterns with explicit Plain-CSS and Tailwind CSS shell
      examples.
    </p>

    <section id="global-search-field" class="docs-section-anchor input-examples-block">
      <app-docs-example-tabs-section
        heading="Global search field"
        description="Search field with an icon prefix and keyboard-hint suffix."
        ariaLabel="Form field search variants"
        tabListAriaLabel="Form field search style variants"
        defaultValue="plain-css"
        [codeBlockTheme]="codeBlockTheme()"
      >
        <ng-template
          appDocsExampleVariant
          value="plain-css"
          label="Plain-CSS"
          panelTitle="Global search field (Plain-CSS)"
          [codeTabs]="searchPlainCodeTabs"
          [stackblitzUrl]="stackblitzVanillaUrl"
        >
          <div class="doc-cmp-form-field-ex-search-preview">
            <tng-form-field class="doc-cmp-form-field-ex-search-shell">
              <span tngPrefix aria-hidden="true" class="doc-cmp-form-field-ex-search-prefix">
                <tng-icon icon="search" class="doc-cmp-form-field-ex-search-icon" />
              </span>
              <input tngInput type="search" placeholder="Search components..." />
              <span tngSuffix class="doc-cmp-form-field-ex-search-meta">Ctrl+K</span>
            </tng-form-field>
          </div>
        </ng-template>

        <ng-template
          appDocsExampleVariant
          value="tailwind-css"
          label="Tailwind CSS"
          panelTitle="Global search field (Tailwind CSS)"
          [codeTabs]="searchTailwindCodeTabs"
          [stackblitzUrl]="stackblitzTailwindUrl"
        >
          <div class="doc-cmp-form-field-ex-search-preview">
            <tng-form-field [class]="searchTailwindHostClass">
              <span tngPrefix aria-hidden="true" class="text-slate-500">
                <tng-icon icon="search" class="h-4 w-4" />
              </span>
              <input tngInput type="search" placeholder="Search components..." />
              <span tngSuffix class="text-xs font-semibold text-slate-500">Ctrl+K</span>
            </tng-form-field>
          </div>
        </ng-template>
      </app-docs-example-tabs-section>
    </section>

    <section id="workspace-slug-field" class="docs-section-anchor input-examples-block">
      <app-docs-example-tabs-section
        heading="Workspace slug field"
        description="Editable workspace slug paired with a fixed suffix domain."
        ariaLabel="Form field workspace variants"
        tabListAriaLabel="Form field workspace style variants"
        defaultValue="plain-css"
        [codeBlockTheme]="codeBlockTheme()"
      >
        <ng-template
          appDocsExampleVariant
          value="plain-css"
          label="Plain-CSS"
          panelTitle="Workspace slug field (Plain-CSS)"
          [codeTabs]="workspacePlainCodeTabs"
          [stackblitzUrl]="stackblitzVanillaUrl"
        >
          <div class="doc-cmp-form-field-ex-workspace-preview">
            <tng-form-field class="doc-cmp-form-field-ex-workspace-shell">
              <input tngInput type="text" value="core-platform" />
              <span tngSuffix class="doc-cmp-form-field-ex-workspace-meta">.tailng.dev</span>
            </tng-form-field>
          </div>
        </ng-template>

        <ng-template
          appDocsExampleVariant
          value="tailwind-css"
          label="Tailwind CSS"
          panelTitle="Workspace slug field (Tailwind CSS)"
          [codeTabs]="workspaceTailwindCodeTabs"
          [stackblitzUrl]="stackblitzTailwindUrl"
        >
          <div class="doc-cmp-form-field-ex-workspace-preview">
            <tng-form-field [class]="workspaceTailwindHostClass">
              <input tngInput type="text" value="core-platform" />
              <span tngSuffix class="text-xs font-semibold text-slate-500">.tailng.dev</span>
            </tng-form-field>
          </div>
        </ng-template>
      </app-docs-example-tabs-section>
    </section>

    <section id="clear-action-field" class="docs-section-anchor input-examples-block">
      <app-docs-example-tabs-section
        heading="Clear action field"
        description="Trailing action button inside the shared shell."
        ariaLabel="Form field clear action variants"
        tabListAriaLabel="Form field clear action style variants"
        defaultValue="plain-css"
        [codeBlockTheme]="codeBlockTheme()"
      >
        <ng-template
          appDocsExampleVariant
          value="plain-css"
          label="Plain-CSS"
          panelTitle="Clear action field (Plain-CSS)"
          [stackblitzUrl]="stackblitzVanillaUrl"
          [codeTabs]="clearPlainCodeTabs"
        >
          <div class="doc-cmp-form-field-ex-clear-preview">
            <tng-form-field class="doc-cmp-form-field-ex-clear-shell">
              <input tngInput type="search" value="TailNG" />
              <button
                tngSuffix
                type="button"
                class="doc-cmp-form-field-ex-clear-action"
                aria-label="Clear search"
              >
                Clear
              </button>
            </tng-form-field>
          </div>
        </ng-template>

        <ng-template
          appDocsExampleVariant
          value="tailwind-css"
          label="Tailwind CSS"
          panelTitle="Clear action field (Tailwind CSS)"
          [stackblitzUrl]="stackblitzTailwindUrl"
          [codeTabs]="clearTailwindCodeTabs"
        >
          <div class="doc-cmp-form-field-ex-clear-preview">
            <tng-form-field [class]="clearTailwindHostClass">
              <input tngInput type="search" value="TailNG" />
              <button
                tngSuffix
                type="button"
                aria-label="Clear search"
                class="rounded-md bg-transparent px-2.5 py-1 text-xs font-semibold text-slate-500 transition hover:bg-slate-200/60 hover:text-slate-900"
              >
                Clear
              </button>
            </tng-form-field>
          </div>
        </ng-template>
      </app-docs-example-tabs-section>
    </section>
  </div>
</article>
