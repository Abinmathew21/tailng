<section class="components-page-full-bleed grid gap-5">
  <section
    tngDrawerContainer
    class="components-docs-stage border-b border-tng-border-subtle bg-tng-bg-surface/60"
    [animate]="false"
    [hasBackdrop]="false"
    [closeOthersOnOpen]="false"
  >
    <tng-drawer
      class="components-docs-drawer"
      ariaLabel="Components docs navigation"
      [opened]="true"
      [mode]="'overlay'"
      [position]="'start'"
      [backdrop]="false"
      [closeOnOutsideClick]="false"
      [closeOnEscape]="false"
      [trapFocus]="false"
      [inertContent]="false"
      [allowBodyScroll]="true"
    >
      <div class="mb-3 grid gap-1 border-b border-tng-border-subtle pb-3">
        <p class="m-0 text-xs font-semibold uppercase tracking-[0.1em] text-tng-fg-secondary">Navigation</p>
        <p class="m-0 text-sm text-tng-fg-secondary">Categorized component documentation map</p>
      </div>

      <tng-accordion
        [type]="'multiple'"
        [defaultValue]="defaultExpandedGroups"
        [collapsible]="true"
        ariaLabel="Components docs categories"
      >
        @for (group of navGroups; track group.id) {
          <tng-accordion-item [value]="group.id">
            <tng-accordion-trigger>
              <span class="flex w-full items-center justify-between gap-3">
                <span class="flex min-w-0 flex-col text-left">
                  <span class="truncate text-sm font-semibold">{{ group.title }}</span>
                  <span class="truncate text-xs text-tng-fg-secondary">{{ group.subtitle }}</span>
                </span>
                <span
                  class="inline-flex h-6 min-w-6 items-center justify-center rounded-full border border-tng-border-subtle px-1 text-xs text-tng-fg-secondary"
                >
                  {{ group.items.length }}
                </span>
              </span>
            </tng-accordion-trigger>
            <tng-accordion-panel>
              <nav class="grid gap-1.5 py-1" [attr.aria-label]="group.title + ' links'">
                @for (item of group.items; track item.id) {
                  <a
                    [routerLink]="itemHref(group.id, item.slug)"
                    class="inline-flex min-h-9 w-full items-center justify-between rounded-lg border border-transparent px-3 py-2 text-left text-sm transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-tng-focus-ring"
                    [class.border-tng-border-subtle]="!isItemActive(group.id, item.slug)"
                    [class.bg-tng-bg-base]="!isItemActive(group.id, item.slug)"
                    [class.text-tng-fg-primary]="!isItemActive(group.id, item.slug)"
                    [class.hover:bg-tng-bg-muted]="!isItemActive(group.id, item.slug)"
                    [class.border-tng-accent-brand]="isItemActive(group.id, item.slug)"
                    [class.bg-[color-mix(in_srgb,var(--tng-semantic-accent-brand)_12%,var(--tng-semantic-background-base))]]="isItemActive(group.id, item.slug)"
                    [class.text-tng-accent-brand]="isItemActive(group.id, item.slug)"
                    [attr.aria-current]="isItemActive(group.id, item.slug) ? 'page' : null"
                  >
                    <span class="truncate">{{ item.title }}</span>
                    @if (isItemActive(group.id, item.slug)) {
                      <tng-icon icon="chevron-right" class="h-4 w-4 shrink-0" />
                    }
                  </a>
                }
              </nav>
            </tng-accordion-panel>
          </tng-accordion-item>
        }
      </tng-accordion>
    </tng-drawer>

    <main tngDrawerContent class="components-docs-content">
      <router-outlet />
    </main>
  </section>
</section>
