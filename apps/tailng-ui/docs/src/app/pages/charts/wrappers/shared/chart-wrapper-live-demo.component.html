@switch (slug()) {
  @case ('line-chart') {
    <tng-line-chart
      [data]="revenueData"
      [height]="height()"
      xField="quarter"
      yField="revenue"
      smooth
    />
  }
  @case ('bar-chart') {
    <tng-bar-chart
      [data]="regionData"
      [height]="height()"
      [series]="regionSeries"
      xField="region"
    />
  }
  @case ('area-chart') {
    <tng-area-chart
      [data]="revenueData"
      [height]="height()"
      xField="quarter"
      yField="revenue"
      smooth
    />
  }
  @case ('pie-chart') {
    <tng-pie-chart
      [data]="productMixData"
      [height]="height()"
      nameField="category"
      valueField="value"
      donut
    />
  }
  @case ('scatter-chart') {
    <tng-scatter-chart
      [data]="engagementData"
      [height]="height()"
      xField="visits"
      yField="conversion"
      sizeField="volume"
    />
  }
  @case ('heatmap-chart') {
    <tng-heatmap-chart
      [data]="heatmapData"
      [height]="height()"
      xField="hour"
      yField="day"
      valueField="value"
    />
  }
}
