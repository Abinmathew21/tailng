<article class="chart-doc-section chart-doc-section--overview">
  <section class="chart-overview-hero">
    <div class="chart-overview-hero__intro">
      <h2 class="chart-doc-section-title">{{ chart.selector }} overview</h2>
      <p class="chart-doc-section-lead">
        <code>&lt;{{ chart.selector }}&gt;</code>
        {{ chart.overviewLead }}
      </p>
    </div>
    <div class="chart-overview-hero__preview chart-doc-demo">
      <app-chart-wrapper-live-demo [slug]="chart.slug" [height]="heroChartHeight" />
    </div>
  </section>

  <section id="imports" class="chart-doc-block">
    <h3>Imports</h3>
    <tng-code-block
      [code]="importCode"
      adapter="shiki"
      language="ts"
      title="Chart imports"
      [theme]="codeBlockTheme()"
      [sanitizeHtml]="false"
      [wrap]="true"
      [lineNumbers]="false"
    />
  </section>

  <section id="usage" class="chart-doc-block">
    <h3>Minimal usage</h3>
    <tng-code-block
      [code]="usageCode"
      adapter="shiki"
      language="ts"
      title="Standalone component"
      [theme]="codeBlockTheme()"
      [sanitizeHtml]="false"
      [wrap]="true"
      [lineNumbers]="false"
    />
  </section>
</article>
