<article class="chart-series-overview">
  <h2 class="chart-series-overview-title">Stacked Bar overview</h2>
  <p class="chart-series-overview-lead">
    <code>&lt;tng-stacked-bar-chart&gt;</code>
    compares categories with stacking enabled on the generated bar series. Map
    <code>xField</code> and <code>series</code> to your record shape.
  </p>

  <app-docs-example-tabs-section
    class="chart-series-overview-block"
    heading="Simple sample"
    description="Compare the Stacked Bar preset in its default plain-CSS presentation and in a theme-aware Tailwind shell."
    ariaLabel="Stacked bar overview style examples"
    tabListAriaLabel="Stacked bar overview example style variants"
    defaultValue="plain-css"
    [codeBlockTheme]="codeBlockTheme()"
  >
    <ng-template
      appDocsExampleVariant
      value="plain-css"
      label="Plain-CSS"
      panelTitle="Simple sample (Plain-CSS)"
      [codeTabs]="simplePlainCodeTabs"
    >
      <div class="chart-series-overview-example-preview">
        <div class="chart-series-overview-example-chart chart-series-overview-example-chart--plain">
          <tng-stacked-bar-chart
            [data]="data"
            xField="label"
            [series]="series"
            [height]="chartHeight"
          />
        </div>
      </div>
    </ng-template>

    <ng-template
      appDocsExampleVariant
      value="tailwind-css"
      label="Tailwind CSS"
      panelTitle="Simple sample (Tailwind CSS)"
      [codeTabs]="simpleTailwindCodeTabs"
    >
      <div class="chart-series-overview-example-preview">
        <div [class]="tailwindShellClass">
          <tng-stacked-bar-chart
            [data]="data"
            xField="label"
            [series]="series"
            [height]="chartHeight"
          />
        </div>
      </div>
    </ng-template>
  </app-docs-example-tabs-section>

  <section id="metadata" class="chart-doc-block chart-series-overview-block">
    <h3>Chart metadata</h3>
    <div class="chart-doc-table-wrap">
      <table class="chart-doc-table">
        <tbody>
          <tr>
            <th scope="row">Category</th>
            <td>Bar</td>
          </tr>
          <tr>
            <th scope="row">Series type</th>
            <td><code>bar</code></td>
          </tr>
          <tr>
            <th scope="row">Coordinate system</th>
            <td><code>cartesian2d</code></td>
          </tr>
          <tr>
            <th scope="row">Features</th>
            <td>{{ featureSummary }}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>

  <section id="imports" class="chart-doc-block chart-series-overview-block">
    <h3>Imports</h3>
    <tng-code-block
      [code]="importCode"
      adapter="shiki"
      language="ts"
      title="Chart imports"
      [theme]="codeBlockTheme()"
      [sanitizeHtml]="false"
      [wrap]="true"
      [lineNumbers]="false"
    />
  </section>

  <section id="usage" class="chart-doc-block chart-series-overview-block">
    <h3>Minimal usage</h3>
    <tng-code-block
      [code]="usageCode"
      adapter="shiki"
      language="ts"
      title="Standalone component"
      [theme]="codeBlockTheme()"
      [sanitizeHtml]="false"
      [wrap]="true"
      [lineNumbers]="false"
    />
  </section>
</article>
