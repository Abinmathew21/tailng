<article class="docs-example-panel">
  <header class="docs-example-panel-header">
    <h4 class="docs-example-panel-title">{{ title() }}</h4>
    <div class="docs-example-panel-actions">
      <button
        type="button"
        class="docs-example-panel-action"
        aria-label="Copy example link"
        (click)="onLinkButtonClick()"
      >
        <tng-icon icon="link" class="h-5 w-5" />
      </button>
      <button
        type="button"
        class="docs-example-panel-action"
        aria-label="View source code"
        [attr.aria-expanded]="showCode() ? 'true' : 'false'"
        [attr.data-active]="showCode() ? '' : null"
        [disabled]="!hasCodeTabs()"
        (click)="onCodeButtonClick()"
      >
        <tng-icon icon="code" class="h-5 w-5" />
      </button>
      <button
        type="button"
        class="docs-example-panel-action"
        aria-label="Open full example"
        (click)="onOpenButtonClick()"
      >
        <tng-icon icon="external-link" class="h-5 w-5" />
      </button>
    </div>
  </header>

  @if (showCode() && hasCodeTabs()) {
    <tng-tabs
      ariaLabel="Example source files"
      [defaultValue]="defaultCodeTab()"
      class="docs-example-code-tabs grid gap-2"
    >
      <div
        tngTabList
        class="docs-example-code-tabs-list flex flex-wrap gap-2"
        ariaLabel="Example source code tabs"
      >
        @for (tab of codeTabs(); track tab.value) {
          <button type="button" tngTab [value]="tab.value" class="docs-example-code-tab-trigger">
            {{ tab.label }}
          </button>
        }
      </div>

      @for (tab of codeTabs(); track tab.value) {
        <section tngTabPanel [value]="tab.value" class="docs-example-code-panel">
          <tng-code-block
            [code]="tab.code"
            adapter="shiki"
            [language]="tab.language || 'text'"
            [title]="tab.title"
            [theme]="codeBlockTheme() || 'github-light'"
            [sanitizeHtml]="false"
            [wrap]="true"
            [lineNumbers]="false"
          ></tng-code-block>
        </section>
      }
    </tng-tabs>
  }

  <ng-content />
</article>
