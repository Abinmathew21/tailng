<tng-tabs
  class="docs-component-tabs"
  [ariaLabel]="sectionName() + ' documentation sections'"
  [activation]="'manual'"
  [value]="value()"
  [scrollButtons]="'auto'"
>
  <div class="docs-component-tab-strip">
    <button type="button" tngTabsScrollButtonPrev class="docs-component-tab-scroll-btn" aria-label="Scroll tabs left">
      <tng-icon icon="chevron-left" class="docs-component-tab-scroll-icon" />
    </button>
    <div tngTabList class="docs-component-tab-list" [ariaLabel]="sectionName() + ' documentation tabs'">
      @for (tab of tabs(); track tab.value) {
        <a tngTab [value]="tab.value" [href]="tabHrefs()[tab.value]" class="docs-component-tab-trigger">
          {{ tab.label }}
        </a>
      }
    </div>
    <button type="button" tngTabsScrollButtonNext class="docs-component-tab-scroll-btn" aria-label="Scroll tabs right">
      <tng-icon icon="chevron-right" class="docs-component-tab-scroll-icon" />
    </button>
  </div>
</tng-tabs>
