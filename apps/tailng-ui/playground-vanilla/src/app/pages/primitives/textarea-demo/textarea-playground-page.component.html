<main class="page">
  <section class="container">
    <header class="hero">
      <div class="links">
        <a routerLink="/">Home</a>
        <a routerLink="/button">Button Demo</a>
        <a routerLink="/input">Input Demo</a>
        <a routerLink="/radio">Radio Demo</a>
        <a routerLink="/checkbox">Checkbox Demo</a>
      </div>
      <h1 class="title">Textarea Demo (Vanilla CSS)</h1>
      <p class="subtitle">
        Multi-line input primitive plus owned `tng-textarea` wrapper with value events.
      </p>
    </header>

    <section class="card">
      <h2>Primitives (`tngTextarea`)</h2>
      <div class="stack">
        <textarea
          tngTextarea
          rows="4"
          placeholder="Primitive textarea"
          class="primitive-textarea"
        ></textarea>
        <textarea
          tngTextarea
          [rows]="5"
          [ariaInvalid]="true"
          placeholder="Invalid sample"
          class="primitive-textarea invalid"
        ></textarea>
      </div>
    </section>

    <section class="card">
      <h2>Components (`tng-textarea`)</h2>
      <div class="stack">
        <tng-textarea
          [rows]="4"
          [value]="notes()"
          placeholder="Write release notes"
          (valueChange)="onNotesChange($event)"
        />
      </div>
      <p class="current">Current value: {{ notes() }}</p>
    </section>
  </section>
</main>
