<main class="page">
  <section class="container">
    <header class="hero">
      <div class="links">
        <a routerLink="/">Home</a>
      </div>
      <h1 class="title">Skeleton Demo (Vanilla CSS)</h1>
      <p class="subtitle">Decorative placeholders for loading states before real content is ready.</p>
    </header>

    <section class="card">
      <h2>Controls</h2>
      <div class="controls">
        <button class="control-button" (click)="onToggleAnimated()">
          Animation: {{ animated() ? 'On' : 'Off' }}
        </button>
        <button class="control-button" (click)="onToggleRounded()">
          Rounded: {{ rounded() ? 'On' : 'Off' }}
        </button>
      </div>
    </section>

    <section class="card">
      <h2>Primitive (`[tngSkeleton]`)</h2>
      <div
        tngSkeleton
        class="primitive-skeleton primitive-skeleton--wide"
        [animated]="animated()"
        [rounded]="rounded()"
      ></div>
      <div
        tngSkeleton
        class="primitive-skeleton primitive-skeleton--short"
        [animated]="animated()"
        [rounded]="rounded()"
      ></div>
    </section>

    <section class="card">
      <h2>Component (`tng-skeleton`)</h2>
      <div class="preview-list">
        <tng-skeleton width="75%" height="1rem" [animated]="animated()" [rounded]="rounded()" />
        <tng-skeleton width="40%" height="1rem" [animated]="animated()" [rounded]="rounded()" />
        <tng-skeleton width="100%" height="7rem" [animated]="animated()" [rounded]="rounded()" />
      </div>
    </section>
  </section>
</main>
