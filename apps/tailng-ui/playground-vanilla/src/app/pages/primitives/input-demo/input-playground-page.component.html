<main class="page">
  <section class="container">
    <section class="card">
      <h2>Primitives (`tngInput`)</h2>
      <div class="stack">
        <input tngInput type="text" placeholder="Email" class="primitive-input" />
        <input
          tngInput
          type="search"
          placeholder="Search docs"
          [ariaInvalid]="true"
          class="primitive-input invalid"
        />
        <input
          tngInput
          type="password"
          placeholder="Readonly token"
          [readonly]="true"
          value="tailng-secret"
          class="primitive-input"
        />
      </div>
    </section>

    <section class="card">
      <h2>Components (`tng-input`)</h2>
      <div class="stack">
        <tng-input placeholder="Project name" />
        <tng-input type="email" placeholder="team@tailng.dev" [required]="true" />
        <tng-input placeholder="Disabled input" [disabled]="true" value="Cannot edit" />
      </div>
    </section>
  </section>
</main>
