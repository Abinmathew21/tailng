<main class="page">
  <section class="container">
    <section class="card">
      <h2>Primitives (`tngCheckbox`)</h2>
      <div class="stack">
        <label class="row"><input tngCheckbox [checked]="true" /> Checked</label>
        <label class="row"
          ><input tngCheckbox [indeterminate]="true" /> Mixed (indeterminate)</label
        >
        <label class="row disabled"><input tngCheckbox [disabled]="true" /> Disabled</label>
      </div>
    </section>

    <section class="card">
      <h2>Components (`tng-checkbox`)</h2>
      <div class="stack">
        <tng-checkbox
          [checked]="acceptedTerms()"
          [indeterminate]="acceptedTermsIndeterminate()"
          (checkedChange)="onCheckedChange($event)"
          (indeterminateChange)="onIndeterminateChange($event)"
        >
          Accept terms and conditions
        </tng-checkbox>
      </div>
      <button type="button" class="action" (click)="setMixedState()">Reset to Mixed State</button>
      <p class="current">
        checked: {{ acceptedTerms() }} | indeterminate: {{ acceptedTermsIndeterminate() }}
      </p>
    </section>
  </section>
</main>
