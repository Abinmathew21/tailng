<main class="page">
  <section class="container">
    <header class="hero">
      <div class="links">
        <a routerLink="/">Home</a>
      </div>
      <h1 class="title">Menubar Demo (Vanilla CSS)</h1>
      <p class="subtitle">Horizontal menu surface for top-level app actions.</p>
    </header>

    <section class="card">
      <h2>Primitives (`tngMenubar`)</h2>
      <div tngMenubar role="menubar" class="primitive-shell demo-row">
        <button role="menuitem" type="button" class="demo-button">File</button>
        <button role="menuitem" type="button" class="demo-button">Edit</button>
        <button role="menuitem" type="button" class="demo-button">View</button>
      </div>
    </section>

    <section class="card">
      <h2>Components (`tng-menubar`)</h2>
      <tng-menubar>
        <div role="menubar" class="primitive-shell demo-row">
          <button role="menuitem" type="button" class="demo-button">Project</button>
          <button role="menuitem" type="button" class="demo-button demo-button-active">
            Components
          </button>
          <button role="menuitem" type="button" class="demo-button">Help</button>
        </div>
      </tng-menubar>
    </section>
  </section>
</main>
