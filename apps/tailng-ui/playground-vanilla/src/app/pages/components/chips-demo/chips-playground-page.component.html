<main class="page">
  <section class="container">
    <header class="hero">
      <div class="links">
        <a routerLink="/">Home</a>
      </div>
      <h1 class="title">Chips Demo (Vanilla CSS)</h1>
      <p class="subtitle">Compact item set for tags, filtering, and removable selections.</p>
    </header>

    <section class="card">
      <h2>Primitives (`tngChips`)</h2>
      <div tngChips class="primitive-shell demo-row">
        <button type="button" class="demo-chip">Angular</button>
        <button type="button" class="demo-chip">CDK</button>
        <button type="button" class="demo-chip">A11y</button>
      </div>
    </section>

    <section class="card">
      <h2>Components (`tng-chips`)</h2>
      <tng-chips>
        <div class="primitive-shell demo-row">
          <span class="demo-chip">
            Button
            <button type="button" class="demo-chip-x">x</button>
          </span>
          <span class="demo-chip">
            Dialog
            <button type="button" class="demo-chip-x">x</button>
          </span>
        </div>
      </tng-chips>
    </section>
  </section>
</main>
