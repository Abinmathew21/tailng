<main class="page">
  <section class="container">
    <header class="hero">
      <div class="links">
        <a routerLink="/">Home</a>
      </div>
      <h1 class="title">Bottom Sheet Demo (Vanilla CSS)</h1>
      <p class="subtitle">Partial-height overlay sheet anchored from the bottom edge.</p>
    </header>

    <section class="card">
      <h2>Primitives (`tngBottomSheet`)</h2>
      <div class="primitive-shell demo-mobile-frame">
        <div class="demo-panel">Mobile content behind sheet</div>
        <div tngBottomSheet class="demo-panel">
          <div class="demo-handle" aria-hidden="true"></div>
          <p class="demo-note">Quick Actions</p>
          <ul class="demo-list">
            <li>Share</li>
            <li>Duplicate</li>
            <li>Archive</li>
          </ul>
        </div>
      </div>
    </section>

    <section class="card">
      <h2>Components (`tng-bottom-sheet`)</h2>
      <tng-bottom-sheet>
        <div class="demo-panel">
          <div class="demo-handle" aria-hidden="true"></div>
          <p class="demo-note">Component wrapper with owned surface styling.</p>
          <div class="demo-row">
            <button type="button" class="demo-button">Install</button>
            <button type="button" class="demo-button">Later</button>
          </div>
        </div>
      </tng-bottom-sheet>
    </section>
  </section>
</main>
