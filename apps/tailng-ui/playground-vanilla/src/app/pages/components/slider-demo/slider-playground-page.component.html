<main class="page">
  <section class="container">
    <header class="hero">
      <div class="links">
        <a routerLink="/">Home</a>
      </div>
      <h1 class="title">Slider Demo (Vanilla CSS)</h1>
      <p class="subtitle">Range control for selecting a numeric value.</p>
    </header>

    <section class="card">
      <h2>Primitives (`tngSlider`)</h2>
      <input tngSlider class="primitive-shell" [min]="0" [max]="100" [value]="45" />
    </section>

    <section class="card">
      <h2>Components (`tng-slider`)</h2>
      <p>Volume: {{ volume() }}</p>
      <tng-slider [value]="volume()" [min]="0" [max]="100" (valueChange)="onVolumeChange($event)" />
    </section>
  </section>
</main>
