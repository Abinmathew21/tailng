<main class="page">
  <section class="container">
    <header class="hero">
      <div class="links">
        <a routerLink="/">Home</a>
      </div>
      <h1 class="title">Input OTP Demo (Vanilla CSS)</h1>
      <p class="subtitle">Segmented one-time-password input with keyboard and paste support.</p>
    </header>

    <section class="card">
      <h2>Primitives (`tngInputOtp`)</h2>
      <div tngInputOtp class="primitive-shell">Primitive OTP group shell.</div>
    </section>

    <section class="card">
      <h2>Components (`tng-input-otp`)</h2>
      <tng-input-otp
        [value]="otpValue()"
        [length]="6"
        (valueChange)="onOtpValueChange($event)"
        (complete)="onComplete($event)"
      />
      <p>Value: {{ otpValue() || '—' }}</p>
      <p>Completed: {{ completionValue() || '—' }}</p>
    </section>
  </section>
</main>
