<section tngSelect class="select-shell" aria-label="Primitive select" #sel="tngSelect">
  <button tngSelectTrigger type="button" class="select-trigger" data-testid="trigger">
    <span tngSelectValue class="select-value">{{ labelFor(sel.value()) }}</span>
    <span tngSelectIcon class="select-icon" aria-hidden="true">▾</span>
  </button>

  <div tngSelectContent class="select-content" data-testid="content">
    <div tngSelectOverlay class="select-overlay" data-testid="overlay">
      <ul tngSelectListbox class="select-listbox" data-testid="listbox">
        @for (opt of options; track opt.value) {
          <li
            tngSelectOption
            class="select-option"
            [tngValue]="opt.value"
            [disabled]="!!opt.disabled"
          >
            {{ opt.label }}
          </li>
        }
      </ul>
    </div>
  </div>
</section>

<p>Current sel.value(): {{ sel.value() }}</p>
