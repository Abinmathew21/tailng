<main class="page">
  <section class="container">
    <section class="card">
      <h2>Primitives (`tngInputOtp`)</h2>
      <div tngInputOtp class="primitive-shell">Primitive OTP group shell.</div>
    </section>

    <section class="card">
      <h2>Components (`tng-input-otp`)</h2>
      <tng-input-otp
        [value]="otpValue()"
        [length]="6"
        (valueChange)="onOtpValueChange($event)"
        (complete)="onComplete($event)"
      />
      <p>Value: {{ otpValue() || '—' }}</p>
      <p>Completed: {{ completionValue() || '—' }}</p>
    </section>
  </section>
</main>
