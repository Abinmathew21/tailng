<main class="page">
  <section class="container">
    <section class="card">
      <h2>Primitives (`tngSlider`)</h2>
      <input tngSlider class="primitive-shell" [min]="0" [max]="100" [value]="45" />
    </section>

    <section class="card">
      <h2>Components (`tng-slider`)</h2>
      <p>Volume: {{ volume() }}</p>
      <tng-slider [value]="volume()" [min]="0" [max]="100" (valueChange)="onVolumeChange($event)" />
    </section>
  </section>
</main>
