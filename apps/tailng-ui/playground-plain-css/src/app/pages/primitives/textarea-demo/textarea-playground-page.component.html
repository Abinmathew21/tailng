<main class="page">
  <section class="container">
    <section class="card">
      <h2>Primitives (`textarea[tngInput]`)</h2>
      <div class="stack">
        <textarea
          tngInput
          rows="4"
          placeholder="Primitive textarea"
          class="primitive-textarea"
        ></textarea>
        <textarea
          tngInput
          [rows]="5"
          [ariaInvalid]="true"
          placeholder="Invalid sample"
          class="primitive-textarea invalid"
        ></textarea>
      </div>
    </section>

    <section class="card">
      <h2>Components (`tng-textarea`)</h2>
      <div class="stack">
        <tng-textarea
          [rows]="4"
          [value]="notes()"
          placeholder="Write release notes"
          (valueChange)="onNotesChange($event)"
        />
      </div>
      <p class="current">Current value: {{ notes() }}</p>
    </section>
  </section>
</main>
