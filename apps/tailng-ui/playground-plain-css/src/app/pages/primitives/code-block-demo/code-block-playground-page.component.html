<main class="page">
  <section class="container">
    <section class="card-grid">
      <article class="card">
        <h2>Adapter: plain (default)</h2>
        <tng-code-block [code]="angularSnippet" language="ts" />
      </article>

      <article class="card">
        <h2>Adapter: keyword (custom)</h2>
        <tng-code-block [code]="angularSnippet" language="ts" adapter="keyword" />
      </article>
    </section>

    <section class="card-grid">
      <article class="card">
        <h2>Highlight Off + No Line Numbers</h2>
        <tng-code-block
          [code]="htmlSnippet"
          language="html"
          highlightMode="off"
          [showLineNumbers]="false"
        />
      </article>

      <article class="card">
        <h2>Wrapped Shell Example</h2>
        <tng-code-block [code]="shellSnippet" language="bash" [wrap]="true" />
      </article>
    </section>
  </section>
</main>
