<main class="page">
  <section class="container">
    <section class="card">
      <h2>Primitives (`tngPress`)</h2>
      <div class="row">
        <button tngPress type="button" class="primitive primary">Primary Action</button>
        <button tngPress type="button" class="primitive outline">Outline Action</button>
        <a tngPress class="primitive success">Anchor Button</a>
        <a tngPress [disabled]="true" class="primitive disabled">Disabled Anchor</a>
      </div>
    </section>

    <section class="card">
      <h2>Components (`tng-button`)</h2>
      <div class="row">
        <tng-button>Default</tng-button>
        <tng-button tone="success">Success</tng-button>
        <tng-button tone="danger">Danger</tng-button>
        <tng-button tone="neutral">Neutral</tng-button>
        <tng-button appearance="outline">Outline</tng-button>
        <tng-button appearance="ghost">Ghost</tng-button>
        <tng-button size="sm">Small</tng-button>
        <tng-button size="lg">Large</tng-button>
        <tng-button [disabled]="true">Disabled</tng-button>
      </div>
    </section>
  </section>
</main>
