<button
  tngCopy
  class="tng-copy-button"
  type="button"
  [disabled]="disabled()"
  [tngCopyText]="text()"
  [tngCopyFrom]="from()"
  [tngCopyIgnoreSelectors]="ignoreSelectors()"
  [tngCopyDisabled]="disabled()"
  [attr.data-appearance]="appearance()"
  [attr.data-size]="size()"
  [attr.data-state]="state()"
  (click)="onHostClick()"
  (tngCopied)="onPrimitiveCopied($event)"
  (tngCopyError)="onPrimitiveCopyError($event)"
>
  @if (showIcon()) {
    <span class="tng-copy-button__icon" aria-hidden="true">
      @if (iconState() === 'copied') {
        <ng-content select="[copiedIcon]">{{ copiedIconText() }}</ng-content>
      } @else {
        <ng-content select="[copyIcon]">{{ copyIconText() }}</ng-content>
      }
    </span>
  }
  <span class="tng-copy-button__label">{{ label() }}</span>
</button>

<span class="tng-copy-live-region" aria-live="polite">{{ liveMessage() }}</span>
