<section
  tngButtonToggleGroup
  class="tng-button-toggle-group"
  [attr.aria-label]="ariaLabel()"
  [type]="type()"
  [activation]="activation()"
  [orientation]="orientation()"
  [dir]="dir()"
  [allowEmpty]="allowEmpty()"
  [disabled]="disabled()"
  [loop]="loop()"
  [tngButtonToggleValue]="resolvedValue()"
  [tngButtonToggleValues]="resolvedValues()"
  [tngButtonToggleDefaultValue]="resolvedDefaultValue()"
  [tngButtonToggleDefaultValues]="resolvedDefaultValues()"
  (valueChange)="valueChange.emit($event)"
  (valuesChange)="valuesChange.emit($event)"
  (toggleChange)="toggleChange.emit($event)"
  (focusChange)="focusChange.emit($event)"
>
  <ng-content />
</section>
