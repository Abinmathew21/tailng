<button
  tngToggle
  class="tng-toggle-control"
  [tngToggleValue]="value()"
  [pressed]="resolvedPressed()"
  [defaultPressed]="defaultPressed()"
  [disabled]="resolvedDisabled()"
  [ariaLabel]="getAriaLabel()"
  [ariaLabelledby]="ariaLabelledby()"
  [ariaDescribedBy]="ariaDescribedBy()"
  (pressedChange)="onPrimitivePressedChange($event)"
  (blur)="onBlur()"
>
  @if (resolvedPressed()) {
    <span class="tng-toggle-icon">
      <ng-content select="[onIcon]">on</ng-content>
    </span>
  } @else {
    <span class="tng-toggle-icon">
      <ng-content select="[offIcon]">off</ng-content>
    </span>
  }
</button>
