<fieldset
  data-slot="form-field-control-row"
  [attr.class]="classList('tng-form-field__frame', slotClass('controlRow'))"
>
  <legend
    data-slot="form-field-label"
    [attr.class]="classList('tng-form-field__label', slotClass('label'))"
  >
    <ng-content select="label[tngLabel], tng-label"></ng-content>
    <span
      aria-hidden="true"
      data-slot="form-field-required-marker"
      [hidden]="!showRequiredMarker()"
      [attr.class]="classList('tng-form-field__required-marker', slotClass('requiredMarker'))"
    >*</span>
  </legend>

  <div class="tng-form-field__control-row">
    <ng-content select="[tngFormFieldPrefix]"></ng-content>

    <div
      data-slot="form-field-control"
      [attr.class]="classList('tng-form-field__control', slotClass('control'))"
    >
      <!-- Explicit escape hatch first so dev-mode control-count logic stays accurate. -->
      <ng-content select="[tngFormFieldControl]"></ng-content>
      <!-- Default slot: anything else projected lands in the control area. -->
      <ng-content></ng-content>
    </div>

    <ng-content select="[tngFormFieldSuffix]"></ng-content>
  </div>
</fieldset>

<div
  data-slot="form-field-messages"
  [attr.class]="classList('tng-form-field__messages', slotClass('messages'))"
>
  <ng-content select="[tngHint], tng-hint"></ng-content>
  <ng-content select="[tngError], tng-error"></ng-content>
</div>
