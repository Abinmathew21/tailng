<div class="tng-switch-root" [attr.data-disabled]="disabled() ? '' : null">
  <button
    tngSwitch
    class="tng-switch-control"
    [ariaLabel]="ariaLabel()"
    [checked]="resolvedChecked()"
    [disabled]="disabled()"
    [required]="required()"
    (click)="onToggle()"
    (keydown)="onKeydown($event)"
  >
    <span class="tng-switch-track">
      <span class="tng-switch-thumb">
        @if (resolvedChecked()) {
          <span class="tng-switch-icon" aria-hidden="true">
            <ng-content select="[onIcon]"></ng-content>
          </span>
        } @else {
          <span class="tng-switch-icon" aria-hidden="true">
            <ng-content select="[offIcon]"></ng-content>
          </span>
        }
      </span>
    </span>
  </button>
  <input
    class="tng-switch-native-input"
    type="checkbox"
    [checked]="resolvedChecked()"
    [disabled]="disabled()"
    [required]="required()"
    [attr.name]="inputName()"
    [value]="inputValue()"
    tabindex="-1"
    aria-hidden="true"
  />
  <span class="tng-switch-label">
    <ng-content />
  </span>
</div>
