<section
  tngChips
  class="tng-chips"
  [tngChipsAriaLabel]="ariaLabel()"
  [tngChipsDisabled]="disabled()"
  [tngChipsValues]="values()"
  [tngChipsDefaultValues]="defaultValues()"
>
  @for (item of displayItems(); track item) {
    <tng-chip
      [value]="item"
      [label]="resolveItemLabel(item)"
      [disabled]="disabled()"
      (chipRemove)="onChipRemove($event)"
    >
      {{ resolveItemLabel(item) }}
    </tng-chip>
  }
  <ng-content />
</section>
