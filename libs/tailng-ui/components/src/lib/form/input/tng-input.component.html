<tng-input-field
  class="tng-input"
  [appearance]="appearance()"
  [size]="size()"
  [tone]="tone()"
  [fullWidth]="fullWidth()"
>
  <input
    #inputControl
    tngInput
    class="tng-input-control"
    [type]="type()"
    [disabled]="effectiveDisabled"
    [readonly]="readonly()"
    [required]="required()"
    [ariaLabel]="ariaLabel()"
    [ariaLabelledby]="ariaLabelledby()"
    [ariaDescribedBy]="ariaDescribedBy()"
    [ariaInvalid]="ariaInvalid()"
    [ariaRequired]="ariaRequired()"
    [attr.aria-errormessage]="normalizeAttrValue(ariaErrormessage())"
    [attr.autocapitalize]="normalizeAttrValue(autocapitalize())"
    [attr.autocomplete]="normalizeAttrValue(autocomplete())"
    [attr.enterkeyhint]="normalizeAttrValue(enterkeyhint())"
    [attr.form]="normalizeAttrValue(formAttr())"
    [attr.id]="normalizeAttrValue(id())"
    [attr.inputmode]="normalizeAttrValue(inputmode())"
    [attr.list]="normalizeAttrValue(list())"
    [attr.max]="normalizeNumberAttrValue(maxValue())"
    [attr.maxlength]="normalizeNumberAttrValue(maxlength())"
    [attr.min]="normalizeNumberAttrValue(minValue())"
    [attr.minlength]="normalizeNumberAttrValue(minlength())"
    [attr.name]="normalizeAttrValue(inputName())"
    [attr.pattern]="formatPatternAttrValue(pattern())"
    [attr.placeholder]="normalizeAttrValue(placeholder())"
    [attr.spellcheck]="formatNullableBooleanAttrValue(spellcheck())"
    [attr.step]="normalizeNumberAttrValue(step())"
    [value]="effectiveValue"
    (beforeinput)="onBeforeInput($event)"
    (input)="onInput($event)"
    (paste)="onPaste($event)"
    (change)="onChangeEvent($event)"
    (focus)="onFocus($event)"
    (keydown)="onKeydown($event)"
    (keyup)="onKeyup($event)"
    (blur)="onBlur($event)"
  />

  @if (isNumberInput) {
    <span tngInputFieldSuffix class="tng-input-number-controls">
      <button
        class="tng-input-number-button"
        type="button"
        tabindex="-1"
        [disabled]="effectiveDisabled || readonly()"
        aria-label="Increment value"
        (click)="stepNumber(1)"
      >
        <span class="tng-input-number-icon" aria-hidden="true"></span>
      </button>
      <button
        class="tng-input-number-button"
        type="button"
        tabindex="-1"
        [disabled]="effectiveDisabled || readonly()"
        aria-label="Decrement value"
        (click)="stepNumber(-1)"
      >
        <span class="tng-input-number-icon" aria-hidden="true"></span>
      </button>
    </span>
  }
</tng-input-field>
