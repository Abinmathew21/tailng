<label
  class="tng-checkbox-root"
  [attr.data-disabled]="resolvedDisabled() ? '' : null"
  [attr.data-invalid]="invalid() ? '' : null"
  [attr.data-readonly]="readonly() ? '' : null"
>
  <input
    tngCheckbox
    class="tng-checkbox-control"
    [checked]="resolvedChecked()"
    [disabled]="resolvedDisabled()"
    [indeterminate]="resolvedIndeterminate()"
    [invalid]="invalid()"
    [readonly]="readonly()"
    [required]="required()"
    [name]="inputName()"
    [value]="inputValue()"
    [ariaDescribedBy]="ariaDescribedBy()"
    (change)="onChange($event)"
    (blur)="onBlur()"
  />
  <span class="tng-checkbox-label">
    <ng-content />
  </span>
</label>
