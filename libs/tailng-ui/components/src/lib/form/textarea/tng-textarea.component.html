<textarea
  tngInput
  class="tng-textarea"
  [style.resize]="resize()"
  [attr.data-resize]="resize()"
  [rows]="rows()"
  [disabled]="disabled()"
  [readonly]="readonly()"
  [required]="required()"
  [ariaDescribedBy]="ariaDescribedBy()"
  [ariaInvalid]="ariaInvalid()"
  [ariaRequired]="ariaRequired()"
  [attr.placeholder]="placeholder()"
  [value]="value() ?? ''"
  (input)="onInput($event)"
></textarea>
