<!-- Host already has [tngSelect] attached via hostDirectives -->

<button tngSelectTrigger type="button" data-slot="select-trigger">
  <span tngSelectValue data-slot="select-value">
    @if (valueTpl) {
      <ng-container *ngTemplateOutlet="valueTpl; context: valueContext()" />
    } @else {
      {{ selectedLabel() }}
    }
  </span>

  <span tngSelectIcon aria-hidden="true" data-slot="select-icon">
    {{ iconText() }}
  </span>
</button>

<div tngSelectContent data-slot="select-content">
  <div tngSelectOverlay data-slot="select-overlay">
    <ul tngSelectListbox data-slot="select-listbox">
      @for (opt of options(); track trackBy()($index, opt)) {
        <li
          tngSelectOption
          data-slot="select-option"
          [tngValue]="getOptionValue()(opt)"
          [disabled]="isOptionDisabled()(opt)"
        >
          @if (optionTpl) {
            <ng-container *ngTemplateOutlet="optionTpl; context: optionContext(opt)" />
          } @else {
            {{ getOptionLabel()(opt) }}
          }
        </li>
      }
    </ul>
  </div>
</div>
