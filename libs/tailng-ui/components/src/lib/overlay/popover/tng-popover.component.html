<div
  tngPopover
  #popoverRef="tngPopover"
  class="tng-popover-root"
  [open]="open()"
  [defaultOpen]="defaultOpen()"
  [disabled]="disabled()"
  [closeOnEscape]="closeOnEscape()"
  [closeOnOutsidePointer]="closeOnOutsidePointer()"
  [restoreFocus]="restoreFocus()"
  [autoFocus]="autoFocus()"
  [side]="side()"
  [align]="align()"
  [panelRole]="panelRole()"
  [ariaLabel]="ariaLabel()"
  [ariaHasPopup]="ariaHasPopup()"
  (openChange)="openChange.emit($event)"
  (closed)="closed.emit($event)"
>
  <button
    type="button"
    class="tng-popover-trigger"
    [tngPopoverTrigger]="popoverRef"
  >
    {{ triggerLabel() }}
  </button>

  <section tngPopoverPanel class="tng-popover-panel">
    <ng-content />
  </section>
</div>
